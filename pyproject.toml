[tool.ruff]
target-version = "py310"
line-length = 160
extend-exclude = [".venv310", "node_modules"]

[tool.ruff.lint]
select = ["E9", "F"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
follow_imports = "silent"
pretty = true
show_error_codes = true
exclude = "^(\\.venv310|node_modules)/"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"
markers = [
    "unit: isolated logic with no PostgreSQL or external process dependency",
    "postgres: requires the migrated PostgreSQL test schema",
    "high_risk: protects an approved high-risk business or delivery boundary",
    "slow: intentionally expensive and intended for full or nightly regression",
]
