{% extends "admin_console/base.html" %}

{% block head_extra %}
<style>
  :root {
    --ai-panel: #fff;
    --ai-line: #e7ebf2;
    --ai-line2: #eef2f7;
    --ai-text: #101828;
    --ai-muted: #667085;
    --ai-muted2: #98a2b3;
    --ai-blue: #2563eb;
    --ai-blue2: #eff6ff;
    --ai-danger: #d92d20;
    --ai-danger2: #fff1f3;
    --ai-green: #079455;
    --ai-green2: #ecfdf3;
    --ai-warn: #b54708;
    --ai-warn2: #fffaeb;
    --ai-shadow: 0 12px 32px rgba(16, 24, 40, .07);
    --ai-r: 16px;
  }

  .ai-layout {
    display: grid;
    gap: 18px;
  }

  .ai-card {
    background: var(--ai-panel);
    border: 1px solid var(--ai-line);
    border-radius: var(--ai-r);
    box-shadow: var(--ai-shadow);
  }

  .ai-section {
    padding: 20px 22px;
  }

  .ai-section h3 {
    margin: 0 0 14px;
    color: var(--ai-text);
    font-size: 18px;
    font-weight: 850;
  }

  .ai-summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }

  .ai-mini {
    padding: 16px 18px;
    border: 1px solid var(--ai-line);
    border-radius: 14px;
    background: #fff;
  }

  .ai-mini .label {
    margin-bottom: 6px;
    color: #8a94a6;
    font-size: 13px;
    font-weight: 800;
  }

  .ai-mini .value {
    overflow-wrap: anywhere;
    color: var(--ai-text);
    font-size: 18px;
    font-weight: 850;
  }

  .ai-grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .ai-field {
    display: grid;
    gap: 7px;
    margin-bottom: 14px;
  }

  .ai-label {
    color: #667085;
    font-size: 13px;
    font-weight: 800;
  }

  .ai-input,
  .ai-select,
  .ai-textarea {
    width: 100%;
    border: 1px solid #d0d5dd;
    border-radius: 10px;
    background: #fff;
    color: #1d2939;
    font: inherit;
    outline: none;
    padding: 10px 12px;
  }

  .ai-textarea {
    min-height: 96px;
    resize: vertical;
  }

  .ai-inline {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .ai-codebox {
    padding: 11px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 10px;
    background: #f8fafc;
    color: #344054;
    overflow-wrap: anywhere;
  }

  .ai-mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
  }

  .ai-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    color: #667085;
    font-weight: 750;
  }

  .ai-toolbar h3 {
    margin: 0;
  }

  .ai-btns {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .ai-btn {
    min-height: 36px;
    border: 1px solid #d0d5dd;
    border-radius: 10px;
    background: #fff;
    color: #344054;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    padding: 8px 12px;
  }

  .ai-btn:hover {
    border-color: #98a2b3;
  }

  .ai-btn.primary {
    border-color: var(--ai-blue);
    background: var(--ai-blue);
    color: #fff;
  }

  .ai-btn.soft {
    border-color: #d6e4ff;
    background: #f5f8ff;
    color: #1849a9;
  }

  .ai-btn.danger {
    border-color: #fecdca;
    background: var(--ai-danger2);
    color: var(--ai-danger);
  }

  .ai-table-wrap {
    overflow-x: auto;
  }

  .ai-table {
    width: 100%;
    min-width: 620px;
    border-collapse: separate;
    border-spacing: 0;
  }

  .ai-table th,
  .ai-table td {
    padding: 15px 18px;
    border-bottom: 1px solid var(--ai-line2);
    text-align: left;
    vertical-align: middle;
  }

  .ai-table th {
    background: #fafbfc;
    color: #8993a4;
    font-size: 13px;
    font-weight: 800;
  }

  .ai-table tr:last-child td {
    border-bottom: 0;
  }

  .ai-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
    border: 1px solid #dbeafe;
    border-radius: 999px;
    background: var(--ai-blue2);
    color: #1d4ed8;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .ai-pill.green {
    border-color: #abefc6;
    background: var(--ai-green2);
    color: #067647;
  }

  .ai-pill.gray {
    border-color: #eaecf0;
    background: #f2f4f7;
    color: #475467;
  }

  .ai-empty {
    padding: 32px 12px;
    color: var(--ai-muted);
    text-align: center;
  }

  .ai-status-line {
    min-height: 20px;
    margin-top: 8px;
    color: var(--ai-muted);
    font-size: 13px;
    font-weight: 700;
  }

  .ai-status-line.success {
    color: #067647;
  }

  .ai-status-line.error {
    color: var(--ai-danger);
  }

  .admin-page-summary {
    display: none;
  }

  @media (max-width: 960px) {
    .ai-summary,
    .ai-grid2,
    .ai-inline {
      grid-template-columns: 1fr;
    }

    .ai-table th,
    .ai-table td {
      padding: 12px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="ai-layout">
  <section class="ai-card ai-section" aria-label="人群包摘要">
    <h3 id="packageTitle">加载中</h3>
    <div class="ai-summary">
      <div class="ai-mini"><div class="label">当前人数</div><div class="value" id="summaryCount">-</div></div>
      <div class="ai-mini"><div class="label">最后一次刷新</div><div class="value" id="summaryRefresh">-</div></div>
      <div class="ai-mini"><div class="label">刷新方式</div><div class="value" id="summaryMode">-</div></div>
      <div class="ai-mini"><div class="label">状态</div><div class="value" id="summaryStatus">-</div></div>
    </div>
  </section>

  <div class="ai-grid2">
    <section class="ai-card ai-section" aria-label="基础配置">
      <h3>基础配置</h3>
      <div class="ai-field">
        <label class="ai-label" for="packageNameInput">人群包名称</label>
        <input class="ai-input" id="packageNameInput" value="">
      </div>
      <div class="ai-field">
        <label class="ai-label" for="packageDefinitionInput">筛选逻辑简述</label>
        <textarea class="ai-textarea" id="packageDefinitionInput"></textarea>
      </div>
      <div class="ai-inline">
        <div class="ai-field">
          <label class="ai-label" for="incrementalSelect">增量刷新</label>
          <select class="ai-select" id="incrementalSelect">
            <option value="off">关闭</option>
            <option value="incremental_3m">每 3 分钟</option>
          </select>
        </div>
        <div class="ai-field">
          <label class="ai-label" for="dailySelect">每日快照</label>
          <select class="ai-select" id="dailySelect">
            <option value="off">关闭</option>
            <option value="daily_0200">每日 2:00</option>
          </select>
        </div>
      </div>
      <div class="ai-btns" style="margin-top:10px">
        <button class="ai-btn primary" id="savePackageBtn" type="button">保存基础配置</button>
      </div>
      <div class="ai-status-line" id="packageStatusLine"></div>
    </section>

    <section class="ai-card ai-section" aria-label="Webhook">
      <h3>Webhook</h3>
      <div class="ai-field">
        <label class="ai-label">接收 Webhook 地址（系统生成）</label>
        <div class="ai-codebox ai-mono" id="inboundWebhookUrl">加载中</div>
      </div>
      <div class="ai-field">
        <label class="ai-label" for="outboundWebhookInput">外推 Webhook 地址（增量刷新后触发）</label>
        <input class="ai-input" id="outboundWebhookInput" value="">
      </div>
      <div class="ai-btns" style="margin-top:18px">
        <button class="ai-btn" id="rotateInboundSecretBtn" type="button">重置接收 secret</button>
        <button class="ai-btn primary" id="saveWebhookBtn" type="button">保存 Webhook</button>
      </div>
      <div class="ai-status-line" id="webhookStatusLine"></div>
    </section>
  </div>

  <div class="ai-grid2">
    <section class="ai-card ai-section" aria-label="发送人白名单">
      <div class="ai-toolbar">
        <h3>发送人白名单</h3>
        <button class="ai-btn soft" id="addSenderBtn" type="button">添加发送人</button>
      </div>
      <div class="ai-table-wrap">
        <table class="ai-table">
          <thead>
            <tr>
              <th>优先级</th>
              <th>发送人</th>
              <th>规则</th>
              <th>状态</th>
              <th style="text-align:right">操作</th>
            </tr>
          </thead>
          <tbody id="senderRows">
            <tr><td class="ai-empty" colspan="5">加载中</td></tr>
          </tbody>
        </table>
      </div>
      <div class="ai-status-line" id="senderStatusLine"></div>
    </section>

    <section class="ai-card ai-section" aria-label="成员列表">
      <div class="ai-toolbar">
        <h3>成员列表</h3>
        <span id="memberTotal">加载中</span>
      </div>
      <div class="ai-table-wrap">
        <table class="ai-table">
          <thead>
            <tr>
              <th>昵称</th>
              <th>外部联系人 ID</th>
              <th>进入时间</th>
            </tr>
          </thead>
          <tbody id="memberRows">
            <tr><td class="ai-empty" colspan="3">加载中</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
  (() => {
    const packageApiUrl = {{ ai_audience_package_api_url | tojson }};
    const membersApiUrl = {{ ai_audience_package_members_api_url | tojson }};
    const webhooksApiUrl = {{ ai_audience_package_webhooks_api_url | tojson }};
    const rotateWebhookApiUrl = {{ ai_audience_package_webhooks_rotate_api_url | tojson }};
    const sendersApiUrl = {{ ai_audience_package_senders_api_url | tojson }};

    const els = {
      packageTitle: document.getElementById("packageTitle"),
      summaryCount: document.getElementById("summaryCount"),
      summaryRefresh: document.getElementById("summaryRefresh"),
      summaryMode: document.getElementById("summaryMode"),
      summaryStatus: document.getElementById("summaryStatus"),
      packageNameInput: document.getElementById("packageNameInput"),
      packageDefinitionInput: document.getElementById("packageDefinitionInput"),
      incrementalSelect: document.getElementById("incrementalSelect"),
      dailySelect: document.getElementById("dailySelect"),
      savePackageBtn: document.getElementById("savePackageBtn"),
      packageStatusLine: document.getElementById("packageStatusLine"),
      inboundWebhookUrl: document.getElementById("inboundWebhookUrl"),
      outboundWebhookInput: document.getElementById("outboundWebhookInput"),
      rotateInboundSecretBtn: document.getElementById("rotateInboundSecretBtn"),
      saveWebhookBtn: document.getElementById("saveWebhookBtn"),
      webhookStatusLine: document.getElementById("webhookStatusLine"),
      addSenderBtn: document.getElementById("addSenderBtn"),
      senderRows: document.getElementById("senderRows"),
      senderStatusLine: document.getElementById("senderStatusLine"),
      memberRows: document.getElementById("memberRows"),
      memberTotal: document.getElementById("memberTotal")
    };

    let senderItems = [];

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#039;");

    const formatNumber = (value) => new Intl.NumberFormat("zh-CN").format(Number(value || 0));

    const formatTime = (value) => {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date).reduce((acc, item) => {
        acc[item.type] = item.value;
        return acc;
      }, {});
      return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}`;
    };

    const statusLabel = (status) => {
      if (status === "active") return "运行中";
      if (status === "paused") return "已停止";
      if (status === "draft") return "草稿";
      if (status === "archived") return "已归档";
      return status || "-";
    };

    const setStatus = (el, text, tone = "") => {
      el.textContent = text;
      el.className = tone ? `ai-status-line ${tone}` : "ai-status-line";
    };

    const fetchJson = async (url, options = {}) => {
      const headers = { "Accept": "application/json", ...(options.headers || {}) };
      if (options.body && typeof options.body === "string") {
        headers["Content-Type"] = "application/json";
      }
      const response = await fetch(url, {
        credentials: "same-origin",
        cache: "no-store",
        headers,
        ...options
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || payload.detail || `HTTP ${response.status}`);
      }
      return payload;
    };

    const applyRefreshMode = (mode) => {
      els.incrementalSelect.value = mode === "incremental_3m" || mode === "incremental_3m_plus_daily_0200"
        ? "incremental_3m"
        : "off";
      els.dailySelect.value = mode === "daily_0200" || mode === "incremental_3m_plus_daily_0200"
        ? "daily_0200"
        : "off";
    };

    const selectedRefreshMode = () => {
      const incrementalOn = els.incrementalSelect.value === "incremental_3m";
      const dailyOn = els.dailySelect.value === "daily_0200";
      if (incrementalOn && dailyOn) return "incremental_3m_plus_daily_0200";
      if (incrementalOn) return "incremental_3m";
      if (dailyOn) return "daily_0200";
      return "manual";
    };

    const renderPackage = (packageInfo) => {
      const name = packageInfo.name || "未命名人群包";
      els.packageTitle.textContent = name;
      els.summaryCount.textContent = formatNumber(packageInfo.member_count);
      els.summaryRefresh.textContent = formatTime(packageInfo.last_refreshed_at);
      els.summaryMode.textContent = packageInfo.refresh_mode_label || "手动";
      els.summaryStatus.textContent = statusLabel(packageInfo.status);
      els.packageNameInput.value = name;
      els.packageDefinitionInput.value = packageInfo.natural_language_definition || "";
      applyRefreshMode(packageInfo.refresh_mode || "manual");
    };

    const loadPackage = async () => {
      const payload = await fetchJson(`${packageApiUrl}?_=${Date.now()}`);
      renderPackage(payload.package || {});
    };

    const savePackage = async () => {
      setStatus(els.packageStatusLine, "保存中...");
      const payload = await fetchJson(packageApiUrl, {
        method: "PATCH",
        body: JSON.stringify({
          name: els.packageNameInput.value.trim(),
          natural_language_definition: els.packageDefinitionInput.value.trim(),
          refresh_mode: selectedRefreshMode()
        })
      });
      renderPackage(payload.package || {});
      setStatus(els.packageStatusLine, "基础配置已保存", "success");
    };

    const renderWebhook = (webhook) => {
      els.inboundWebhookUrl.textContent = `POST ${webhook.inbound_webhook_url || "-"}`;
      els.outboundWebhookInput.value = webhook.outbound_webhook_url || "";
    };

    const loadWebhook = async () => {
      const payload = await fetchJson(`${webhooksApiUrl}?_=${Date.now()}`);
      renderWebhook(payload.webhook || {});
    };

    const saveWebhook = async () => {
      const outboundUrl = els.outboundWebhookInput.value.trim();
      setStatus(els.webhookStatusLine, "保存中...");
      const payload = await fetchJson(webhooksApiUrl, {
        method: "PATCH",
        body: JSON.stringify({
          outbound_enabled: Boolean(outboundUrl),
          outbound_webhook_url: outboundUrl
        })
      });
      renderWebhook(payload.webhook || {});
      setStatus(els.webhookStatusLine, "Webhook 已保存", "success");
    };

    const rotateWebhookSecret = async () => {
      if (!window.confirm("确认重置接收 webhook secret？")) return;
      setStatus(els.webhookStatusLine, "重置中...");
      const payload = await fetchJson(rotateWebhookApiUrl, { method: "POST" });
      renderWebhook(payload.webhook || {});
      setStatus(els.webhookStatusLine, "接收 secret 已重置", "success");
    };

    const normalizeSenders = (items) => items.map((item, index) => ({
      sender_userid: item.sender_userid,
      display_name: item.display_name || item.sender_userid,
      priority: index + 1,
      status: item.status === "paused" ? "paused" : "active"
    }));

    const saveSenders = async (items) => {
      setStatus(els.senderStatusLine, "保存中...");
      const payload = await fetchJson(sendersApiUrl, {
        method: "PUT",
        body: JSON.stringify({ items: normalizeSenders(items) })
      });
      senderItems = payload.items || [];
      renderSenders();
      setStatus(els.senderStatusLine, "发送人白名单已保存", "success");
    };

    const renderSenders = () => {
      if (!senderItems.length) {
        els.senderRows.innerHTML = '<tr><td class="ai-empty" colspan="5">暂无发送人</td></tr>';
        return;
      }
      els.senderRows.innerHTML = senderItems.map((item, index) => {
        const active = item.status === "active";
        const rule = index === 0 ? "命中时优先发送" : "备选发送人";
        return `
          <tr>
            <td>${index + 1}</td>
            <td><strong>${escapeHtml(item.display_name || item.sender_userid)}</strong></td>
            <td>${escapeHtml(rule)}</td>
            <td><span class="ai-pill ${active ? "green" : "gray"}">${active ? "启用" : "停用"}</span></td>
            <td>
              <div class="ai-btns">
                <button class="ai-btn" type="button" data-sender-action="up" data-index="${index}" ${index === 0 ? "disabled" : ""}>上移</button>
                <button class="ai-btn" type="button" data-sender-action="down" data-index="${index}" ${index === senderItems.length - 1 ? "disabled" : ""}>下移</button>
                <button class="ai-btn" type="button" data-sender-action="toggle" data-index="${index}">${active ? "停用" : "启用"}</button>
                <button class="ai-btn danger" type="button" data-sender-action="delete" data-index="${index}">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      els.senderRows.querySelectorAll("[data-sender-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const index = Number(button.dataset.index);
          const action = button.dataset.senderAction;
          const next = senderItems.map((item) => ({ ...item }));
          if (action === "up" && index > 0) {
            [next[index - 1], next[index]] = [next[index], next[index - 1]];
          } else if (action === "down" && index < next.length - 1) {
            [next[index], next[index + 1]] = [next[index + 1], next[index]];
          } else if (action === "toggle") {
            next[index].status = next[index].status === "active" ? "paused" : "active";
          } else if (action === "delete") {
            next.splice(index, 1);
          }
          try {
            await saveSenders(next);
          } catch (error) {
            setStatus(els.senderStatusLine, error.message || "保存失败", "error");
          }
        });
      });
    };

    const loadSenders = async () => {
      const payload = await fetchJson(`${sendersApiUrl}?_=${Date.now()}`);
      senderItems = payload.items || [];
      renderSenders();
    };

    const addSender = async () => {
      if (!window.OperationMemberPicker || typeof window.OperationMemberPicker.open !== "function") {
        setStatus(els.senderStatusLine, "标准运营成员选择器加载失败，请刷新页面后重试", "error");
        return;
      }
      window.OperationMemberPicker.open({
        title: "选择运营人员",
        scope: "common",
        page_size: 100,
        disabledUserIds: senderItems.map((item) => item.sender_userid),
        onSelect: (member) => {
          const senderUserid = String(member.user_id || "").trim();
          if (!senderUserid) return;
          const displayName = window.OperationMemberPicker.memberLabel
            ? window.OperationMemberPicker.memberLabel(member)
            : (member.display_name || senderUserid);
          saveSenders([...senderItems, {
            sender_userid: senderUserid,
            display_name: displayName,
            status: "active"
          }]).catch((error) => setStatus(els.senderStatusLine, error.message || "保存失败", "error"));
        }
      });
    };

    const renderMembers = (payload) => {
      const items = payload.items || [];
      els.memberTotal.textContent = `共 ${formatNumber(payload.total || items.length)} 人`;
      if (!items.length) {
        els.memberRows.innerHTML = '<tr><td class="ai-empty" colspan="3">暂无成员</td></tr>';
        return;
      }
      els.memberRows.innerHTML = items.map((item) => `
        <tr>
          <td>${escapeHtml(item.nickname || "未命名客户")}</td>
          <td class="ai-mono">${escapeHtml(item.external_userid || "-")}</td>
          <td>${formatTime(item.entered_at)}</td>
        </tr>
      `).join("");
    };

    const loadMembers = async () => {
      const payload = await fetchJson(`${membersApiUrl}?limit=50&offset=0&_=${Date.now()}`);
      renderMembers(payload);
    };

    els.savePackageBtn.addEventListener("click", () => {
      savePackage().catch((error) => setStatus(els.packageStatusLine, error.message || "保存失败", "error"));
    });
    els.saveWebhookBtn.addEventListener("click", () => {
      saveWebhook().catch((error) => setStatus(els.webhookStatusLine, error.message || "保存失败", "error"));
    });
    els.rotateInboundSecretBtn.addEventListener("click", () => {
      rotateWebhookSecret().catch((error) => setStatus(els.webhookStatusLine, error.message || "重置失败", "error"));
    });
    els.addSenderBtn.addEventListener("click", () => {
      addSender().catch((error) => setStatus(els.senderStatusLine, error.message || "保存失败", "error"));
    });

    Promise.all([loadPackage(), loadWebhook(), loadSenders(), loadMembers()]).catch((error) => {
      setStatus(els.packageStatusLine, error.message || "加载失败", "error");
    });
  })();
</script>
{% endblock %}
