{% extends "admin_console/base.html" %}

{% block head_extra %}
<style>
  .gi-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:18px; }
  .gi-card h2 { margin:0; color:#111827; }
  .gi-count { color:#667085; font-size:12px; margin-top:5px; }
  .gi-toolbar { display:flex; gap:10px; align-items:center; margin:16px 0 14px; }
  .gi-input { flex:1; min-width:0; box-sizing:border-box; border:1px solid #d1d5db; border-radius:8px; padding:9px 11px; font:inherit; }
  .gi-list { display:grid; gap:10px; }
  .gi-item { border:1px solid #e5e7eb; border-radius:10px; padding:14px; }
  .gi-title { display:flex; gap:8px; align-items:center; font-weight:680; color:#111827; }
  .gi-meta { color:#667085; font-size:12px; margin-top:5px; overflow-wrap:anywhere; }
  .gi-badge { display:inline-flex; align-items:center; border-radius:999px; padding:3px 8px; font-size:11px; font-weight:650; }
  .gi-badge.ready { color:#087443; background:#ecfdf3; }
  .gi-badge.pending { color:#175cd3; background:#eff8ff; }
  .gi-badge.invalid { color:#b42318; background:#fef3f2; }
  .gi-btn { border:1px solid #d1d5db; border-radius:8px; background:#fff; padding:8px 12px; cursor:pointer; color:#344054; text-decoration:none; font:inherit; white-space:nowrap; }
  .gi-help { color:#6b7280; font-size:12px; line-height:1.6; margin:8px 0 0; }
  .gi-status { min-height:20px; margin:12px 0 0; font-size:12px; }
  .gi-status.error { color:#b42318; }
  .gi-status.success { color:#087443; }
  @media (max-width: 720px) { .gi-toolbar { align-items:stretch; flex-wrap:wrap; } .gi-input { flex-basis:100%; } }
</style>
{% endblock %}

{% block content %}
<section class="gi-card" aria-labelledby="gi-list-title" data-group-invite-settings>
  <h2 id="gi-list-title">已同步客户群</h2>
  <div class="gi-count" id="gi-count">正在加载…</div>
  <p class="gi-help">无需填写链接或参数。首次选用群聊时，系统会从企业微信自动生成并保存官方入群链接。</p>
  <div class="gi-toolbar">
    <input class="gi-input" id="gi-search" type="search" placeholder="搜索群名称、群主或 chat_id">
    <button class="gi-btn" id="gi-refresh" type="button">刷新</button>
    <a class="gi-btn" href="/admin/automation-conversion/group-ops/groups/ui">客户群同步</a>
  </div>
  <div class="gi-list" id="gi-list"><p class="gi-help">加载中…</p></div>
  <div class="gi-status" id="gi-status" role="status" aria-live="polite"></div>
</section>

<script>
(() => {
  const groupApi = '/api/admin/automation-conversion/group-ops/groups';
  const bindingApi = '/api/admin/group-invite-bindings';
  const $ = (id) => document.getElementById(id);
  const state = { groups: [], bindings: [] };
  let timer = null;
  const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
  const status = (message, kind='') => { $('gi-status').textContent = message; $('gi-status').className = `gi-status ${kind}`; };

  async function fetchJson(url, options) {
    if (window.AdminApi && typeof window.AdminApi.requestJson === 'function') return window.AdminApi.requestJson(url, options || {});
    const response = await fetch(url, options);
    const payload = await response.json().catch(() => ({}));
    const detail = payload.detail && typeof payload.detail === 'object' ? payload.detail.detail : payload.detail;
    if (!response.ok || payload.ok === false) throw new Error(payload.error || detail || '请求失败');
    return payload;
  }

  async function fetchAll(baseUrl, pageSize=100) {
    const items = [];
    let offset = 0;
    while (true) {
      const separator = baseUrl.includes('?') ? '&' : '?';
      const payload = await fetchJson(`${baseUrl}${separator}limit=${pageSize}&offset=${offset}`);
      const page = payload.items || [];
      items.push(...page);
      offset += page.length;
      if (!page.length || offset >= Number(payload.total || offset) || page.length < pageSize) break;
    }
    return items;
  }

  function bindingFor(chatId) {
    return state.bindings.find((item) => String(item.chat_id || (item.chat_id_list || [])[0] || '') === String(chatId || '')) || null;
  }

  function renderList() {
    const query = $('gi-search').value.trim().toLowerCase();
    const rows = state.groups.filter((group) => !query || `${group.group_name || ''} ${group.owner_name || ''} ${group.owner_userid || ''} ${group.chat_id || ''}`.toLowerCase().includes(query));
    const readyCount = state.groups.filter((group) => bindingFor(group.chat_id)?.binding_status === 'ready').length;
    $('gi-count').textContent = `共 ${state.groups.length} 个客户群，${readyCount} 个已可直接使用`;
    $('gi-list').innerHTML = rows.length ? rows.map((group) => {
      const binding = bindingFor(group.chat_id);
      const bindingStatus = String(binding?.binding_status || 'pending');
      const isReady = bindingStatus === 'ready';
      const isInvalid = bindingStatus === 'invalid';
      const badge = isReady ? '已可用' : isInvalid ? '群聊已失效' : '首次选用时自动生成';
      return `<article class="gi-item">
        <div class="gi-title">${escapeHtml(group.group_name || group.chat_id)} <span class="gi-badge ${isReady ? 'ready' : isInvalid ? 'invalid' : 'pending'}">${badge}</span></div>
        <div class="gi-meta">群主：${escapeHtml(group.owner_name || group.owner_userid || '未识别')} · ${Number(group.member_count || 0)} 人 · ${escapeHtml(group.chat_id)}</div>
      </article>`;
    }).join('') : '<p class="gi-help">没有匹配的客户群。若列表为空，请先进行客户群同步。</p>';
  }

  async function load({ keepStatus=false }={}) {
    if (!keepStatus) status('正在加载客户群…');
    const [groups, bindings] = await Promise.all([
      fetchAll(groupApi, 100),
      fetchAll(`${bindingApi}?enabled_only=false`, 100),
    ]);
    state.groups = groups;
    state.bindings = bindings;
    renderList();
    if (!keepStatus) status('');
  }

  $('gi-refresh').addEventListener('click', () => load().catch((error) => status(error.message || '加载失败', 'error')));
  $('gi-search').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(renderList, 180); });
  load().catch((error) => status(error.message || '加载失败', 'error'));
})();
</script>
{% endblock %}
