version: 1
status: phase_4at_workflows_fixture_native_contract_planning_no_runtime_change

route_family: /api/admin/automation-conversion/workflows*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway
current_runtime_owner: production_compat
production_behavior: legacy_forward
legacy_fallback_retained: true
fixture_allowed_in_production: false

previous_phase:
  phase: phase_4as_workflows_schema_route_surface_confirmation
  merged_pr: "#650"
  completed: true

planned_fixture_routes:
  - method: GET
    path: /api/admin/automation-conversion/workflows
    scope: fixture_local_list
  - method: POST
    path: /api/admin/automation-conversion/workflows
    scope: fixture_local_metadata_create

excluded_routes:
  - path: /api/admin/automation-conversion/workflows/{workflow_id}
    method: PUT
    reason: update_activation_relationship_change_deferred
  - path: /api/admin/automation-conversion/workflows/{workflow_id}
    method: DELETE
    reason: archive_and_relationship_change_deferred
  - path: /api/admin/automation-conversion/workflow-nodes*
    method: ALL
    reason: workflow_node_runtime_family_deferred
  - path: /api/admin/automation-conversion/tasks*
    method: ALL
    reason: task_metadata_and_execution_family_deferred
  - path: /api/admin/automation-conversion/tasks/run-due
    method: POST
    reason: timer_execution_path_forbidden
  - path: /api/admin/automation-conversion/executions*
    method: ALL
    reason: workflow_execution_records_deferred

fixture_seed:
  deterministic: true
  workflow_codes:
    - phase4at_default_workflow
    - phase4at_followup_workflow
  required_fields:
    - id
    - program_id
    - workflow_code
    - workflow_name
    - description
    - review_status
    - created_by_agent
    - status
    - segmentation_basis
    - generation_mode
    - profile_segment_template_id
    - behavior_tier_scheme
    - fallback_to_standard_content
    - enabled
    - created_by
    - updated_by
    - created_at
    - updated_at
  production_data_allowed: false

list_contract:
  query:
    - program_id
    - status
    - include_archived
  response_keys:
    - ok
    - source_status
    - route_owner
    - workflows
    - total
    - count
    - filters
    - side_effect_safety
  archived_workflows_excluded_by_default: true
  ordering: updated_at_desc_id_desc

create_contract:
  query:
    - program_id
  required_payload:
    - workflow_name
    - idempotency_key
  optional_payload:
    - workflow_code
    - description
    - program_id
    - operator
  response_keys:
    - ok
    - workflow
    - audit_event
    - rollback_payload
    - idempotent_replay
    - side_effect_safety
  missing_name_rejected: true
  duplicate_workflow_code_rejected: true
  invalid_status_rejected: true
  dangerous_fields_rejected: true

idempotency:
  route_family_scope_required: true
  operation_scope_required: true
  operator_scope_required: true
  idempotency_key_required: true
  replay_same_hash: true
  conflict_different_hash: true

audit:
  audit_event_required: true
  before_snapshot_for_create: empty_object
  after_snapshot_required: true
  rollback_payload_required: true
  side_effect_safety_required: true

side_effect_safety:
  real_external_call_allowed: false
  workflow_execution_allowed: false
  automation_execution_allowed: false
  outbound_send_allowed: false
  wecom_call_allowed: false
  openclaw_call_allowed: false
  mcp_call_allowed: false
  timer_execution_allowed: false
  production_data_allowed: false

authorizations:
  runtime_implementation_authorized: false
  staging_smoke_execution_authorized: false
  production_dry_run_execution_authorized: false
  production_data_connection_authorized: false
  production_write_authorized: false
  production_repository_route_enablement_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  workflow_execution_authorized: false
  timer_execution_authorized: false
  outbound_send_authorized: false
  canary_approval_authorized: false
  delete_ready: false

phase_execution_state_update:
  active_candidate: /api/admin/automation-conversion/workflows*
  last_merged_pr: "#650"
  last_attempted_action: phase_4at_workflows_fixture_native_contract_planning
  last_created_pr: "#651"
  recommended_next_pr: phase_4au_workflows_fixture_native_implementation_owner_decision
  owner_approval_required: true
  phase_4at_completed_step: phase_4at_workflows_fixture_native_contract_planning_completed

phase_4au_recommendation:
  recommended_next_step: workflows_fixture_native_implementation_owner_decision
  production_write_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_canary_allowed: false
  notes: Runtime implementation requires explicit owner confirmation because current autopilot low-risk scope is docs/tools/tests/state only and workflows are adjacent to execution/timer/outbound behavior.
