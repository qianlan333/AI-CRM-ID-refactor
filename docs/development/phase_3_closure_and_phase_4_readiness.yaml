phase_4_readiness:
  can_start_after_this_report: false
  requires_explicit_approval: true
  forbidden_first_batch:
    - payment
    - oauth
    - wecom_external_call
    - timer
    - automation_execution
    - media_upload
    - openclaw_mcp_real_external_call
  first_batch_candidate_rules:
    no_real_external_side_effect: true
    bounded_internal_write_only: true
    idempotency_required: true
    audit_or_operator_identity_required: true
    rollback_required: true
    fallback_retained: true
    production_smoke_required: true
    checker_required: true
next_candidates:
  - capability_owner: aicrm_next.customer_read_model
    route_family: customer profile readonly-adjacent internal metadata update
    recommendation: evaluate_only_requires_owner_approval
    why_candidate: Candidate only if it is bounded internal metadata write, has no real external side effect, and does not change sidebar/profile daily read availability.
    excluded_side_effects: [payment, oauth, wecom_external_call, timer, automation_execution, media_upload, openclaw_mcp_real_external_call]
    required_guardrails: [idempotency_or_duplicate_protection, audit_or_operator_identity, checker, production_smoke, dry_run_or_preview_if_business_impact, fallback_retained]
    rollback_requirement: Define data rollback or compensating update before implementation; retain legacy fallback until rollback is proven.
    daily_business_continuity_requirement: Must not block current customer, sidebar, profile, or customer-list daily use; fallback remains until parity, checker, smoke, rollback, and owner approval are complete.
  - capability_owner: aicrm_next.questionnaire
    route_family: questionnaire admin draft save/update only
    recommendation: evaluate_only_requires_owner_approval
    why_candidate: Candidate only if scoped to bounded admin draft persistence and explicitly excludes external push, OAuth, public H5 submit, diagnostics write, and production cutover.
    excluded_side_effects: [payment, oauth, wecom_external_call, external_push, public_submit, timer, automation_execution, media_upload, openclaw_mcp_real_external_call]
    required_guardrails: [idempotency_or_duplicate_protection, audit_or_operator_identity, checker, production_smoke, dry_run_or_preview_if_business_impact, fallback_retained]
    rollback_requirement: Define draft restore or revert path before implementation; retain legacy fallback until rollback is proven.
    daily_business_continuity_requirement: Must not interrupt current questionnaire admin or public questionnaire daily paths; fallback remains until parity, checker, smoke, rollback, and owner approval are complete.
  - capability_owner: aicrm_next.automation_engine
    route_family: automation profile-segment-template internal CRUD only
    recommendation: evaluate_only_requires_owner_approval
    why_candidate: Candidate only if scoped to template metadata CRUD and explicitly excludes run-due, execution, send, external assistant calls, and timer behavior.
    excluded_side_effects: [payment, oauth, wecom_external_call, run_due, send, timer, automation_execution, media_upload, openclaw_mcp_real_external_call]
    required_guardrails: [idempotency_or_duplicate_protection, audit_or_operator_identity, checker, production_smoke, dry_run_or_preview_if_business_impact, fallback_retained]
    rollback_requirement: Define template restore or revert path before implementation; retain legacy fallback until rollback is proven.
    daily_business_continuity_requirement: Must not interrupt current automation workspace daily use or execution-safe mode; fallback remains until parity, checker, smoke, rollback, and owner approval are complete.
