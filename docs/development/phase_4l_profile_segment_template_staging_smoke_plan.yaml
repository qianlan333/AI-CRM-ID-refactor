version: 1
status: phase_4l_staging_smoke_planning_only_no_runtime_change
staging_smoke_execution_authorized: false
production_data_allowed: false
production_repository_enablement_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

route_family: /api/admin/automation-conversion/profile-segment-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

staging_prerequisites:
  db_url_required: true
  db_url_allowed_markers:
    - staging
    - stage
    - test
    - local
    - dev
  companion_tables_required: true
  main_tables_required: true
  feature_flags_required:
    - AICRM_PROFILE_SEGMENT_TEMPLATE_REPO_BACKEND
    - AICRM_PROFILE_SEGMENT_TEMPLATE_DATABASE_URL
  production_route_owner_unchanged: true
  production_compat_retained: true

smoke_matrix:
  read:
    - catalog
    - list
    - options
    - detail
  write:
    - create_with_idempotency
    - create_replay
    - create_conflict
    - duplicate_template_rejected
    - update_existing
    - update_missing
    - invalid_payload_rejected
    - dangerous_field_rejected
    - audit_log_created
    - rollback_payload_present
    - side_effect_safety_false
    - fallback_unchanged

safe_namespace:
  template_code_prefix: phase4l_staging_smoke_
  operator: phase4l_staging_smoke_operator
  idempotency_key_prefix: phase4l_staging_smoke_
  cleanup_strategy: use compensating status/field revert inside the safe namespace; deletion requires separate owner approval
  delete_required: false

execution_rules:
  manual_approval_required: true
  run_in_ci_by_default: false
  production_db_forbidden: true
  external_calls_forbidden: true
  automation_execution_forbidden: true
  outbound_send_forbidden: true
  customer_pool_state_change_forbidden: true

failure_handling:
  stop_on_first_write_failure: true
  feature_flag_disable_required: true
  rollback_required: true
  audit_review_required: true
  fallback_validation_required: true

owner_approval:
  automation_engine_owner: pending
  integration_gateway_owner: pending
  db_config_owner: pending
  business_owner: pending
  rollback_owner: pending
  smoke_operator: pending

phase_4m_recommendation:
  recommended_next_step: staging_smoke_harness_or_execution_package
  production_dry_run_allowed: false
  production_route_switch_allowed: false
  production_write_canary_allowed: false
  notes: Phase 4M may package a staging smoke harness or execution runbook after owner approval; it must not use production data or switch production route ownership.
