confirmed_schema:
  main_table: automation_operation_task
  columns:
    - id
    - program_id
    - group_id
    - task_name
    - description
    - status
    - trigger_type
    - send_time
    - timezone
    - target_audience_code
    - target_stage_code
    - audience_day_offset
    - behavior_filter
    - content_mode
    - profile_segment_template_id
    - unified_content_json
    - segment_contents_json
    - agent_config_json
    - created_by
    - updated_by
    - created_at
    - updated_at
    - published_at
  indexes:
    - idx_automation_operation_task_program
    - idx_automation_operation_task_group
  related_tables:
    - automation_operation_task_group
    - automation_operation_task_execution
    - automation_operation_task_execution_item
    - automation_profile_segment_template
  relationship_behavior:
    group_id_on_delete: set_null
    program_id_on_delete: cascade
    execution_tables_excluded_from_metadata_subset: true

confirmed_contract:
  list:
    query:
      - program_id
      - group_id
      - keyword
      - status
    response_keys:
      - ok
      - groups
      - tasks
      - behavior_tiers
      - targetable_stages
    archived_tasks_excluded_by_default: true
    ordering: group_sort_order_asc_updated_at_desc_id_desc
  create:
    query:
      - program_id
    required_payload:
      - task_name
    optional_payload:
      - group_id
      - description
      - status
      - trigger_type
      - send_time
      - timezone
      - target_audience_code
      - target_stage_code
      - audience_day_offset
      - behavior_filter
      - content_mode
      - profile_segment_template_id
      - unified_content_json
      - segment_contents_json
      - agent_config_json
    success_status: 201
    response_keys:
      - ok
      - task
    invalid_payload_status: 400

