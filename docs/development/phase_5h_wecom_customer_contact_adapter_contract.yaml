version: 1
status: phase_5h_wecom_customer_contact_adapter_contract_no_live_callback
bundle_type: phase_5_external_adapter_contract_bundle
route_family: /wecom/external-contact/callback
capability_owner: aicrm_next.integration_gateway

authorizations:
  live_wecom_callback_cutover_authorized: false
  production_callback_owner_switch_authorized: false
  production_contact_write_authorized: false
  production_identity_mapping_write_authorized: false
  production_tag_write_authorized: false
  outbound_send_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  oauth_callback_cutover_authorized: false
  payment_behavior_authorized: false
  media_live_upload_authorized: false
  openclaw_mcp_live_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  canary_approved: false
  delete_ready: false

adapter_contract:
  methods:
    - name: verify_callback_contract
      live_callback_allowed: false
      adapter_mode: fake_stub_contract
    - name: parse_external_contact_event
      live_callback_allowed: false
      adapter_mode: fake_stub_contract
    - name: normalize_external_contact_event
      live_callback_allowed: false
      adapter_mode: fake_stub_contract
    - name: dry_run_record_contact_event
      live_callback_allowed: false
      idempotency_required: true
      adapter_mode: fake_stub_contract
    - name: dry_run_identity_mapping
      live_callback_allowed: false
      idempotency_required: true
      adapter_mode: fake_stub_contract

fake_stub_contract:
  deterministic_events_required: true
  wecom_secret_required: false
  corp_id_required: false
  token_usage_allowed: false
  aes_key_usage_allowed: false
  decrypt_required: false
  network_call_allowed: false
  db_write_allowed: false
  production_success_claim_allowed: false

error_mapping:
  required_error_codes:
    - callback_config_missing
    - signature_invalid
    - decrypt_not_enabled
    - event_type_unsupported
    - external_userid_missing
    - follow_user_userid_missing
    - idempotency_key_required
    - duplicate_event_key
    - live_callback_not_enabled
    - adapter_unavailable
    - forbidden_in_production_without_approval

idempotency_policy:
  event_key_required: true
  idempotency_key_required_for_write_like_dry_run: true
  replay_same_event_key: true
  conflict_different_hash: true
  no_partial_production_side_effect: true

evidence_policy:
  live_callback_processed_field_required: true
  production_write_executed_field_required: true
  side_effect_safety_required: true
  operator_required: true
  request_hash_required: true
  external_userid_redaction_required: true
  timestamp_required: true

side_effect_safety:
  live_callback_cutover_allowed: false
  production_contact_write_allowed: false
  production_identity_mapping_write_allowed: false
  production_tag_write_allowed: false
  outbound_send_allowed: false
  token_refresh_allowed: false
  customer_sync_allowed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  no_external_side_effect_enabled: true
  fake_stub_contract_only: true

next_bundle:
  recommended_next_step: phase_5i_wecom_customer_contact_fake_stub_adapter_bundle
  route_family: /wecom/external-contact/callback
