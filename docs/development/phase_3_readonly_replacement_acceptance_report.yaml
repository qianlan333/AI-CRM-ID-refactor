next_candidates:
  - route_pattern: /admin
    category: shell_or_navigation
    recommendation: evaluate_only
    reason: Low-risk shell/navigation candidate with no direct external side effect; still daily-business-critical and must keep fallback until parity, checker, smoke, rollback, and owner approval are complete.
    excluded_side_effects: [write, payment, oauth, wecom, archive_sync, timer, automation_execution]
  - route_pattern: /admin/customers
    category: shell_or_navigation
    recommendation: evaluate_only
    reason: Customer admin shell/navigation candidate; touches daily customer operations, so fallback must remain until parity, checker, smoke, rollback, and owner approval are complete.
    excluded_side_effects: [write, payment, oauth, wecom, archive_sync, timer, automation_execution]
  - route_pattern: /sidebar/bind-mobile
    category: shell_or_navigation
    recommendation: evaluate_only
    reason: Readonly shell/page candidate, but adjacent bind-mobile write API remains out of scope; fallback must remain until parity, checker, smoke, rollback, and owner approval are complete.
    excluded_side_effects: [write, payment, oauth, wecom, archive_sync, timer, automation_execution]
  - route_pattern: /admin/questionnaires
    category: readonly_admin_page
    recommendation: evaluate_only
    reason: Admin questionnaire page can be evaluated as readonly navigation; submit, OAuth, public H5 write, and diagnostics write paths are explicitly excluded.
    excluded_side_effects: [questionnaire_submit, oauth, write, payment, wecom, timer, automation_execution]
  - route_pattern: Payment / OAuth / WeCom / media upload / timer / automation execution
    category: defer
    recommendation: defer
    reason: These route families include external side effects, upload, write, timer, or automation execution risk and must remain outside Phase 3 acceptance scope.
    excluded_side_effects: [payment, oauth, wecom, media_upload, timer, automation_execution, archive_sync]
