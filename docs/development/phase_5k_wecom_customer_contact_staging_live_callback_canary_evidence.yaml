  default_blocked: true
  required_env:
    - AICRM_WECOM_CONTACT_CALLBACK_LIVE_ADAPTER_ENABLED
    - AICRM_WECOM_CONTACT_CALLBACK_LIVE_PROCESSING_APPROVED
    - AICRM_WECOM_CONTACT_CALLBACK_CONFIG_REVIEWED
    - AICRM_PHASE5K_WECOM_CONTACT_STAGING_CANARY_APPROVED
    - AICRM_PHASE5K_WECOM_CONTACT_STAGING_CANARY_TARGET_APPROVED
  required_args:
    - --execute-staging-canary
    - --confirm-live-wecom-callback
    - --confirm-staging-only
    - --confirm-approved-event
    - --idempotency-key
    - --external-userid
    - --event-key

target_safety:
  single_external_userid_only: true
  single_event_only: true
  batch_targets_allowed: false
  batch_events_allowed: false
  target_approval_required: true
  external_userid_redaction_required: true
  raw_token_output_forbidden: true
  raw_secret_output_forbidden: true
  raw_aes_key_output_forbidden: true

side_effect_safety:
  production_callback_cutover_allowed: false
  production_contact_write_allowed: false
  production_identity_mapping_write_allowed: false
  production_tag_write_allowed: false
  outbound_send_allowed: false
  oauth_callback_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

production_readiness_review:
  runner: tools/run_phase5k_wecom_customer_contact_production_callback_readiness_review.py
  production_live_callback_processed: false
  production_contact_write_executed: false
  production_identity_mapping_write_executed: false
  requires_staging_evidence_json: true

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true

next_bundle:
  recommended_next_step: phase_5l_wecom_customer_contact_production_callback_canary_readiness_bundle
  route_family: /wecom/external-contact/callback
