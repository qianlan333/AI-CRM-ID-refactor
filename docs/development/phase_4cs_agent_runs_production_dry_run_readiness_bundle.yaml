version: 1
status: phase_4cs_agent_runs_production_readonly_dry_run_readiness
bundle_type: production_readonly_dry_run_readiness_bundle
route_family: /api/admin/automation-conversion/agent-runs*
capability_owner: aicrm_next.automation_engine

authorizations:
  production_owner_switch_authorized: false
  production_write_authorized: false
  production_repository_route_enablement_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  real_external_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  workflow_execution_authorized: false
  task_execution_authorized: false
  agent_execution_authorized: false
  outbound_send_authorized: false
  llm_deepseek_openclaw_mcp_authorized: false
  destructive_migration_authorized: false
  canary_approved: false
  delete_ready: false

runner:
  path: tools/run_phase4cs_agent_runs_production_readonly_dry_run.py
  default_result: blocked_evidence
  required_env:
    - AICRM_PHASE4CS_PRODUCTION_READONLY_DRY_RUN_APPROVED
    - AICRM_PHASE4CS_PRODUCTION_CONFIG_REVIEWED
    - AICRM_AGENT_RUNS_REPO_BACKEND
    - AICRM_AGENT_RUNS_READONLY_DRY_RUN_DATABASE_URL
  required_args:
    - --read-only
    - --confirm-no-writes
  forbidden_fallbacks:
    - DATABASE_URL
    - test_database_url
    - staging_database_url
    - fixture
    - local_contract
    - demo

read_only_scope:
  allowed:
    - shape_summary
    - count_summary
    - redacted_field_presence_summary
  forbidden:
    - create
    - update
    - delete
    - run_due
    - agent_run_execution
    - replay
    - task_execution
    - workflow_execution
    - timer_execution
    - outbound_send
    - external_call
    - llm_call
    - deepseek_call
    - openclaw_call
    - mcp_call
    - raw_payload_export
    - pii_export

business_continuity:
  production_owner_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_live_behavior_change: true

next_bundle:
  recommended_next_step: phase_4ct_agent_outputs_production_dry_run_readiness_bundle
  route_family: /api/admin/automation-conversion/agent-outputs*
