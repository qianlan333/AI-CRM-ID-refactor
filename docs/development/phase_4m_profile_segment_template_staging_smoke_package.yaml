version: 1
status: phase_4m_staging_smoke_package_no_execution_no_production_change
staging_smoke_execution_authorized: false
production_data_allowed: false
production_repository_enablement_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

runner:
  path: tools/run_phase4m_profile_segment_template_staging_smoke.py
  default_mode: dry_run
  execute_writes_requires_flag: true
  required_env:
    - AICRM_PROFILE_SEGMENT_TEMPLATE_STAGING_DATABASE_URL
    - AICRM_PROFILE_SEGMENT_TEMPLATE_REPO_BACKEND
  forbidden_env_fallbacks:
    - DATABASE_URL

db_url_safety:
  allowed_markers:
    - staging
    - stage
    - test
    - local
    - dev
  forbidden_markers:
    - prod
    - production
    - primary
    - master
  fail_if_allowed_and_forbidden_both_present: true

safe_namespace:
  template_code_prefix: phase4m_staging_smoke_
  operator: phase4m_staging_smoke_operator
  idempotency_key_prefix: phase4m_staging_smoke_
  delete_required: false

smoke_matrix:
  read:
    - catalog
    - list
    - options
    - detail
  write:
    - create_with_idempotency
    - create_replay
    - create_conflict
    - duplicate_template_rejected
    - update_existing
    - update_missing
    - invalid_payload_rejected
    - dangerous_field_rejected
    - audit_log_created
    - rollback_payload_present
    - side_effect_safety_false

side_effect_safety:
  external_calls_allowed: false
  automation_execution_allowed: false
  outbound_send_allowed: false
  route_owner_change_allowed: false

phase_4n_recommendation:
  recommended_next_step: staging_smoke_execution_or_owner_approval_package
  staging_smoke_execution_allowed_without_owner_approval: false
  production_dry_run_allowed: false
  production_route_switch_allowed: false
  notes: Phase 4N may execute staging smoke or first package owner approval; it must not connect production data or switch production route ownership.
