  no_database_url_fallback: true
  route_specific_readonly_dry_run_db_required: true
  default_backend_fixture_local: true
  production_owner_switch_authorized: false
  production_repository_route_enablement_authorized: false
  production_write_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  destructive_migration_authorized: false
  real_external_call_authorized: false
  timer_execution_authorized: false
  workflow_execution_authorized: false
  task_execution_authorized: false
  outbound_send_authorized: false
  canary_approval: false
  delete_ready: false

