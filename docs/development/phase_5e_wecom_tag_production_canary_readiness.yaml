version: 1
status: phase_5e_wecom_tag_production_canary_readiness_no_execution
bundle_type: phase_5_external_adapter_production_canary_readiness_bundle
route_family: /api/admin/wecom/tags*
capability_owner: aicrm_next.customer_tags
integration_boundary: aicrm_next.integration_gateway

authorizations:
  production_canary_execution_authorized: false
  production_live_wecom_call_authorized: false
  production_tag_write_authorized: false
  production_owner_switch_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  outbound_send_authorized: false
  oauth_callback_cutover_authorized: false
  payment_behavior_authorized: false
  media_live_upload_authorized: false
  openclaw_mcp_live_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  delete_ready: false

readiness_runner:
  path: tools/run_phase5e_wecom_tag_production_canary_readiness.py
  default_blocked: true
  production_live_call_executed: false
  production_tag_write_executed: false
  requires_staging_evidence_json: true
  required_env:
    - AICRM_PHASE5E_WECOM_TAG_PRODUCTION_CANARY_PLANNING_APPROVED
    - AICRM_PHASE5E_WECOM_TAG_PRODUCTION_CONFIG_REVIEWED
    - AICRM_PHASE5E_WECOM_TAG_ROLLBACK_OWNER_APPROVED
    - AICRM_PHASE5E_WECOM_TAG_TARGET_POLICY_REVIEWED
  required_args:
    - --staging-evidence-json
    - --confirm-no-production-live-call
    - --confirm-no-production-tag-write

staging_evidence_requirements:
  required: true
  blocked_evidence_qualifies: false
  must_be_redacted: true
  must_not_include_secret_or_token: true
  must_include_side_effect_safety: true

production_target_policy:
  single_target_only: true
  single_tag_only: true
  batch_targets_allowed: false
  customer_pool_target_allowed: false
  automatic_segment_target_allowed: false
  outbound_send_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false
  external_userid_redaction_required: true

rollback_policy:
  rollback_owner_required: true
  cleanup_requires_explicit_approval: true
  cleanup_limited_to_same_target_and_same_tag: true
  cleanup_evidence_required: true
  automatic_cleanup_allowed: false
  batch_cleanup_allowed: false

side_effect_safety:
  outbound_send_allowed: false
  oauth_callback_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_live_behavior_change: true

next_bundle:
  recommended_next_step: phase_5f_wecom_tag_production_live_canary_execution_bundle
  route_family: /api/admin/wecom/tags*
