version: 1
status: phase_4aj_action_templates_staging_smoke_package_no_production_change

authorizations:
  staging_smoke_execution_authorized: false
  production_repository_route_enablement_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  automation_execution_authorized: false
  outbound_send_authorized: false
  production_write_authorized: false
  delete_ready: false

route_family: /api/admin/automation-conversion/action-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

runner:
  path: tools/run_phase4aj_action_templates_staging_smoke.py
  mode: staging_smoke_package
  required_env:
    - AICRM_ACTION_TEMPLATES_STAGING_DATABASE_URL
  write_approval_env:
    - AICRM_PHASE4AJ_STAGING_WRITE_APPROVED
  forbidden_env_fallbacks:
    - DATABASE_URL
    - AICRM_ACTION_TEMPLATES_DATABASE_URL
    - AICRM_ACTION_TEMPLATES_TEST_DATABASE_URL
  db_url_allowed_markers:
    - staging
    - stage
    - test
    - local
    - dev
  db_url_forbidden_markers:
    - prod
    - production
    - primary
    - master
  production_data_allowed: false
  route_owner_change_allowed: false

safe_namespace:
  template_code_prefix: phase4aj_staging_smoke_
  operator: phase4aj_staging_smoke_operator
  idempotency_key_prefix: phase4aj_staging_smoke_
  delete_required: false

smoke_matrix:
  read:
    - schema_available
    - list_action_templates
  write:
    - create_with_idempotency
    - idempotency_replay
    - idempotency_conflict
    - duplicate_template_code_rejected
    - missing_name_rejected
    - invalid_status_rejected
    - dangerous_fields_rejected
    - audit_event_emitted
    - rollback_payload_present
    - side_effect_safety_false

excluded:
  generate_route_excluded: true
  from_workflow_route_excluded: true
  detail_route_excluded: true
  update_route_excluded: true
  delete_route_excluded: true
  deepseek_llm_adapter_excluded: true
  workflow_execution_excluded: true
  outbound_send_excluded: true
  wecom_openclaw_mcp_excluded: true

owner_approval:
  automation_engine_owner: pending
  integration_gateway_owner: pending
  staging_db_config_owner: pending
  rollback_owner: pending
  smoke_operator: pending

phase_4ak_recommendation:
  recommended_next_step: staging_smoke_execution_evidence_or_owner_approval_package
  production_write_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_canary_allowed: false
  notes: Phase 4AK may execute staging smoke with owner approval or prepare owner approval evidence; production owner switch and external calls remain unauthorized.
