    - source_status
    - route_owner
    - rows
    - total
    - filters
    - side_effect_safety
  required_row_fields:
    - replay_request_id
    - source_run_id
    - request_id
    - agent_code
    - trigger_source
    - replay_status
    - replay_mode
    - requested_by
    - requested_at
    - updated_at
    - blocked_reason
    - side_effects_enabled
  optional_row_fields:
    - duration_ms
    - error_code
    - error_message
    - masked_input_ref
    - masked_output_ref
    - metadata
  fixture_seed_rows:
    - replay_request_id: phase4by_replay_preview_completed
      replay_status: completed_metadata_only
      side_effects_enabled: false
      blocked_reason: replay_execution_not_enabled
    - replay_request_id: phase4by_replay_preview_blocked
      replay_status: blocked_metadata_only
      side_effects_enabled: false
      blocked_reason: owner_approval_required_for_replay_runtime
  related_tables_deferred:
