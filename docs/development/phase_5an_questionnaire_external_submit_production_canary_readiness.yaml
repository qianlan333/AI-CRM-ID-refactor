  required_args:
    - --staging-evidence-json
    - --idempotency-key
    - --slug
    - --submission-id
    - --confirm-no-production-owner-switch
    - --confirm-no-production-write
    - --confirm-no-production-tag-write
    - --confirm-no-outbound-send
    - --confirm-single-approved-target

