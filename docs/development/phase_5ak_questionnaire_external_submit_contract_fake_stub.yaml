  production_compat_change_authorized: false
  fallback_removal_authorized: false
  payment_behavior_authorized: false
  media_live_upload_authorized: false
  wecom_live_call_authorized: false
  openclaw_mcp_live_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  delete_ready: false

adapter_contract:
  methods:
    - deterministic_fake_public_submission
    - validate_external_submit
    - dry_run_public_submit
    - dry_run_identity_mapping
    - dry_run_tag_writeback

fake_stub_contract:
  deterministic_submission_required: true
  external_userid_redaction_required: true
  openid_redaction_required: true
  unionid_redaction_required: true
  network_call_allowed: false
  db_write_allowed: false
  production_success_claim_allowed: false

idempotency_policy:
  dry_run_public_submit_requires_key: true
  dry_run_identity_mapping_requires_key: true
  dry_run_tag_writeback_requires_key: true
  replay_same_hash: true
  conflict_different_hash: true

side_effect_safety:
  production_public_submit_write_allowed: false
  production_identity_write_allowed: false
  production_tag_write_allowed: false
  live_oauth_callback_cutover_allowed: false
  outbound_send_allowed: false
  batch_tag_write_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  wecom_call_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

readiness_runners:
  staging:
    path: tools/run_phase5ak_questionnaire_external_submit_fake_stub_staging_smoke.py
    default_blocked: true
    required_env:
      - AICRM_PHASE5AK_QUESTIONNAIRE_STAGING_FAKE_STUB_APPROVED
  production_dry_run:
    path: tools/run_phase5ak_questionnaire_external_submit_fake_stub_production_dry_run.py
    default_blocked: true
    required_env:
      - AICRM_PHASE5AK_QUESTIONNAIRE_PRODUCTION_DRY_RUN_APPROVED
      - AICRM_PHASE5AK_QUESTIONNAIRE_PRODUCTION_CONFIG_REVIEWED
    required_args:
      - --dry-run
      - --confirm-no-production-write

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_external_side_effect_enabled: true

next_bundle:
  recommended_next_step: phase_5al_questionnaire_external_submit_live_adapter_behind_flag_bundle
  route_family: /api/h5/questionnaires*
