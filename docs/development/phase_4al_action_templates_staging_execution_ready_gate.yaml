  phase_4ak_default_blocked_missing_staging_db: true
  staging_smoke_executed: false

closure_form:
  automation_engine_owner_approval: pending
  integration_gateway_owner_approval: pending
  staging_db_config_owner_approval: pending
  rollback_owner_assigned: pending
  smoke_operator_assigned: pending
  staging_db_env_confirmed: pending
  staging_db_url_safety_confirmed: pending
