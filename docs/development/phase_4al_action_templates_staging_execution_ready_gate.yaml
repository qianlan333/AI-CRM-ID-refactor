  production_route_switch_forbidden: true
  fallback_removal_forbidden: true
  production_compat_change_forbidden: true
  external_calls_forbidden: true
  generate_from_workflow_forbidden: true
  update_delete_forbidden: true

phase_4am_recommendation:
  recommended_next_step: staging_approval_config_closure_or_staging_smoke_execution_evidence
  production_write_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_canary_allowed: false
