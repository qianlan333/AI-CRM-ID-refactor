version: 1
status: phase_4d_planning_only_no_runtime_change
production_repository_implementation_authorized: false
migration_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

route_family: /api/admin/automation-conversion/profile-segment-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

scope:
  planned_routes:
    - method: GET
      path: /api/admin/automation-conversion/profile-segment-templates/catalog
      action: catalog_read
    - method: GET
      path: /api/admin/automation-conversion/profile-segment-templates
      action: list_templates
    - method: GET
      path: /api/admin/automation-conversion/profile-segment-templates/options
      action: list_options
    - method: GET
      path: /api/admin/automation-conversion/profile-segment-templates/{template_id}
      action: get_detail
    - method: POST
      path: /api/admin/automation-conversion/profile-segment-templates
      action: create_internal_metadata_template
    - method: PUT
      path: /api/admin/automation-conversion/profile-segment-templates/{template_id}
      action: update_internal_metadata_template
  forbidden:
    - delete
    - run_due
    - automation_execution
    - outbound_send
    - wecom_external_call
    - openclaw_call
    - mcp_real_call
    - timer
    - workflow_activation
    - customer_pool_state_change
    - fallback_removal

legacy_discovery:
  status: documented
  controllers:
    - name: api_admin_automation_conversion_profile_segment_catalog
      path: wecom_ability_service/http/automation_conversion_templates.py
    - name: api_admin_automation_conversion_profile_segment_templates
      path: wecom_ability_service/http/automation_conversion_templates.py
    - name: api_admin_automation_conversion_profile_segment_template_options
      path: wecom_ability_service/http/automation_conversion_templates.py
    - name: api_admin_automation_conversion_profile_segment_template_detail
      path: wecom_ability_service/http/automation_conversion_templates.py
    - name: api_admin_automation_conversion_profile_segment_template_create
      path: wecom_ability_service/http/automation_conversion_templates.py
    - name: api_admin_automation_conversion_profile_segment_template_update
      path: wecom_ability_service/http/automation_conversion_templates.py
  services:
    - name: list_conversion_profile_segment_catalog
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
    - name: list_conversion_profile_segment_templates
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
    - name: list_conversion_profile_segment_template_options
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
    - name: get_conversion_profile_segment_template_bundle
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
    - name: create_conversion_profile_segment_template
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
    - name: update_conversion_profile_segment_template
      path: wecom_ability_service/domains/automation_conversion/workflow_service.py
  tables:
    - name: automation_profile_segment_template
      status: documented_in_schema_postgres
    - name: automation_profile_segment_category
      status: documented_in_schema_postgres
    - name: automation_profile_segment_option_mapping
      status: documented_in_schema_postgres
    - name: questionnaires
      status: referenced_by_template_foreign_key
    - name: questionnaire_questions
      status: referenced_by_template_and_mapping_foreign_key
    - name: questionnaire_options
      status: referenced_by_mapping_foreign_key
  unknowns:
    - item: production idempotency key storage is not present in current legacy table shape
    - item: dedicated audit event table for profile segment template writes is not confirmed
    - item: exact production operator identity source for Next adapter requires owner confirmation
    - item: safe test namespace or dry-run mechanics for production smoke require owner confirmation

repository_strategy:
  options:
    - id: reuse_legacy_tables
      recommendation: preferred_first_adapter_after_schema_discovery
      pros:
        - avoids data copy and dual-source drift
        - preserves existing automation workspace data shape
        - keeps rollback to production_compat straightforward
        - minimizes migration blast radius
      cons:
        - Next adapter must preserve legacy validation and bundle shape
        - idempotency and audit gaps may require companion planning
        - legacy category replace behavior uses delete and reinsert semantics
      risks:
        - incomplete parity could break daily automation configuration pages
        - write rollback depends on before snapshot and existing table history
        - schema assumptions must be verified against production before implementation
    - id: new_next_tables
      recommendation: defer_until_adapter_insufficient
      pros:
        - can model idempotency, audit, and rollback natively
        - can isolate Next-owned contract from legacy table quirks
      cons:
        - requires migration and backfill plan
        - introduces dual-source or sync risk
        - rollback and fallback become more complex
      risks:
        - higher production continuity risk
        - requires schema change, backup, migration smoke, and cutover orchestration
        - greater risk of legacy vs Next parity drift
  selected_strategy: reuse_legacy_tables
  selection_status: pending_owner_approval

route_ownership_strategy:
  production_switch_in_phase_4d: false
  recommended_sequence:
    - keep_production_compat_owner
    - implement_or_plan_production_repository
    - parity_check
    - read_only_flag
    - write_flag
    - narrow_production_compat_later
  fallback_retained: true

parity_plan:
  required:
    - list_parity
    - detail_parity
    - catalog_options_parity
    - validation_error_parity
    - idempotency_behavior_check
    - audit_rollback_check
  write_dual_run_authorized: false

production_smoke_plan:
  required:
    - read_catalog
    - read_list
    - read_options
    - read_detail
    - create_dry_run_or_safe_namespace
    - update_dry_run_or_safe_template
    - invalid_payload_rejected
    - dangerous_fields_rejected
    - no_external_side_effect
    - fallback_available

rollback_plan:
  required:
    - route_owner_rollback_to_production_compat
    - feature_flag_disable_if_later_added
    - data_rollback_path
    - audit_review
    - backup_or_snapshot_if_db_write
    - rollback_owner_on_call

phase_4e_entry_conditions:
  phase_4d_plan_merged: true
  legacy_schema_discovery_complete: false
  repository_strategy_selected: false
  owner_approval_required: true
  production_config_review_required: true
  rollback_owner_required: true
