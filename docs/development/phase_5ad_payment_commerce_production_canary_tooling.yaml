  delete_ready: false

production_canary_tooling:
  runner: tools/run_phase5ad_payment_commerce_production_canary_tooling.py
  default_blocked: true
  single_synthetic_target_only: true
  batch_target_allowed: false
  requires_phase5ac_readiness_json: true
  requires_staging_evidence_json: true
  no_real_money_movement_required: true
  required_env:
    - AICRM_PHASE5AD_PAYMENT_COMMERCE_PRODUCTION_CANARY_APPROVED
    - AICRM_PHASE5AD_PAYMENT_COMMERCE_TARGET_APPROVED
    - AICRM_PHASE5AD_PAYMENT_COMMERCE_FINANCE_OWNER_APPROVED
    - AICRM_PHASE5AD_PAYMENT_COMMERCE_ROLLBACK_OWNER_APPROVED
    - AICRM_PHASE5AD_PAYMENT_COMMERCE_CLEANUP_STRATEGY_APPROVED
  required_args:
    - --phase5ac-readiness-json
    - --staging-evidence-json
    - --synthetic-target-id
    - --idempotency-key
    - --confirm-production-canary-tooling
    - --confirm-single-approved-target
    - --confirm-no-real-money-movement
    - --confirm-no-production-order-mutation
    - --confirm-no-webhook-cutover
    - --confirm-no-batch-target

cleanup:
  runner: tools/run_phase5ad_payment_commerce_production_canary_cleanup.py
  default_blocked: true
  cleanup_requires_explicit_approval: true
  cleanup_evidence_required: true
  production_order_cleanup_allowed: false
  provider_refund_allowed: false
  batch_cleanup_allowed: false
  automatic_cleanup_allowed: false

side_effect_safety:
  production_provider_call_allowed: false
  real_payment_capture_allowed: false
  real_refund_allowed: false
  real_settlement_allowed: false
  real_charge_allowed: false
  production_payment_webhook_cutover_allowed: false
  production_order_state_mutation_allowed: false
  financial_reconciliation_mutation_allowed: false
  raw_secret_output_allowed: false
  token_persistence_allowed: false
  outbound_send_allowed: false
  media_upload_allowed: false
  oauth_callback_allowed: false
  wecom_call_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_real_money_movement: true
  webhook_owner_unchanged: true

next_bundle:
