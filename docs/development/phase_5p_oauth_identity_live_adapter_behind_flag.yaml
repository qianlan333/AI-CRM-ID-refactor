    - state
    - operator
    - idempotency_key
  methods:
    - build_authorize_url_live
    - exchange_code_live

side_effect_safety:
  production_callback_cutover_allowed: false
  production_session_write_allowed: false
  production_identity_write_allowed: false
  outbound_send_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  wecom_live_call_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

staging_evidence:
  runner: tools/run_phase5p_oauth_identity_live_staging_evidence.py
  default_blocked: true
  dry_run_gate_supported: true
  execute_live_staging_requires_approval: true

production_dry_run_gate:
  runner: tools/run_phase5p_oauth_identity_live_production_dry_run_gate.py
  live_oauth_call_executed: false
  production_session_write_executed: false
  production_identity_write_executed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true

next_bundle:
