route_family: /api/h5/wechat/oauth*
capability_owner: aicrm_next.integration_gateway
integration_boundary: aicrm_next.integration_gateway

authorizations:
  live_oauth_adapter_code_authorized: true
  live_oauth_callback_by_default_authorized: false
  production_callback_cutover_authorized: false
  production_callback_owner_switch_authorized: false
  production_session_write_authorized: false
  production_identity_write_authorized: false
  outbound_send_authorized: false
  production_compat_change_authorized: false
