version: 1
status: phase_4bc_tasks_fixture_native_contract_planning_no_runtime_change

route_family: /api/admin/automation-conversion/tasks*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway
current_runtime_owner: production_compat
production_behavior: legacy_forward
legacy_fallback_retained: true
fixture_allowed_in_production: false

previous_phase:
  phase: phase_4bb_tasks_schema_route_surface_confirmation
  merged_pr: "#659"
  completed: true

planned_fixture_routes:
  - method: GET
    path: /api/admin/automation-conversion/tasks
    scope: fixture_local_list
  - method: POST
    path: /api/admin/automation-conversion/tasks
    scope: fixture_local_metadata_create

excluded_routes:
  - path: /api/admin/automation-conversion/tasks/{task_id}
    method: GET
    reason: detail_contract_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}
    method: PUT
    reason: update_contract_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}
    method: DELETE
    reason: archive_contract_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}/copy
    method: POST
    reason: copy_contract_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}/activate
    method: POST
    reason: activation_changes_runtime_state_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}/pause
    method: POST
    reason: pause_changes_runtime_state_deferred
  - path: /api/admin/automation-conversion/tasks/{task_id}/preview-audience
    method: POST
    reason: preview_audience_deferred
  - path: /api/admin/automation-conversion/tasks/run-due
    method: POST
    reason: timer_execution_path_forbidden
  - path: /api/admin/automation-conversion/executions*
    method: ALL
    reason: execution_tables_and_side_effects_deferred

fixture_seed:
  deterministic: true
  task_codes:
    - phase4bc_daily_followup_task
    - phase4bc_audience_entered_task
  required_fields:
    - id
    - program_id
    - group_id
    - task_name
    - description
    - status
    - trigger_type
    - send_time
    - timezone
    - target_audience_code
    - target_stage_code
    - audience_day_offset
    - behavior_filter
    - content_mode
    - profile_segment_template_id
    - unified_content_json
    - segment_contents_json
    - agent_config_json
    - created_by
    - updated_by
    - created_at
    - updated_at
    - published_at
  production_data_allowed: false

list_contract:
  query:
    - program_id
    - group_id
    - keyword
    - status
  response_keys:
    - ok
    - source_status
    - route_owner
    - groups
    - tasks
    - total
    - count
    - filters
    - behavior_tiers
    - targetable_stages
    - side_effect_safety
  archived_tasks_excluded_by_default: true
  ordering: group_sort_order_asc_updated_at_desc_id_desc

create_contract:
  query:
    - program_id
  required_payload:
    - task_name
    - idempotency_key
  optional_payload:
    - group_id
    - description
    - status
    - trigger_type
    - send_time
    - timezone
    - target_audience_code
    - target_stage_code
    - audience_day_offset
    - behavior_filter
    - content_mode
    - profile_segment_template_id
    - unified_content_json
    - segment_contents_json
    - agent_config_json
    - operator
  response_keys:
    - ok
    - task
    - audit_event
    - rollback_payload
    - idempotent_replay
    - side_effect_safety
  missing_name_rejected: true
  invalid_status_rejected: true
  dangerous_fields_rejected: true
  execution_fields_rejected: true

idempotency:
  route_family_scope_required: true
  operation_scope_required: true
  operator_scope_required: true
  idempotency_key_required: true
  replay_same_hash: true
  conflict_different_hash: true

audit:
  audit_event_required: true
  before_snapshot_for_create: empty_object
  after_snapshot_required: true
  rollback_payload_required: true
  side_effect_safety_required: true

side_effect_safety:
  real_external_call_allowed: false
  automation_execution_allowed: false
  task_execution_allowed: false
  workflow_execution_allowed: false
  outbound_send_allowed: false
  wecom_call_allowed: false
  openclaw_call_allowed: false
  mcp_call_allowed: false
  timer_execution_allowed: false
  production_data_allowed: false

authorizations:
  runtime_implementation_authorized: false
  staging_smoke_execution_authorized: false
  production_dry_run_execution_authorized: false
  production_data_connection_authorized: false
  production_write_authorized: false
  production_repository_route_enablement_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  task_execution_authorized: false
  workflow_execution_authorized: false
  timer_execution_authorized: false
  outbound_send_authorized: false
  canary_approval_authorized: false
  delete_ready: false

