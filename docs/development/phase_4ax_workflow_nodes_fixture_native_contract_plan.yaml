fixture_seed:
  deterministic: true
  node_codes:
    - phase4ax_welcome_node
    - phase4ax_followup_node
  required_fields:
    - id
    - workflow_id
    - node_code
    - node_name
    - target_audience_code
    - trigger_mode
    - day_offset
    - send_time
    - timezone
    - position_index
    - enabled
    - created_at
    - updated_at
  production_data_allowed: false

list_contract:
  query:
    - workflow_id
    - target_audience_code
    - enabled
  response_keys:
    - ok
    - source_status
    - route_owner
    - workflow_nodes
    - total
    - count
    - filters
    - side_effect_safety
  disabled_nodes_included_by_default: true
  ordering: workflow_id_position_index_id_asc

create_contract:
  query:
    - workflow_id
  required_payload:
    - workflow_id
    - node_name
    - idempotency_key
  optional_payload:
    - node_code
    - target_audience_code
    - trigger_mode
    - day_offset
    - send_time
    - timezone
    - position_index
    - operator
  response_keys:
    - ok
    - workflow_node
    - audit_event
    - rollback_payload
    - idempotent_replay
    - side_effect_safety
  missing_workflow_id_rejected: true
  missing_name_rejected: true
  duplicate_node_code_rejected: true
  invalid_target_audience_rejected: true
  invalid_trigger_mode_rejected: true
  dangerous_fields_rejected: true

idempotency:
  route_family_scope_required: true
  operation_scope_required: true
  operator_scope_required: true
  idempotency_key_required: true
  replay_same_hash: true
  conflict_different_hash: true

audit:
  audit_event_required: true
  before_snapshot_for_create: empty_object
  after_snapshot_required: true
  rollback_payload_required: true
  side_effect_safety_required: true

side_effect_safety:
