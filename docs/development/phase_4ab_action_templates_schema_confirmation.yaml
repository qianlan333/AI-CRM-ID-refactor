idempotency_audit_confirmation:
  dedicated_idempotency_storage_confirmed: false
  dedicated_audit_storage_confirmed: false
  before_after_snapshot_storage_confirmed: false
  operator_snapshot_confirmed: true
  companion_schema_may_be_required: true
  notes: created_by and updated_by provide operator snapshots, but no dedicated idempotency, audit, or before-after snapshot storage is visible for action templates.

phase_4ac_readiness:
  decision: needs_companion_idempotency_audit_planning
  allowed_values:
    - ready_for_fixture_native_contract
    - needs_companion_idempotency_audit_planning
    - needs_more_legacy_confirmation
    - defer_due_to_external_side_effect_risk
  required_guardrails:
    - idempotency_required_for_create
    - duplicate_protection_required
    - audit_operator_identity_required
    - rollback_payload_required
    - dangerous_fields_rejected
    - no_real_external_side_effect
    - no_automation_execution
    - fallback_retained

phase_4ac_recommendation:
  recommended_next_step: companion_idempotency_audit_planning
  production_write_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_canary_allowed: false
  notes: Phase 4AC should plan companion idempotency/audit coverage before fixture/native contract implementation; generate and from-workflow paths remain excluded or deferred.
