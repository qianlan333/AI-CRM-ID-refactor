version: 1
status: phase_4ab_action_templates_schema_confirmation_no_runtime_change

authorizations:
  runtime_change_authorized: false
  production_repository_authorized: false
  migration_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  automation_execution_authorized: false
  outbound_send_authorized: false
  delete_ready: false

route_family: /api/admin/automation-conversion/action-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

route_surface:
  confirmed_routes:
    - method: GET
      path: /api/admin/automation-conversion/action-templates
      handler: api_admin_automation_conversion_action_templates
      action: list_action_templates
      phase_4ac_scope_decision: in_scope
      reason: Read-only list route is registered and delegates to list_action_templates.
    - method: POST
      path: /api/admin/automation-conversion/action-templates
      handler: api_admin_automation_conversion_action_templates
      action: create_action_template
      phase_4ac_scope_decision: in_scope
      reason: Create route is registered and can remain bounded to CRM local metadata writes if guardrails are added before implementation.
    - method: POST
      path: /api/admin/automation-conversion/action-templates/generate
      handler: api_admin_automation_conversion_action_template_generate
      action: generate_action_template
      phase_4ac_scope_decision: out_of_scope
      reason: Generate path calls the DeepSeek/LLM adapter through call_deepseek_agent before insert.
    - method: POST
      path: /api/admin/automation-conversion/action-templates/from-workflow
      handler: api_admin_automation_conversion_action_template_from_workflow
      action: create_action_template_from_workflow
      phase_4ac_scope_decision: defer
      reason: The route reads workflow model state before inserting a template; future scope must confirm it stays a bounded metadata write.
  not_confirmed:
    - route: GET /api/admin/automation-conversion/action-templates/{template_id}
      reason: No HTTP detail route is registered for this family.
    - route: PUT /api/admin/automation-conversion/action-templates/{template_id}
      reason: Repository update helper exists, but no HTTP update route is registered for this family.
    - route: DELETE /api/admin/automation-conversion/action-templates/{template_id}
      reason: No HTTP delete route is registered; archive behavior exists only as status semantics in the repository helper.
    - route: GET /api/admin/automation-conversion/action-templates/options
      reason: No options route is registered for this family.
    - route: GET /api/admin/automation-conversion/action-templates/catalog
      reason: No catalog route is registered for this family.
  out_of_scope:
    - route: POST /api/admin/automation-conversion/action-templates/generate
      reason: LLM-backed generation is an external side-effect risk and must stay out of Phase 4AC fixture/native contract scope.
    - route: POST /api/admin/automation-conversion/programs/{program_id}/actions/from-template
      reason: Adjacent route creates workflow/action runtime objects, not action-template metadata only.

services:
  - function: list_action_templates
    file: wecom_ability_service/domains/automation_conversion/action_template_service.py
    behavior: Reads builtin templates and automation_operation_templates rows, then returns items and total.
    validation: Rejects invalid template_source; supports source, category, keyword, and include_archived filtering.
    transaction_behavior: read_only_no_commit
    error_behavior: ValueError maps to HTTP 400.
    side_effect_risk: none_read_only
    phase_4ac_scope_decision: in_scope
    reason: Safe read-only metadata surface.
  - function: create_action_template
    file: wecom_ability_service/domains/automation_conversion/action_template_service.py
    behavior: Normalizes payload, generates a unique template_code, inserts automation_operation_templates, and commits.
    validation: Requires template_name; restricts template_source to crm_local or ai_generated; restricts status to active or archived.
    transaction_behavior: insert_operation_template_row then get_db().commit().
    error_behavior: ValueError maps to HTTP 400.
    side_effect_risk: bounded_internal_metadata_write
    phase_4ac_scope_decision: in_scope
    reason: Candidate for fixture/native contract only after idempotency, duplicate protection, audit, and dangerous-field guardrails are planned.
  - function: generate_action_template
    file: wecom_ability_service/domains/automation_conversion/action_template_service.py
    behavior: Calls call_deepseek_agent to generate template payload, normalizes output, inserts automation_operation_templates, and commits.
    validation: Requires business_goal and validates generated default_config, workflow_blueprint, and node_blueprints.
    transaction_behavior: insert_operation_template_row then commit; rollback on generation failure.
    error_behavior: DeepSeekClientError, LookupError, ValueError, TypeError, and JSON errors are wrapped as ValueError and map to HTTP 400.
    side_effect_risk: external_llm_call
    phase_4ac_scope_decision: out_of_scope
    reason: Real external generation path is not allowed in Phase 4AC.
  - function: create_action_template_from_workflow
    file: wecom_ability_service/domains/automation_conversion/action_template_service.py
    behavior: Reads workflow model bundle, infers an action template, inserts automation_operation_templates, and commits.
    validation: Requires workflow_id and template_name.
    transaction_behavior: insert_operation_template_row then get_db().commit().
    error_behavior: LookupError maps to HTTP 404; ValueError maps to HTTP 400.
    side_effect_risk: workflow_state_read_plus_metadata_write
    phase_4ac_scope_decision: defer
    reason: Needs a separate boundedness review before inclusion because it derives metadata from workflow state.

schema_confirmation:
  table: automation_operation_templates
  status: documented
  schema_source: wecom_ability_service/schema_postgres.sql
  migration_source: wecom_ability_service/db/migrations/postgres_migrations.py
  primary_key: id BIGSERIAL PRIMARY KEY
  fields:
    - name: id
      type: BIGSERIAL
      required: true
      notes: primary key
    - name: template_code
      type: TEXT
      required: true
      notes: unique action-template code
    - name: template_name
      type: TEXT
      required: true
      notes: display name, required by create service
    - name: template_source
      type: TEXT
      required: true
      notes: builtin, crm_local, or ai_generated
    - name: category
      type: TEXT
      required: true
      notes: metadata filter; no category enum constraint visible
    - name: description
      type: TEXT
      required: true
      notes: descriptive metadata
    - name: status
      type: TEXT
      required: true
      notes: active or archived
    - name: default_config_json
      type: JSONB
      required: true
      notes: serialized default action config
    - name: ui_schema_json
      type: JSONB
      required: true
      notes: serialized UI metadata
    - name: workflow_blueprint_json
      type: JSONB
      required: true
      notes: serialized workflow blueprint; metadata only for Phase 4AC
    - name: node_blueprints_json
      type: JSONB
      required: true
      notes: serialized node blueprint list; metadata only for Phase 4AC
    - name: created_by
      type: TEXT
      required: true
      notes: operator snapshot at create time
    - name: updated_by
      type: TEXT
      required: true
      notes: operator snapshot at latest write time
    - name: created_at
      type: TIMESTAMPTZ
      required: true
      notes: defaults to CURRENT_TIMESTAMP
    - name: updated_at
      type: TIMESTAMPTZ
      required: true
      notes: defaults to CURRENT_TIMESTAMP and is set by insert/update helpers
    - name: archived_at
      type: TIMESTAMPTZ
      required: false
      notes: set when update helper changes status to archived
  constraints_or_indexes:
    - name: automation_operation_templates_pkey
      fields: [id]
      notes: primary key
    - name: automation_operation_templates_template_code_key
      fields: [template_code]
      notes: unique template code
    - name: automation_operation_templates_template_source_check
      fields: [template_source]
      notes: builtin, crm_local, ai_generated
    - name: automation_operation_templates_status_check
      fields: [status]
      notes: active, archived
    - name: idx_automation_operation_templates_source
      fields: [template_source, status, updated_at, id]
      notes: source/status ordered list index
    - name: idx_automation_operation_templates_category
      fields: [category, status, updated_at, id]
      notes: category/status ordered list index
  timestamp_behavior: created_at and updated_at default to CURRENT_TIMESTAMP; insert helper sets both to CURRENT_TIMESTAMP; update helper sets updated_at to CURRENT_TIMESTAMP.
  status_archive_behavior: status is active or archived; update helper sets archived_at when status becomes archived and archived_at is empty, but no HTTP delete/archive route is confirmed.
  unknowns:
    - item: No dedicated action-template idempotency table is visible.
    - item: No dedicated action-template audit or before-after snapshot table is visible.
    - item: Category allowed values are not constrained by schema.
    - item: Detail, update, delete, options, and catalog HTTP routes are not confirmed.

