  - next_field: updated_by
    legacy_field: updated_by
    legacy_table: automation_operation_templates
    status: confirmed
    notes: Operator snapshot only.
  - next_field: created_at
    legacy_field: created_at
    legacy_table: automation_operation_templates
    status: confirmed
