  result_status: blocked_missing_required_gates
  live_external_call_executed: false
  production_owner_changed: false
  production_compat_changed: false
  fallback_removed: false
  outbound_send_executed: false
  timer_execution_triggered: false
  automation_execution_triggered: false
  delete_ready: false

excluded_families:
  - family_key: payment_commerce
    reason: payment_capture_refund_settlement_forbidden
  - family_key: oauth_identity
    reason: production_oauth_callback_cutover_forbidden
  - family_key: wecom_customer_contact_callback
    reason: callback_ownership_cutover_forbidden
  - family_key: questionnaire_external_submit
    reason: public_submit_identity_and_tag_writeback_deferred

business_continuity:
