version: 1
status: phase_6g_low_risk_external_adapter_enablement_tooling_default_blocked
bundle_type: phase_6g_low_risk_external_adapter_enablement_tooling_bundle
route_families:
  - media upload / media library
  - WeCom tags
  - OpenClaw / MCP / AI assist

authorizations:
  live_external_enablement_authorized_default: false
  production_owner_switch_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  outbound_send_authorized: false
  payment_behavior_authorized: false
  oauth_callback_cutover_authorized: false
  destructive_migration_authorized: false
