    family_name: Media upload / media library
    route_family: /api/admin/image-library*
    runner: tools/run_phase6g_media_adapter_enablement_gate.py
    required_env_gates:
      - AICRM_PHASE6G_MEDIA_UPLOAD_ENABLEMENT_APPROVED
      - AICRM_PHASE6G_MEDIA_UPLOAD_CONFIG_REVIEWED
      - AICRM_PHASE6G_MEDIA_UPLOAD_ROLLBACK_OWNER_APPROVED
      - AICRM_PHASE6G_MEDIA_UPLOAD_CANARY_TARGET_APPROVED
    config_review_gate: true
    owner_approval_gate: true
    rollback_gate: true
    side_effect_safety_evidence_required: true
    shadow_or_dry_run_evidence_required: true
    default_blocked: true
    live_external_call_executed_default: false
  - family_key: wecom_tags
    family_name: WeCom tags
    route_family: /api/admin/wecom/tags*
    runner: tools/run_phase6g_wecom_tags_enablement_gate.py
    required_env_gates:
      - AICRM_PHASE6G_WECOM_TAGS_ENABLEMENT_APPROVED
      - AICRM_PHASE6G_WECOM_TAGS_CONFIG_REVIEWED
      - AICRM_PHASE6G_WECOM_TAGS_ROLLBACK_OWNER_APPROVED
      - AICRM_PHASE6G_WECOM_TAGS_CANARY_TARGET_APPROVED
    config_review_gate: true
    owner_approval_gate: true
    rollback_gate: true
    side_effect_safety_evidence_required: true
    shadow_or_dry_run_evidence_required: true
    default_blocked: true
    live_external_call_executed_default: false
  - family_key: openclaw_mcp_ai_assist
    family_name: OpenClaw / MCP / AI assist
    route_family: /mcp
    runner: tools/run_phase6g_openclaw_mcp_enablement_gate.py
    required_env_gates:
      - AICRM_PHASE6G_OPENCLAW_MCP_ENABLEMENT_APPROVED
      - AICRM_PHASE6G_OPENCLAW_MCP_CONFIG_REVIEWED
      - AICRM_PHASE6G_OPENCLAW_MCP_ROLLBACK_OWNER_APPROVED
      - AICRM_PHASE6G_OPENCLAW_MCP_CANARY_TARGET_APPROVED
    config_review_gate: true
    owner_approval_gate: true
    rollback_gate: true
    side_effect_safety_evidence_required: true
    shadow_or_dry_run_evidence_required: true
    default_blocked: true
    live_external_call_executed_default: false

default_runner_output:
