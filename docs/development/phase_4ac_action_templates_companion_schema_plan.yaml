version: 1
status: phase_4ac_action_templates_companion_schema_planning_only_no_runtime_change

authorizations:
  runtime_change_authorized: false
  migration_authorized: false
  production_repository_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  automation_execution_authorized: false
  outbound_send_authorized: false
  delete_ready: false

route_family: /api/admin/automation-conversion/action-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway
main_table: automation_operation_templates

schema_need:
  idempotency_storage_required: true
  audit_storage_required: true
  before_after_snapshot_required: true
  reason:
    - no dedicated idempotency storage confirmed
    - no dedicated audit storage confirmed
    - created_by_updated_by_are_operator_snapshot_only
    - create_retry_safety_requires_idempotency_key_storage
    - rollback_requires_snapshot_or_response_storage

idempotency_schema_plan:
  strategy: new_companion_table
  proposed_table: automation_operation_template_idempotency
  required_fields:
    - name: id
      type: bigserial
      required: true
      notes: primary key for the companion idempotency row
    - name: route_family
      type: text
      required: true
      notes: route family scope, fixed to action-templates for this candidate
    - name: operation
      type: text
      required: true
      notes: create or future confirmed metadata operation
    - name: operator
      type: text
      required: true
      notes: operator identity used in idempotency scope
    - name: idempotency_key
      type: text
      required: true
      notes: client or caller supplied retry key
    - name: request_hash
      type: text
      required: true
      notes: normalized request hash for replay conflict detection
    - name: response_snapshot
      type: jsonb
      required: true
      notes: redacted response snapshot returned for safe replays
    - name: resource_type
      type: text
      required: true
      notes: action_template
    - name: resource_id
      type: bigint
      required: false
      notes: automation_operation_templates.id after successful create
    - name: status
      type: text
      required: true
      notes: in_progress, completed, failed, or conflict
    - name: created_at
      type: timestamptz
      required: true
      notes: creation timestamp
    - name: updated_at
      type: timestamptz
      required: true
      notes: latest idempotency state timestamp
  unique_constraints:
    - name: uq_action_template_idempotency_key
      fields:
        - route_family
        - operation
        - operator
        - idempotency_key
  indexes:
    - name: idx_action_template_idempotency_resource
      fields:
        - resource_type
        - resource_id
        - created_at
    - name: idx_action_template_idempotency_status
      fields:
        - status
        - updated_at
  conflict_behavior: Same idempotency key with a different request_hash must be rejected as conflict and must not create or mutate an action template.
  replay_behavior: Same idempotency key with the same request_hash returns the stored redacted response_snapshot without repeating the write.
  retention_policy: Retain long enough for operator retry windows and rollback review; archive or purge only by separately approved retention policy.
  unknowns: []

audit_schema_plan:
  strategy: new_companion_table
  proposed_table: automation_operation_template_audit_log
  required_fields:
    - name: id
      type: bigserial
      required: true
      notes: primary key for the companion audit row
    - name: route_family
      type: text
      required: true
      notes: route family scope, fixed to action-templates for this candidate
    - name: operation
      type: text
      required: true
      notes: create or future confirmed metadata operation
    - name: operator
      type: text
      required: true
      notes: operator identity at action time
    - name: resource_type
      type: text
      required: true
      notes: action_template
    - name: resource_id
      type: bigint
      required: false
      notes: automation_operation_templates.id when available
    - name: before_snapshot
      type: jsonb
      required: true
      notes: empty object for create, redacted previous state for future update
    - name: after_snapshot
      type: jsonb
      required: true
      notes: redacted resulting state
    - name: request_payload
      type: jsonb
      required: true
      notes: redacted normalized request payload
    - name: validation_result
      type: jsonb
      required: true
      notes: validation summary without raw secrets or external payloads
    - name: rollback_payload
      type: jsonb
      required: true
      notes: bounded payload needed to undo or archive the metadata write
    - name: side_effect_safety
      type: jsonb
      required: true
      notes: evidence that no external call, execution, timer, or outbound send occurred
    - name: created_at
      type: timestamptz
      required: true
      notes: audit timestamp
  indexes:
    - name: idx_action_template_audit_resource
      fields:
        - resource_type
        - resource_id
        - created_at
    - name: idx_action_template_audit_operator
      fields:
        - operator
        - created_at
    - name: idx_action_template_audit_operation
      fields:
        - operation
        - created_at
  snapshot_policy: Store redacted before and after metadata snapshots only; do not store secrets, raw PII, external call payloads, or generated LLM internals.
  rollback_payload_policy: For create, rollback payload should identify the created action_template and safe archive/delete strategy for a later approved phase; for future update, include enough previous state to restore metadata if update route is confirmed.
  retention_policy: Retain for rollback and owner review; purge/archive only under a separately approved retention policy.
  unknowns: []

scope_constraints:
  generate_route_excluded: true
  from_workflow_route_deferred: true
  deepseek_llm_adapter_excluded: true
  workflow_execution_excluded: true
  outbound_send_excluded: true
  timer_excluded: true
  openclaw_mcp_excluded: true
  wecom_external_call_excluded: true

migration_readiness:
  migration_artifact_authorized_now: false
  additive_only_required: true
  main_table_mutation_forbidden: true
  backfill_forbidden: true
  destructive_sql_forbidden: true
  deployment_requires_owner_approval: true

phase_4ad_recommendation:
  recommended_next_step: companion_schema_migration_readiness
  migration_allowed_without_owner_approval: false
  runtime_implementation_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_canary_allowed: false
  notes: Phase 4AD may prepare additive-only migration artifact/readiness for companion tables, but must not implement runtime or switch production owner.
