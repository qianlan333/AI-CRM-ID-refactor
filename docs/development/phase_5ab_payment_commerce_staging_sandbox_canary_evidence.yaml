  real_settlement_allowed: false
  real_charge_allowed: false
  production_provider_call_allowed: false
  production_payment_webhook_cutover_allowed: false
  production_order_state_mutation_allowed: false
  financial_reconciliation_mutation_allowed: false
  raw_secret_output_allowed: false
  token_persistence_allowed: false
  outbound_send_allowed: false
  media_upload_allowed: false
  oauth_callback_allowed: false
  wecom_call_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
