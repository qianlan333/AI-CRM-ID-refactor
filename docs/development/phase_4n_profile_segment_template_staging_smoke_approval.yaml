version: 1
status: phase_4n_staging_smoke_approval_only_no_execution
staging_smoke_execution_authorized: false
production_data_allowed: false
production_repository_enablement_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

approval:
  automation_engine_owner: pending
  integration_gateway_owner: pending
  db_config_owner: pending
  business_owner: pending
  rollback_owner: pending
  smoke_operator: pending
  release_config_reviewer: pending

environment_confirmation:
  staging_db_url_required: true
  allowed_db_url_markers:
    - staging
    - stage
    - test
    - local
    - dev
  forbidden_db_url_markers:
    - prod
    - production
    - primary
    - master
  required_feature_flags:
    - AICRM_PROFILE_SEGMENT_TEMPLATE_REPO_BACKEND
    - AICRM_PROFILE_SEGMENT_TEMPLATE_STAGING_DATABASE_URL
  database_url_fallback_allowed: false
  production_data_allowed: false

execution_plan:
  manual_execution_required: true
  run_in_ci_by_default: false
  dry_run_first_required: true
  execute_writes_requires_owner_approval: true
  evidence_required: true

stop_conditions:
  - db_url_safety_failed
  - smoke_write_failed
  - unexpected_idempotency_conflict
  - audit_row_missing
  - rollback_payload_missing
  - side_effect_safety_failed
  - external_call_detected
  - production_marker_detected
  - fallback_validation_failed

rollback_plan:
  feature_flag_disable_required: true
  safe_namespace_cleanup_required: true
  audit_review_required: true
  evidence_preservation_required: true
  delete_requires_separate_approval: true
  fallback_validation_required: true

evidence_package:
  required:
    - runner_json_report
    - runner_markdown_report
    - db_url_safety_summary_without_secret
    - smoke_matrix_summary
    - failed_skipped_details
    - audit_rollback_evidence
    - side_effect_safety_summary
    - operator_timestamp
    - owner_signoff

phase_4o_recommendation:
  recommended_next_step: execute_staging_smoke_after_owner_approval
  staging_smoke_execution_allowed_without_owner_approval: false
  production_dry_run_allowed: false
  production_route_switch_allowed: false
  production_write_canary_allowed: false
  notes: Phase 4O may run staging smoke dry-run first, then owner-approved write smoke; it must not connect production data or switch production route ownership.
