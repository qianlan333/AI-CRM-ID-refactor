fixture_seed:
  deterministic: true
  agent_codes:
    - phase4bg_conversion_followup_agent
    - phase4bg_safety_review_agent
  required_fields:
    - id
    - agent_code
    - display_name
    - description
    - scenario_code
    - enabled
    - prompt_template_code
    - tool_policy_code
    - model_policy_code
    - created_at
    - updated_at
  production_data_allowed: false

list_contract:
  query:
    - enabled_only
    - keyword
    - scenario_code
  response_keys:
    - ok
    - source_status
    - route_owner
    - agents
    - options
    - total
    - count
    - filters
    - side_effect_safety
  runtime_rows_excluded: true
  ordering: enabled_desc_updated_at_desc_agent_code_asc

create_contract:
  required_payload:
    - agent_code
    - display_name
    - idempotency_key
  optional_payload:
    - description
    - scenario_code
    - enabled
    - prompt_template_code
    - tool_policy_code
    - model_policy_code
    - operator
  response_keys:
    - ok
    - agent
    - audit_event
    - rollback_payload
    - idempotent_replay
    - side_effect_safety
  missing_agent_code_rejected: true
  missing_display_name_rejected: true
  invalid_enabled_rejected: true
  dangerous_fields_rejected: true
  execution_fields_rejected: true

idempotency:
  route_family_scope_required: true
  operation_scope_required: true
  operator_scope_required: true
  idempotency_key_required: true
  agent_code_scope_required: true
  replay_same_hash: true
  conflict_different_hash: true

audit:
  audit_event_required: true
  before_snapshot_for_create: empty_object
  after_snapshot_required: true
  rollback_payload_required: true
  side_effect_safety_required: true

side_effect_safety:
