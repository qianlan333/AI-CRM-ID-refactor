version: 1
status: phase_4f_schema_confirmation_only_no_runtime_change
production_repository_implementation_authorized: false
migration_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

route_family: /api/admin/automation-conversion/profile-segment-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

confirmed_tables:
  - name: automation_profile_segment_template
    schema_source: wecom_ability_service/schema_postgres.sql
    migration_source: wecom_ability_service/db/migrations/postgres_migrations.py adds program_id and segmentation_question_id for older databases
    primary_key: id BIGSERIAL PRIMARY KEY
    required_fields:
      - field: template_code
      - field: template_name
      - field: description
      - field: enabled
      - field: version
      - field: created_by
      - field: updated_by
      - field: created_at
      - field: updated_at
    defaults:
      - field: template_name
        default: empty string
      - field: description
        default: empty string
      - field: enabled
        default: true
      - field: version
        default: 1
      - field: created_by
        default: empty string
      - field: updated_by
        default: empty string
      - field: created_at
        default: CURRENT_TIMESTAMP
      - field: updated_at
        default: CURRENT_TIMESTAMP
    indexes_or_constraints:
      - name: automation_profile_segment_template_pkey
        fields:
          - id
      - name: automation_profile_segment_template_template_code_key
        fields:
          - template_code
      - name: idx_automation_profile_segment_template_enabled
        fields:
          - enabled
          - updated_at
          - id
      - name: idx_automation_profile_segment_template_program
        fields:
          - program_id
          - enabled
          - updated_at
          - id
    timestamp_behavior: created_at and updated_at default to CURRENT_TIMESTAMP; legacy update SQL sets updated_at = CURRENT_TIMESTAMP.
    status: confirmed
    unknowns:
      - item: no dedicated idempotency key field was found on this table
      - item: no before/after audit snapshot field was found on this table
      - item: draft status has no native column beyond enabled/version
  - name: automation_profile_segment_category
    schema_source: wecom_ability_service/schema_postgres.sql
    migration_source: base schema source; no separate complete migration found in static scan
    primary_key: id BIGSERIAL PRIMARY KEY
    required_fields:
      - field: template_id
      - field: category_key
      - field: category_name
      - field: description
      - field: sort_order
      - field: enabled
      - field: created_at
      - field: updated_at
    defaults:
      - field: category_key
        default: empty string
      - field: category_name
        default: empty string
      - field: description
        default: empty string
      - field: sort_order
        default: 0
      - field: enabled
        default: true
      - field: created_at
        default: CURRENT_TIMESTAMP
      - field: updated_at
        default: CURRENT_TIMESTAMP
    indexes_or_constraints:
      - name: automation_profile_segment_category_pkey
        fields:
          - id
      - name: fk_profile_segment_category_template
        fields:
          - template_id
      - name: uq_automation_profile_segment_category_template_key
        fields:
          - template_id
          - category_key
      - name: idx_automation_profile_segment_category_template_sort
        fields:
          - template_id
          - sort_order
          - id
    timestamp_behavior: created_at and updated_at default to CURRENT_TIMESTAMP; update flow deletes and reinserts rows.
    status: confirmed
    unknowns:
      - item: update path deletes and reinserts child category rows, so per-row rollback requires before snapshot
  - name: automation_profile_segment_option_mapping
    schema_source: wecom_ability_service/schema_postgres.sql
    migration_source: base schema source; no separate complete migration found in static scan
    primary_key: id BIGSERIAL PRIMARY KEY
    required_fields:
      - field: template_id
      - field: category_id
      - field: question_id
      - field: option_id
      - field: created_at
    defaults:
      - field: created_at
        default: CURRENT_TIMESTAMP
    indexes_or_constraints:
      - name: automation_profile_segment_option_mapping_pkey
        fields:
          - id
      - name: fk_profile_segment_option_mapping_template
        fields:
          - template_id
      - name: fk_profile_segment_option_mapping_category
        fields:
          - category_id
      - name: fk_profile_segment_option_mapping_question
        fields:
          - question_id
      - name: fk_profile_segment_option_mapping_option
        fields:
          - option_id
      - name: uq_automation_profile_segment_option_mapping_unique
        fields:
          - category_id
          - question_id
          - option_id
      - name: idx_automation_profile_segment_option_mapping_template
        fields:
          - template_id
          - question_id
          - option_id
          - id
    timestamp_behavior: created_at defaults to CURRENT_TIMESTAMP; update flow deletes and reinserts rows.
    status: confirmed
    unknowns:
      - item: update path deletes and reinserts option mappings, so rollback requires captured old mapping set

confirmed_services:
  - function: list_conversion_profile_segment_catalog
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Reads questionnaire rows, question rows, and option rows to build catalog items.
    validation: Read-only normalization; no write validation.
    transaction_behavior: read only, no commit.
    error_behavior: no explicit domain error in static path; repository/database errors would bubble.
    operator_handling: no operator required for read.
    rollback_implication: none for read.
    unknowns:
      - item: production DB error wrapping for future Next repository remains to be designed
  - function: list_conversion_profile_segment_templates
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Reads template rows with optional enabled/program filters and builds bundle payloads.
    validation: Filter normalization through effective program and enabled_only flag.
    transaction_behavior: read only, no commit.
    error_behavior: repository/database errors would bubble.
    operator_handling: no operator required for read.
    rollback_implication: none for read.
    unknowns:
      - item: payload parity fixture still required before adapter implementation
  - function: list_conversion_profile_segment_template_options
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Reads template bundles and returns selector-safe template option rows, filtering invalid bundles when enabled_only is true.
    validation: Uses bundle validity check to hide invalid enabled options.
    transaction_behavior: read only, no commit.
    error_behavior: repository/database errors would bubble.
    operator_handling: no operator required for read.
    rollback_implication: none for read.
    unknowns:
      - item: exact invalid-template filtering parity must be locked with fixture before production adapter
  - function: get_conversion_profile_segment_template_bundle
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Reads one template row and expands questionnaire, categories, option mappings, validity, and selection metadata.
    validation: Raises LookupError when template row is missing.
    transaction_behavior: read only, no commit.
    error_behavior: LookupError for missing; repository/database errors would bubble.
    operator_handling: no operator required for read.
    rollback_implication: none for read.
    unknowns:
      - item: future adapter must preserve bundle shape or explicitly document projection differences
  - function: create_conversion_profile_segment_template
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Validates payload, checks duplicate template_code, inserts template/category/mapping rows, commits, and returns a bundle.
    validation: Requires template_name, unique template_code, questionnaire_id, segmentation_question_id, categories, enabled category, option bindings, and valid question/options.
    transaction_behavior: writes parent and children then calls get_db().commit().
    error_behavior: ValueError for validation or duplicate code; LookupError can arise from validation lookups.
    operator_handling: passes operator_id into created_by and updated_by.
    rollback_implication: rollback needs created template id plus child rows; robust retry needs idempotency storage not present in current table.
    unknowns:
      - item: no robust idempotency persistence confirmed
      - item: no dedicated before/after audit snapshot confirmed
  - function: update_conversion_profile_segment_template
    file: wecom_ability_service/domains/automation_conversion/workflow_service.py
    behavior: Loads existing template, validates program ownership and next state, updates parent row, deletes/reinserts child rows, commits, and returns a bundle.
    validation: Requires existing template, program match, non-empty template_name, unique template_code, valid enabled category mappings when enabled, and valid segmentation question.
    transaction_behavior: updates parent and replaces category/mapping rows then calls get_db().commit().
    error_behavior: LookupError for missing template; ValueError for validation, duplicate code, or program mismatch.
    operator_handling: passes operator_id into updated_by.
    rollback_implication: update rollback requires before snapshot of parent, categories, and mappings because child rows are replaced.
    unknowns:
      - item: no dedicated before/after audit snapshot confirmed
      - item: stale update guard is version increment only, not explicit optimistic concurrency enforcement

field_mapping_confirmation:
  - next_field: template_id / id
    legacy_field: id
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: Integer identity maps directly to legacy primary key.
  - next_field: name
    legacy_field: template_name
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: Legacy create/update require non-empty template_name.
  - next_field: description
    legacy_field: description
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: Legacy normalizes to empty string when omitted.
  - next_field: segment_key / code
    legacy_field: template_code
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: Legacy slugifies missing code from name and enforces unique template_code.
  - next_field: conditions / rules
    legacy_field: categories plus option mappings
    legacy_table: automation_profile_segment_category + automation_profile_segment_option_mapping
    status: needs_owner_approval
    notes: Legacy shape is categories/option_ids, while Next aliases conditions/rules need parity fixture approval.
  - next_field: status
    legacy_field: enabled
    legacy_table: automation_profile_segment_template
    status: needs_owner_approval
    notes: Legacy supports enabled/disabled; draft has no native legacy status column.
  - next_field: sort_order
    legacy_field: sort_order
    legacy_table: automation_profile_segment_category
    status: confirmed
    notes: Confirmed only at category level; no template-level sort_order column.
  - next_field: created_at
    legacy_field: created_at
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: DB default CURRENT_TIMESTAMP and serializer projects it.
  - next_field: updated_at
    legacy_field: updated_at
    legacy_table: automation_profile_segment_template
    status: confirmed
    notes: DB default CURRENT_TIMESTAMP and update SQL refreshes it.
  - next_field: operator / audit fields
    legacy_field: created_by / updated_by
    legacy_table: automation_profile_segment_template
    status: needs_migration
    notes: Operator snapshot is present, but full audit event and before/after snapshots are not confirmed for this route family.

idempotency_confirmation:
  existing_storage_confirmed: false
  recommended_path: plan companion idempotency table or approved shared request log before production create adapter
  phase_4g_blocker_if_unresolved: true
  notes: Static scan found template_code duplicate protection but no idempotency key storage on profile segment tables; deterministic duplicate protection alone is weaker than retry-safe idempotency.

audit_confirmation:
  operator_snapshot_confirmed: true
  dedicated_audit_storage_confirmed: false
  before_after_snapshot_storage_confirmed: false
  recommended_path: plan companion audit storage or approved admin_operation_logs integration with before/after snapshots before claiming full production audit
  phase_4g_blocker_if_unresolved: true
  notes: created_by and updated_by exist; dedicated profile-segment audit events and before/after snapshot storage are not confirmed.

repository_adapter_feasibility:
  decision: reuse_legacy_tables_needs_companion_idempotency_audit
  production_adapter_implementation_allowed_next: false
  migration_required_before_adapter: true
  companion_schema_required: true
  owner_approval_required: true
  notes: Existing tables appear sufficient for read parity and basic metadata persistence shape, but robust create idempotency and full audit/rollback require approved companion storage or explicit owner waiver.

phase_4g_recommendation:
  recommended_next_step: companion idempotency/audit schema planning
  direct_route_switch_allowed: false
  production_route_owner_switch_allowed: false
  production_repository_allowed_without_owner_approval: false
  migration_allowed_without_owner_approval: false
  notes: Phase 4G should not switch route owner or implement production writes until idempotency, audit snapshot storage, parity fixture, and owner approval are resolved.
