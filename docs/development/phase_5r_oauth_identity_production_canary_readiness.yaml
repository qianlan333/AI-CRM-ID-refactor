version: 1
status: phase_5r_oauth_identity_production_canary_readiness_no_execution
bundle_type: phase_5_external_adapter_production_canary_readiness_bundle
route_family: /api/h5/wechat/oauth*
capability_owner: aicrm_next.integration_gateway

authorizations:
  production_canary_execution_authorized: false
  production_live_oauth_call_authorized: false
  production_callback_cutover_authorized: false
  production_session_write_authorized: false
  production_identity_write_authorized: false
  token_persistence_authorized: false
  production_owner_switch_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  outbound_send_authorized: false
  wecom_live_call_authorized: false
  payment_behavior_authorized: false
  media_live_upload_authorized: false
  openclaw_mcp_live_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  delete_ready: false

readiness_runner:
  path: tools/run_phase5r_oauth_identity_production_canary_readiness.py
  default_blocked: true
  production_live_oauth_call_executed: false
  production_callback_cutover_executed: false
  production_session_write_executed: false
  production_identity_write_executed: false
  token_persisted: false
  requires_staging_evidence_json: true
  required_env:
    - AICRM_PHASE5R_OAUTH_IDENTITY_PRODUCTION_CANARY_PLANNING_APPROVED
    - AICRM_PHASE5R_OAUTH_IDENTITY_PRODUCTION_CONFIG_REVIEWED
    - AICRM_PHASE5R_OAUTH_IDENTITY_ROLLBACK_OWNER_APPROVED
    - AICRM_PHASE5R_OAUTH_IDENTITY_CALLBACK_TARGET_POLICY_REVIEWED
    - AICRM_PHASE5R_OAUTH_IDENTITY_TOKEN_POLICY_REVIEWED
  required_args:
    - --staging-evidence-json
    - --confirm-no-production-live-oauth-call
    - --confirm-no-production-callback-cutover
    - --confirm-no-production-session-write
    - --confirm-no-production-identity-write
    - --confirm-no-token-persistence

staging_evidence_requirements:
  required: true
  blocked_evidence_qualifies: false
  must_be_redacted: true
  must_not_include_code_state_token_or_secret: true
  must_include_side_effect_safety: true
  production_live_oauth_call_executed_must_be_false: true
  production_callback_cutover_executed_must_be_false: true
  production_session_write_executed_must_be_false: true
  production_identity_write_executed_must_be_false: true

production_callback_target_policy:
  single_callback_attempt_only: true
  batch_replay_allowed: false
  production_callback_url_cutover_allowed: false
  production_session_write_allowed: false
  production_identity_write_allowed: false
  token_persistence_allowed: false
  raw_code_output_forbidden: true
  raw_state_output_forbidden: true
  raw_token_output_forbidden: true
  raw_secret_output_forbidden: true
  outbound_send_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

rollback_policy:
  rollback_owner_required: true
  cleanup_requires_explicit_approval: true
  cleanup_evidence_required: true
  automatic_cleanup_allowed: false
  batch_cleanup_allowed: false
  unrelated_session_or_identity_cleanup_forbidden: true

side_effect_safety:
  production_callback_cutover_allowed: false
  production_session_write_allowed: false
  production_identity_write_allowed: false
  token_persistence_allowed: false
  outbound_send_allowed: false
  wecom_call_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_live_behavior_change: true

next_bundle:
  recommended_next_step: phase_5s_oauth_identity_production_live_canary_execution_bundle
  route_family: /api/h5/wechat/oauth*
