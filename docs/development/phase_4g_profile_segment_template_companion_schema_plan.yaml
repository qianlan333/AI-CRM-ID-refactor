version: 1
status: phase_4g_companion_schema_planning_only_no_runtime_change
migration_authorized: false
production_repository_implementation_authorized: false
production_route_ownership_switch_authorized: false
fallback_removal_authorized: false
production_compat_change_authorized: false
real_external_call_authorized: false
delete_ready: false

route_family: /api/admin/automation-conversion/profile-segment-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

schema_need:
  idempotency_storage_required: true
  audit_storage_required: true
  before_after_snapshot_required: true
  reason:
    - no dedicated idempotency storage confirmed
    - no dedicated audit storage confirmed
    - update replaces child rows and requires rollback snapshots

idempotency_schema_plan:
  strategy: new_companion_table
  proposed_table: automation_profile_segment_template_idempotency
  required_fields:
    - name: id
      type: BIGSERIAL
      required: true
      notes: Primary key for diagnostics and retention cleanup.
    - name: route_family
      type: TEXT
      required: true
      notes: Fixed to profile segment template route family for this bounded internal_write scope.
    - name: operation
      type: TEXT
      required: true
      notes: create or update; create requires replay safety first.
    - name: operator
      type: TEXT
      required: true
      notes: Admin operator identity snapshot used in key scope.
    - name: idempotency_key
      type: TEXT
      required: true
      notes: Client or server supplied stable key.
    - name: request_hash
      type: TEXT
      required: true
      notes: Canonical hash of normalized request payload.
    - name: response_snapshot
      type: JSONB
      required: true
      notes: Original success or terminal response for replay.
    - name: resource_type
      type: TEXT
      required: true
      notes: profile_segment_template.
    - name: resource_id
      type: BIGINT
      required: false
      notes: Template id once create/update succeeds.
    - name: status
      type: TEXT
      required: true
      notes: pending, succeeded, failed, or conflict.
    - name: created_at
      type: TIMESTAMPTZ
      required: true
      notes: Insert timestamp.
    - name: updated_at
      type: TIMESTAMPTZ
      required: true
      notes: Last state transition timestamp.
  unique_constraints:
    - name: uq_profile_segment_template_idempotency_scope
      fields:
        - route_family
        - operation
        - operator
        - idempotency_key
  indexes:
    - name: idx_profile_segment_template_idempotency_resource
      fields:
        - resource_type
        - resource_id
        - created_at
    - name: idx_profile_segment_template_idempotency_status
      fields:
        - status
        - updated_at
  conflict_behavior: Same key with different request_hash returns conflict and does not write main data.
  replay_behavior: Same key with same request_hash returns stored response_snapshot and resource_id.
  retention_policy: Keep at least 90 days or owner-approved operational audit window; expired rows require separate cleanup plan.
  unknowns:
    - item: final table name and retention window require owner approval before migration
    - item: whether update also requires idempotency key remains an implementation decision

audit_schema_plan:
  strategy: new_companion_table
  proposed_table: automation_profile_segment_template_audit_log
  required_fields:
    - name: id
      type: BIGSERIAL
      required: true
      notes: Primary key.
    - name: route_family
      type: TEXT
      required: true
      notes: Fixed route family for profile segment template changes.
    - name: operation
      type: TEXT
      required: true
      notes: create, update, validation_failed, rollback, or replay.
    - name: operator
      type: TEXT
      required: true
      notes: Admin operator identity snapshot.
    - name: resource_type
      type: TEXT
      required: true
      notes: profile_segment_template.
    - name: resource_id
      type: BIGINT
      required: false
      notes: Template id when known.
    - name: before_snapshot
      type: JSONB
      required: true
      notes: Parent template, categories, and option mappings before update.
    - name: after_snapshot
      type: JSONB
      required: true
      notes: Parent template, categories, and option mappings after create/update.
    - name: request_payload
      type: JSONB
      required: true
      notes: Normalized request payload, excluding secrets.
    - name: validation_result
      type: JSONB
      required: true
      notes: Validation success/failure and error contract.
    - name: rollback_payload
      type: JSONB
      required: true
      notes: Compensating update payload or rollback instructions.
    - name: side_effect_safety
      type: JSONB
      required: true
      notes: Evidence that no automation execution, send, WeCom, OpenClaw, MCP, timer, or workflow activation ran.
    - name: created_at
      type: TIMESTAMPTZ
      required: true
      notes: Audit event timestamp.
  indexes:
    - name: idx_profile_segment_template_audit_resource
      fields:
        - resource_type
        - resource_id
        - created_at
    - name: idx_profile_segment_template_audit_operator
      fields:
        - operator
        - created_at
    - name: idx_profile_segment_template_audit_operation
      fields:
        - operation
        - created_at
  snapshot_policy: Capture full before/after snapshots for template row, categories, and option mappings; update must capture before snapshot before deleting child rows.
  rollback_payload_policy: Store enough data to revert create by disabling/reverting the created template or update by restoring previous parent/category/mapping state.
  retention_policy: Keep at least 180 days or owner-approved audit window; archival/deletion requires separate policy.
  unknowns:
    - item: owner must decide whether to reuse admin_operation_logs instead of creating a dedicated table
    - item: exact PII redaction rules for request_payload require production config review

phase_4h_recommendation:
  recommended_next_step: companion_schema_migration_pr
  migration_allowed_without_owner_approval: false
  production_repository_allowed_without_owner_approval: false
  route_switch_allowed: false
  notes: Phase 4H should prepare a migration-readiness PR for the companion idempotency/audit schema only, or stop at owner review if admin_operation_logs reuse is selected; it must not implement production repository or switch route ownership.
