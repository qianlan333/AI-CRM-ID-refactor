version: 1
status: phase_5n_oauth_identity_adapter_contract_no_live_oauth_callback
bundle_type: phase_5_external_adapter_contract_bundle
route_family: /api/h5/wechat/oauth*
capability_owner: aicrm_next.integration_gateway
integration_boundary: aicrm_next.integration_gateway

authorizations:
  live_oauth_callback_cutover_authorized: false
  production_callback_owner_switch_authorized: false
  production_session_write_authorized: false
  production_identity_write_authorized: false
  live_oauth_token_exchange_authorized: false
  outbound_send_authorized: false
  production_compat_change_authorized: false
  fallback_removal_authorized: false
  payment_behavior_authorized: false
  media_live_upload_authorized: false
  wecom_live_call_authorized: false
  openclaw_mcp_live_call_authorized: false
  timer_execution_authorized: false
  automation_execution_authorized: false
  canary_approved: false
  delete_ready: false

adapter_contract:
  methods:
    - name: build_oauth_authorize_url_contract
      live_oauth_call_allowed: false
      adapter_mode: fake_stub_contract
    - name: parse_oauth_callback_contract
      live_oauth_call_allowed: false
      adapter_mode: fake_stub_contract
    - name: normalize_oauth_identity_event
      live_oauth_call_allowed: false
      adapter_mode: fake_stub_contract
    - name: dry_run_record_oauth_identity
      live_oauth_call_allowed: false
      idempotency_required: true
      adapter_mode: fake_stub_contract
    - name: dry_run_session_identity_evidence
      live_oauth_call_allowed: false
      idempotency_required: true
      adapter_mode: fake_stub_contract

fake_stub_contract:
  deterministic_oauth_events_required: true
  wechat_app_secret_required: false
  app_id_required: false
  token_usage_allowed: false
  code_exchange_allowed: false
  network_call_allowed: false
  session_write_allowed: false
  db_write_allowed: false
  production_success_claim_allowed: false

error_mapping:
  required_error_codes:
    - oauth_config_missing
    - oauth_code_missing
    - state_missing
    - state_invalid
    - redirect_uri_invalid
    - openid_missing
    - idempotency_key_required
    - duplicate_oauth_event_key
    - live_oauth_callback_not_enabled
    - token_exchange_not_enabled
    - adapter_unavailable
    - forbidden_in_production_without_approval

idempotency_policy:
  oauth_event_key_required: true
  idempotency_key_required_for_write_like_dry_run: true
  replay_same_oauth_event_key: true
  conflict_different_hash: true
  no_partial_production_side_effect: true

evidence_policy:
  live_oauth_call_executed_field_required: true
  live_callback_processed_field_required: true
  production_session_write_executed_field_required: true
  production_identity_write_executed_field_required: true
  side_effect_safety_required: true
  operator_required: true
  request_hash_required: true
  openid_redaction_required: true
  unionid_redaction_required: true
  timestamp_required: true

side_effect_safety:
  live_oauth_callback_cutover_allowed: false
  live_oauth_token_exchange_allowed: false
  production_session_write_allowed: false
  production_identity_write_allowed: false
  outbound_send_allowed: false
  payment_allowed: false
  media_upload_allowed: false
  wecom_live_call_allowed: false
  openclaw_mcp_allowed: false
  timer_execution_allowed: false
  automation_execution_allowed: false

business_continuity:
  production_behavior_unchanged: true
  legacy_fallback_retained: true
  production_compat_unchanged: true
  no_external_side_effect_enabled: true
  fake_stub_contract_only: true

next_bundle:
  recommended_next_step: phase_5o_oauth_identity_fake_stub_adapter_bundle
  route_family: /api/h5/wechat/oauth*
