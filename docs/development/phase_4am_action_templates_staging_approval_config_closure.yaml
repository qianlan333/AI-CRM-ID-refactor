version: 1
status: phase_4am_action_templates_staging_approval_config_closure_no_execution

route_family: /api/admin/automation-conversion/action-templates*
capability_owner: aicrm_next.automation_engine
integration_fallback_boundary: aicrm_next.integration_gateway

authorizations:
  staging_smoke_execution_authorized: false
  production_dry_run_execution_authorized: false
  production_data_connection_authorized: false
  production_write_authorized: false
  production_repository_route_enablement_authorized: false
  production_route_ownership_switch_authorized: false
  fallback_removal_authorized: false
  production_compat_change_authorized: false
  real_external_call_authorized: false
  timer_execution_authorized: false
  outbound_send_authorized: false
  delete_ready: false

blocked_evidence_summary:
  prior_blocked_evidence_exists: true
  standalone_blocked_evidence_review_repeated: false
  folded_into_closure_package: true
  current_status: awaiting_staging_approval_config
  blockers:
    - staging_db_config_owner_approval_missing
    - staging_db_env_not_confirmed
    - staging_db_url_safety_not_confirmed
    - smoke_operator_not_assigned
    - rollback_owner_not_assigned
    - evidence_path_not_agreed
    - write_smoke_approval_not_confirmed
    - safe_namespace_cleanup_strategy_not_confirmed

owner_closure_form:
  automation_engine_owner_approval: pending
  integration_gateway_owner_approval: pending
  staging_db_config_owner_approval: pending
  rollback_owner_assigned: pending
  smoke_operator_assigned: pending
  evidence_path_agreed: pending
  safe_namespace_cleanup_strategy_confirmed: pending

config_closure_form:
  repo_backend_confirmed: pending
  staging_db_env_confirmed: pending
  staging_db_url_safety_confirmed: pending
  read_only_preflight_confirmed: pending
  write_smoke_approval_confirmed_if_needed: pending
  no_database_url_fallback_confirmed: pending
  no_action_templates_database_url_fallback_confirmed: pending
  no_test_database_url_fallback_confirmed: pending

db_url_safety:
  required_env: AICRM_ACTION_TEMPLATES_STAGING_DATABASE_URL
  repo_backend_env: AICRM_ACTION_TEMPLATES_REPO_BACKEND
  repo_backend_required_value: sqlalchemy
  allowed_markers:
    - staging
    - stage
    - test
    - local
    - dev
  forbidden_markers:
    - prod
    - production
    - primary
    - master
  forbidden_fallback_env:
    - DATABASE_URL
    - AICRM_ACTION_TEMPLATES_DATABASE_URL
    - AICRM_ACTION_TEMPLATES_TEST_DATABASE_URL

evidence_requirements:
  read_only_output_path_required: true
  write_output_path_required_if_writes: true
  raw_secret_export_allowed: false
  raw_pii_export_allowed: false
  staging_evidence_is_production_approval: false
  staging_evidence_is_route_switch_readiness: false
  staging_evidence_is_canary_approval: false

phase_execution_state_update:
  last_attempted_action: phase_4am_approval_config_closure
  last_created_pr: "#643"
  recommended_next_pr: phase_4am_owner_decision_or_staging_smoke_evidence_after_closure
  owner_approval_required: true
  status_after_package: awaiting_staging_approval_config

phase_4am_resume_gate:
  ready_for_staging_smoke_execution: false
  all_owner_closure_items_required: true
  all_config_closure_items_required: true
  staging_only: true
  production_dry_run_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
  production_write_allowed: false

next_action:
  if_closure_incomplete: owner_decision_package_for_missing_approval_config
  if_closure_complete: owner_approved_staging_smoke_evidence
  production_dry_run_allowed: false
  production_route_switch_allowed: false
  fallback_removal_allowed: false
