    - GET /api/admin/automation-conversion/workflow-nodes
    - GET /api/admin/image-library
    - GET /api/admin/image-library/facets
    - GET /api/admin/wecom/tags
    - GET /api/admin/wecom/tags/live/gate
    - GET /mcp
  requires_owner_approval_before_fallback_removal:
    - any production_compat fallback removal
    - any legacy Flask fallback removal
    - any runtime fallback used by customer-facing routes
  deferred_until_production_owner_switch_evidence:
    - legacy runtime deletion
    - route ownership manifest cleanup that changes live owner
    - production_compat manifest cleanup with behavior change
  not_safe_for_phase_7_first_batch:
    - payment capture/refund/settlement
    - OAuth callback cutover
    - WeCom callback cutover
    - timer/run-due/automation execution
    - outbound send
    - destructive migration
    - delete_ready true for runtime

