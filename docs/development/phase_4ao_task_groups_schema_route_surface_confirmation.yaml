    response_keys:
      - ok
      - groups
    archived_groups_excluded_by_default: true
    ordering: sort_order_asc_id_asc
  create:
    query:
      - program_id
    required_payload:
      - group_name
    optional_payload:
      - sort_order
    success_status: 201
    response_keys:
      - ok
      - group
    missing_name_status: 400
  update:
    path:
      - group_id
    payload:
      - group_name
      - sort_order
    success_status: 200
    missing_group_status: 404
    invalid_name_status: 400
  delete:
    path:
