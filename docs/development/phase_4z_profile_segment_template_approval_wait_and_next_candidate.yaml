next_candidate:
  selected_route_family: /api/admin/automation-conversion/action-templates*
  capability_owner: aicrm_next.automation_engine
  replacement_phase: phase_4_internal_write
  replacement_category: internal_write
  why_selected: Bounded internal action-template metadata CRUD can reuse the profile-segment-template contract, idempotency, audit, rollback, local parity, staging smoke, and approval-gate methodology while keeping production fallback ownership unchanged.
  excluded_side_effects:
    - item: payment
    - item: oauth
    - item: wecom external
    - item: callback
    - item: run-due
    - item: timer
    - item: execution
    - item: send
    - item: upload
    - item: openclaw
    - item: mcp
    - item: public submit
    - item: external push
  required_guardrails:
    - item: planning-only Phase 4AA entry first
    - item: retain legacy production_compat fallback ownership
    - item: define native contract before any repository adapter
    - item: require idempotency, audit, rollback, and validation boundaries
    - item: block fixture and local_contract success from production claims
    - item: require checker, local parity, staging smoke, approval, and rollback before production use
  phase_4aa_scope:
    - item: action-template native contract planning
    - item: legacy payload and table mapping discovery
    - item: idempotency and audit planning
    - item: rollback payload planning
    - item: checker and test plan
    - item: fallback boundary plan
  risks:
    - item: Action-template validation drift could affect operator setup if promoted without parity.
    - item: Delete semantics may be more sensitive than create or update and must stay out of the first plan unless separately approved.
    - item: Broad wildcard ownership could accidentally cover adjacent automation workspace routes without strict route-family checks.
  rollback_requirement: Keep or restore legacy production_compat fallback ownership; revert the candidate PR if checker, parity, smoke, or owner approval fails.
  business_continuity_requirement: Do not interrupt current automation operations; keep existing legacy production path until native parity, checker, smoke, rollback, and owner approval are complete.

