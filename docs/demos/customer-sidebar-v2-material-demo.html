<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI-CRM 客户侧边栏 V2 Demo</title>
  <style>
    :root{--bg:#eef4ff;--card:#fff;--line:#dce6f7;--text:#182230;--muted:#667085;--blue:#2563eb;--soft:#eff6ff;--green:#079455;--orange:#dc6803;--shadow:0 12px 32px rgba(16,24,40,.08);--r:22px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f4f8ff,#ecf2ff);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}.wrap{max-width:760px;margin:0 auto;padding:16px 14px 28px}.top{position:sticky;top:0;z-index:5;padding-top:8px;background:linear-gradient(180deg,#f4f8ff 0,#f4f8ff 80%,rgba(244,248,255,0))}.profile{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:var(--shadow)}.profile-main{display:grid;grid-template-columns:56px minmax(0,1fr) auto;gap:12px;align-items:start}.avatar{width:56px;height:56px;border-radius:18px;background:#dfeafe;color:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}.name{font-size:22px;font-weight:850;line-height:1.1}.meta{margin-top:6px;color:#667085;font-size:14px;line-height:1.55;word-break:break-all}.status{display:inline-flex;padding:7px 10px;border-radius:999px;background:#e9fbf1;color:#047857;font-size:13px;font-weight:800;white-space:nowrap}.workflow{margin-top:12px;display:inline-flex;max-width:100%;padding:7px 10px;border-radius:999px;background:#f8fafc;border:1px solid #e2e8f0;color:#344054;font-size:13px;font-weight:700}.actions{display:flex;margin-top:14px}.btn{border:0;border-radius:16px;min-height:42px;padding:10px 14px;font-size:15px;font-weight:800;cursor:pointer;background:#edf4ff;color:#1d4ed8}.btn.primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line);color:#344054}.actions .btn{width:100%}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:16px;min-height:48px;color:#344054;font-weight:850;font-size:15px;box-shadow:0 6px 18px rgba(16,24,40,.04);cursor:pointer}.tab.active{background:#2563eb;color:#fff;border-color:#2563eb}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.head h2{margin:0;font-size:20px}.head p{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.55}.grid{display:grid;gap:10px}.field{padding:13px;border:1px solid var(--line);background:#fbfdff;border-radius:16px}.field span{display:block;color:var(--muted);font-size:12px;font-weight:750;margin-bottom:6px}.field strong{font-size:16px;line-height:1.45}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:#f2f4f7;color:#344054;font-size:12px;font-weight:800}.chip.blue{background:#eff6ff;color:#1d4ed8}.chip.orange{background:#fff7ed;color:#c2410c}.chip.green{background:#ecfdf3;color:#047857}.card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fbfdff;margin-top:10px}.card-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.card h3{margin:0;font-size:16px;line-height:1.35}.card p{margin:8px 0 0;color:#667085;line-height:1.6;font-size:14px}.money{font-size:18px;font-weight:900;color:#101828}.mini{color:#667085;font-size:12px;font-weight:700;line-height:1.5}.kv{display:grid;grid-template-columns:86px minmax(0,1fr);gap:8px;margin-top:10px;font-size:14px}.kv span{color:#667085}.kv strong{font-weight:750}.row-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.questions{display:none;margin-top:12px;border-top:1px dashed #d0d5dd;padding-top:10px}.card.open .questions{display:block}.question{padding:9px 0;border-bottom:1px solid #eef2f7}.question:last-child{border-bottom:0}.question b{display:block;font-size:13px;margin-bottom:4px}.question em{font-style:normal;color:#475467;font-size:14px;line-height:1.6}.seg{display:flex;gap:8px;margin:10px 0 14px;overflow:hidden}.seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;min-height:38px;font-weight:850;color:#475467}.seg button.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}.search{width:100%;border:1px solid var(--line);border-radius:16px;min-height:42px;padding:0 14px;font-size:14px;margin-bottom:8px}.msg{display:grid;gap:6px;padding:12px;border-radius:16px;border:1px solid var(--line);background:#fbfdff;margin-top:10px}.msg .who{font-size:12px;color:#667085}.msg .txt{line-height:1.65;font-size:14px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#101828;color:#fff;border-radius:999px;padding:10px 14px;font-size:13px;display:none;z-index:20}.toast.show{display:block}@media(max-width:520px){.wrap{padding:10px}.profile{padding:14px;border-radius:22px}.profile-main{grid-template-columns:48px minmax(0,1fr);}.avatar{width:48px;height:48px;border-radius:16px}.status{grid-column:1/3;justify-self:start}.tabs{grid-template-columns:repeat(2,1fr)}.row-actions{grid-template-columns:1fr}.kv{grid-template-columns:72px minmax(0,1fr)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <section class="profile">
      <div class="profile-main">
        <div class="avatar">月</div>
        <div>
          <div class="name">月朗</div>
          <div class="meta">18210198814 · 外部联系人 wmid_xxx_789</div>
          <div class="workflow">暑期阅读转化 SOP · 第 3 天 · 重点跟进节点</div>
        </div>
        <div class="status">手机号已绑定</div>
      </div>
      <div class="actions"><button class="btn" onclick="toast('进入更换手机号流程')">换手机号</button></div>
    </section>
    <nav class="tabs" id="tabs"></nav>
  </div>
  <main id="content"></main>
</div>
<div class="toast" id="toast"></div>
<script>
const tabs=[['profile','核心画像'],['forms','问卷'],['products','商品'],['orders','订单'],['materials','素材'],['messages','聊天记录']];
const data={
 profile:{source:'公众号留资 / 企业微信扫码',industry:'教育培训 / 知识付费',industryDesc:'家长用户，关注小学阶段阅读理解、表达能力和学习习惯培养。此前看过阅读测评文章，并点击过暑期训练营介绍页。',needs:['希望先做能力测评','想知道孩子阅读短板','更关注是否能坚持打卡','需要看到课程大纲和家长反馈'],grade:'小学三年级',budget:'500-1000 元',style:'微信文字沟通优先，晚上 20:00 后回复更稳定',remark:'不展示客户分层；这里后续绑定问卷里的关键字段。'},
 forms:[
  {name:'暑期阅读能力测评问卷',time:'2026-05-19 21:18',state:'已提交',desc:'用于识别孩子当前阅读能力、家长核心诉求和预算区间。',qs:[['用户来源','公众号文章《三年级阅读理解怎么提分》'],['行业','教育培训 / 家庭教育'],['行业描述','家长是主要决策人，关注阅读能力和语文成绩'],['具体需求点','孩子读题慢，阅读理解经常漏信息，希望暑假集中训练'],['预算区间','500-1000 元'],['可沟通时间','晚上 20:00 后']]},
  {name:'试听课预约信息',time:'2026-05-20 09:42',state:'已提交',desc:'用于确认试听时间、孩子基础情况和是否需要老师提前诊断。',qs:[['孩子年级','三年级'],['预约时间','周六 10:00-11:00'],['是否做过阅读训练','没有系统训练，只做过学校练习'],['希望老师重点看什么','读题速度、概括能力、错题原因'],['是否接受课前电话','可以，最好提前微信约时间']]},
  {name:'课程意向确认表',time:'2026-05-20 13:05',state:'部分填写',desc:'用于确认课程包、支付意向和交付偏好。',qs:[['最感兴趣商品','暑期阅读 21 天训练营'],['当前顾虑','担心孩子坚持不下来'],['是否需要发课程大纲','需要 PDF 版课程大纲'],['是否需要家长反馈','需要看同年级案例']]}],
 products:[
  {name:'暑期阅读 21 天训练营',price:'¥399',desc:'面向小学 2-4 年级，围绕阅读理解、信息提取、概括表达和每日打卡训练。',fit:'匹配问卷字段：孩子三年级 / 阅读理解漏信息 / 希望暑期集中训练',tags:['训练营','阅读','21天']},
  {name:'1 对 1 阅读能力诊断课',price:'¥99',desc:'30 分钟老师诊断，输出孩子当前阅读问题和后续训练建议。',fit:'适合尚未完全确认购买的客户，先用低门槛诊断建立信任。',tags:['诊断','低门槛','试听']},
  {name:'家长陪跑答疑包',price:'¥199',desc:'训练营期间每周一次家长答疑，帮助家长理解孩子反馈和训练方法。',fit:'匹配问卷字段：家长关注坚持打卡和家庭配合。',tags:['答疑','家长','陪跑']}],
 orders:[
  {id:'ORD202605200014',state:'已支付',amount:'¥399',item:'暑期阅读 21 天训练营',paid:'2026-05-20 14:22',delivery:'已开通课程群，待发送课前资料',after:'暂无退款 / 售后记录'},
  {id:'ORD202605190089',state:'已支付',amount:'¥99',item:'1 对 1 阅读能力诊断课',paid:'2026-05-19 22:05',delivery:'已完成预约，周六 10:00 诊断',after:'客户要求提前发送准备材料'},
  {id:'ORD202605180031',state:'已取消',amount:'¥0',item:'阅读能力测评权益包',paid:'未支付',delivery:'未开通',after:'客户改为购买诊断课'}],
 materials:[
  {type:'image',name:'暑期阅读训练营主海报',use:'用于首次介绍课程价值和训练周期',tag:'课程海报',status:'可发送'},
  {type:'image',name:'阅读理解四步法长图',use:'用于解释课程方法论，适合客户问“怎么训练”时发送',tag:'方法长图',status:'可发送'},
  {type:'image',name:'三年级家长反馈截图合集',use:'用于回应客户对效果和坚持度的顾虑',tag:'反馈截图',status:'可发送'},
  {type:'mini',name:'试听课预约小程序卡',use:'直接发给客户预约诊断课时间',tag:'预约入口',status:'可发送'},
  {type:'mini',name:'阅读能力测评入口',use:'客户未填测评时发送，提交后回写画像字段',tag:'测评入口',status:'可发送'},
  {type:'mini',name:'课程介绍页小程序',use:'包含课程介绍、报名按钮和支付入口',tag:'商品页',status:'可发送'},
  {type:'pdf',name:'21 天阅读训练营课程大纲.pdf',use:'用于客户要求了解详细课程安排时发送',tag:'课程大纲',status:'可发送'},
  {type:'pdf',name:'阅读能力诊断报告样例.pdf',use:'用于展示诊断课交付物，让客户知道会得到什么',tag:'报告样例',status:'可发送'},
  {type:'pdf',name:'报名与售后说明.pdf',use:'用于支付前说明开课、退款、售后边界',tag:'付款说明',status:'可发送'}],
 messages:[
  ['2026-05-20 14:36','客户','我刚刚付了 399，后面怎么进群？'],['2026-05-20 14:38','运营','已经看到订单了，我现在给你发入群方式和课前准备材料。'],['2026-05-20 13:30','客户','能不能发一下具体课程大纲？我想看每天都练什么。'],['2026-05-20 13:32','运营','可以，我发你 PDF 版大纲，也顺手发一个同年级家长反馈。'],['2026-05-19 21:20','客户','孩子主要是读题很慢，考试时容易漏掉关键信息。'],['2026-05-19 21:25','运营','这个比较适合先做阅读能力测评，能看出是信息提取、概括还是表达环节的问题。']]
};
let active='profile',matType='all',matKeyword='';
function boot(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t[0]===active?'active':''}" onclick="switchTab('${t[0]}')">${t[1]}</button>`).join('');render()}
function switchTab(k){active=k;boot()}function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>el.classList.remove('show'),1800)}
function panel(title,desc,body){return `<section class="panel"><div class="head"><div><h2>${title}</h2><p>${desc}</p></div></div>${body}</section>`}
function render(){const c=document.getElementById('content');if(active==='profile')return c.innerHTML=renderProfile();if(active==='forms')return c.innerHTML=renderForms();if(active==='products')return c.innerHTML=renderProducts();if(active==='orders')return c.innerHTML=renderOrders();if(active==='materials')return c.innerHTML=renderMaterials();if(active==='messages')return c.innerHTML=renderMessages()}
function renderProfile(){const p=data.profile;return panel('核心画像','默认首页，只展示从问卷关键字段绑定而来的业务信息，不做客户分层或 AI 建议。',`<div class="grid"><div class="field"><span>用户来源</span><strong>${p.source}</strong></div><div class="field"><span>行业</span><strong>${p.industry}</strong></div><div class="field"><span>行业描述</span><strong>${p.industryDesc}</strong></div><div class="field"><span>具体需求点</span><div class="chips">${p.needs.map(x=>`<i class="chip blue">${x}</i>`).join('')}</div></div><div class="field"><span>孩子年级</span><strong>${p.grade}</strong></div><div class="field"><span>预算区间</span><strong>${p.budget}</strong></div><div class="field"><span>沟通偏好</span><strong>${p.style}</strong></div><div class="field"><span>备注</span><strong>${p.remark}</strong></div></div>`)}
function renderForms(){return panel('问卷','展示客户提交过的问卷，点击“查看答案”展开题目和答案。',data.forms.map((f,i)=>`<article class="card" id="form${i}"><div class="card-title"><div><h3>${f.name}</h3><div class="mini">${f.time} · ${f.state}</div></div><span class="chip green">${f.state}</span></div><p>${f.desc}</p><div class="row-actions"><button class="btn primary" onclick="toggleCard('form${i}')">查看答案</button><button class="btn ghost" onclick="toast('打开原始问卷记录')">原始记录</button></div><div class="questions">${f.qs.map(q=>`<div class="question"><b>${q[0]}</b><em>${q[1]}</em></div>`).join('')}</div></article>`).join(''))}
function renderProducts(){return panel('商品','后台配置好的可推送商品。这里只展示商品和业务规则依据，不自动生成推荐建议。',data.products.map(p=>`<article class="card"><div class="card-title"><div><h3>${p.name}</h3><div class="mini">${p.tags.map(x=>`#${x}`).join(' ')}</div></div><div class="money">${p.price}</div></div><p>${p.desc}</p><div class="kv"><span>适配依据</span><strong>${p.fit}</strong></div><div class="row-actions"><button class="btn primary" onclick="toast('已模拟发送商品介绍')">发送介绍</button><button class="btn ghost" onclick="toast('打开商品详情')">查看详情</button></div></article>`).join(''))}
function renderOrders(){return panel('订单','展示历史订单和交付状态，方便侧边栏内快速确认付款和售后信息。',data.orders.map(o=>`<article class="card"><div class="card-title"><div><h3>${o.item}</h3><div class="mini">${o.id}</div></div><span class="chip ${o.state==='已支付'?'green':'orange'}">${o.state}</span></div><div class="kv"><span>金额</span><strong>${o.amount}</strong><span>支付时间</span><strong>${o.paid}</strong><span>交付状态</span><strong>${o.delivery}</strong><span>售后</span><strong>${o.after}</strong></div><div class="row-actions"><button class="btn primary" onclick="toast('打开订单详情')">查看详情</button><button class="btn ghost" onclick="toast('已复制订单号')">复制订单号</button></div></article>`).join(''))}
function renderMaterials(){const typeName={all:'全部',image:'图片素材',mini:'小程序素材',pdf:'PDF素材'};const rows=data.materials.filter(m=>(matType==='all'||m.type===matType)&&(!matKeyword||`${m.name}${m.use}${m.tag}`.includes(matKeyword)));return panel('素材','连接素材库，按图片、小程序、PDF 三类选择素材并发送给客户。',`<div class="seg">${['all','image','mini','pdf'].map(t=>`<button class="${matType===t?'active':''}" onclick="matType='${t}';render()">${typeName[t]}</button>`).join('')}</div><input class="search" placeholder="搜索素材名称、用途、标签" value="${matKeyword}" oninput="matKeyword=this.value.trim();render()">${rows.map(m=>`<article class="card"><div class="card-title"><div><h3>${m.name}</h3><div class="mini">${typeName[m.type]} · ${m.tag}</div></div><span class="chip green">${m.status}</span></div><p>${m.use}</p><div class="row-actions"><button class="btn primary" onclick="toast('已模拟发送素材：${m.name}')">发送给客户</button><button class="btn ghost" onclick="toast('预览素材')">预览</button></div></article>`).join('')||'<div class="field"><strong>没有匹配素材</strong></div>'}`)}
function renderMessages(){return panel('聊天记录','默认展示最近聊天记录，后续真实开发可接现有聊天记录接口并支持加载更多。',data.messages.map(m=>`<div class="msg"><div class="who">${m[0]} · ${m[1]}</div><div class="txt">${m[2]}</div></div>`).join('')+`<div class="row-actions"><button class="btn primary" onclick="toast('加载更多聊天')">加载更多</button><button class="btn ghost" onclick="toast('复制聊天摘要')">复制摘要</button></div>`)}
function toggleCard(id){document.getElementById(id).classList.toggle('open')}boot();
</script>
</body>
</html>
