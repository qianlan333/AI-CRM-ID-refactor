version: 1

migration_guard:
  # PR #10 starts table lifecycle governance after the unionid identity closeout.
  # Future migrations after this baseline must register every newly created table here.
  new_table_registration_after: "0073_drop_hxc_snapshot_external_userid"
  migration_file_prefix_after: "0073"

tables:
  automation_member:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: automation_membership_v2, ai_audience_member_current, crm_user_identity
    drop_candidate: false
    drop_after: "0070_retire_automation_member_table"
    runtime_entrypoints: []
    migration_source: "0001 baseline, removed by 0070_retire_automation_member_table"
    guard_tests:
      - tests/test_unionid_identity_refactor_schema.py::test_retired_automation_member_table_is_physically_removed
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_baseline_stub_dropped_by_migration
    notes: Retired physical table. Test bootstrap may create a legacy stub so later migrations can drop it.

  automation_execution_trace:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job, external_effect_attempt, internal_event_consumer_attempt
    drop_candidate: false
    drop_after: "0071_retire_conversion_trace_tables"
    runtime_entrypoints: []
    migration_source: "0002_perf_indexes_and_trace, removed by 0071_retire_conversion_trace_tables"
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Retired conversion workflow trace table; current runtime must not read or write it.

  conversion_dispatch_log:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job, domain_event_outbox, outbound_event_outbox
    drop_candidate: false
    drop_after: "0071_retire_conversion_trace_tables"
    runtime_entrypoints: []
    migration_source: "0001 baseline, removed by 0071_retire_conversion_trace_tables"
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_baseline_stub_dropped_by_migration
    notes: Retired conversion dispatch table. Test bootstrap may create a legacy stub so 0071 proves the drop path.

  user_ops_lead_pool_current:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, crm_user_identity
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; mobile binding now updates crm_user_identity or resolution queue.

  user_ops_lead_pool_history:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: crm_user_identity_resolution_queue, future user_ops audit/event table
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; mobile binding history is represented in identity payload metadata.

  user_ops_pool_current:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, ai_audience_member_current
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; external campaign target lookup now joins user_ops_pool_current_next through crm_user_identity.

  user_ops_pool_history:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, future user_ops audit/event table
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; no Next runtime SQL owner remains.

  user_ops_send_records:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_send_records_next
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; tests and runtime use user_ops_send_records_next.

  user_ops_deferred_jobs:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job or user_ops deferred gateway to be selected in PR #11
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; admin jobs now returns an empty retired surface until a new deferred gateway is selected.

  message_batches:
    domain: messaging
    lifecycle: read_model
    write_owner: legacy message batch collector
    read_owners:
      - aicrm_next.admin_jobs.repository
    replacement: broadcast_jobs, broadcast_job_events, outbound_tasks
    drop_candidate: true
    drop_after: "after admin jobs message batch UI reads broadcast_jobs/outbound_tasks"
    runtime_entrypoints:
      - /api/admin/jobs/message-batches
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Still read and acknowledged by admin jobs; PR #12 should decide view compatibility versus physical removal.

  message_batch_items:
    domain: messaging
    lifecycle: read_model
    write_owner: legacy message batch collector
    read_owners:
      - aicrm_next.admin_jobs.repository
    replacement: broadcast_job_events, outbound_tasks, archived_messages
    drop_candidate: true
    drop_after: "after message batch detail reads a unified broadcast/outbound read model"
    runtime_entrypoints:
      - /api/admin/jobs/message-batches
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Detail rows are joined to archived_messages by admin jobs.

  marketing_automation_question_rules:
    domain: admin_config
    lifecycle: config
    write_owner: aicrm_next.admin_config.repository
    read_owners:
      - aicrm_next.admin_config.repository
      - aicrm_next.admin_config.application
    replacement: automation workflow config or questionnaire rule package to be selected in PR #14
    drop_candidate: true
    drop_after: "after marketing automation config is reconciled with automation_program/workflow"
    runtime_entrypoints:
      - admin config marketing automation settings
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Still actively read/written by admin config code.

  marketing_automation_configs:
    domain: admin_config
    lifecycle: config
    write_owner: aicrm_next.admin_config.repository
    read_owners:
      - aicrm_next.admin_config.repository
      - aicrm_next.admin_config.application
    replacement: automation_program, automation_workflow, or package config to be selected in PR #14
    drop_candidate: true
    drop_after: "after marketing automation config is reconciled with automation_program/workflow"
    runtime_entrypoints:
      - admin config marketing automation settings
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Still actively read/written by admin config code.
