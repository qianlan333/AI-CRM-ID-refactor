version: 1

migration_guard:
  # PR #10 starts table lifecycle governance after the unionid identity closeout.
  # Future migrations after this baseline must register every newly created table here.
  new_table_registration_after: "0073_drop_hxc_snapshot_external_userid"
  migration_file_prefix_after: "0073"

tables:
  automation_member:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: automation_membership_v2, ai_audience_member_current, crm_user_identity
    drop_candidate: false
    drop_after: "0070_retire_automation_member_table"
    runtime_entrypoints: []
    migration_source: "0001 baseline, removed by 0070_retire_automation_member_table"
    guard_tests:
      - tests/test_unionid_identity_refactor_schema.py::test_retired_automation_member_table_is_physically_removed
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_baseline_stub_dropped_by_migration
    notes: Retired physical table. Test bootstrap may create a legacy stub so later migrations can drop it.

  automation_execution_trace:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job, external_effect_attempt, internal_event_consumer_attempt
    drop_candidate: false
    drop_after: "0071_retire_conversion_trace_tables"
    runtime_entrypoints: []
    migration_source: "0002_perf_indexes_and_trace, removed by 0071_retire_conversion_trace_tables"
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Retired conversion workflow trace table; current runtime must not read or write it.

  conversion_dispatch_log:
    domain: automation
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job, domain_event_outbox, outbound_event_outbox
    drop_candidate: false
    drop_after: "0071_retire_conversion_trace_tables"
    runtime_entrypoints: []
    migration_source: "0001 baseline, removed by 0071_retire_conversion_trace_tables"
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_baseline_stub_dropped_by_migration
    notes: Retired conversion dispatch table. Test bootstrap may create a legacy stub so 0071 proves the drop path.

  user_ops_lead_pool_current:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, crm_user_identity
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; mobile binding now updates crm_user_identity or resolution queue.

  user_ops_lead_pool_history:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: crm_user_identity_resolution_queue, future user_ops audit/event table
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; mobile binding history is represented in identity payload metadata.

  user_ops_pool_current:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, ai_audience_member_current
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; external campaign target lookup now joins user_ops_pool_current_next through crm_user_identity.

  user_ops_pool_history:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_pool_current_next, future user_ops audit/event table
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; no Next runtime SQL owner remains.

  user_ops_send_records:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: user_ops_send_records_next
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; tests and runtime use user_ops_send_records_next.

  user_ops_deferred_jobs:
    domain: user_ops
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: external_effect_job or user_ops deferred gateway to be selected in PR #11
    drop_candidate: false
    drop_after: PR #11 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; admin jobs now returns an empty retired surface until a new deferred gateway is selected.

  message_batches:
    domain: messaging
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: broadcast_jobs, broadcast_job_events, outbound_tasks
    drop_candidate: false
    drop_after: PR #12 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; admin jobs message-batch UI now reads broadcast_jobs compatibility projection.

  message_batch_items:
    domain: messaging
    lifecycle: retired
    write_owner: ""
    read_owners: []
    replacement: broadcast_job_events, outbound_tasks, archived_messages
    drop_candidate: false
    drop_after: PR #12 runtime cleanup
    runtime_entrypoints: []
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    test_fixture_policy: legacy_truncate_compat_absent_ok
    notes: Retired from fresh schema; batch details now read broadcast_job_events.

  marketing_automation_question_rules:
    domain: admin_config
    lifecycle: config
    write_owner: aicrm_next.admin_config.repository
    read_owners:
      - aicrm_next.admin_config.repository
      - aicrm_next.admin_config.application
    replacement: automation workflow config or questionnaire rule package to be selected in PR #14
    drop_candidate: true
    drop_after: "after marketing automation config is reconciled with automation_program/workflow"
    runtime_entrypoints:
      - admin config marketing automation settings
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Still actively read/written by admin config code.

  marketing_automation_configs:
    domain: admin_config
    lifecycle: config
    write_owner: aicrm_next.admin_config.repository
    read_owners:
      - aicrm_next.admin_config.repository
      - aicrm_next.admin_config.application
    replacement: automation_program, automation_workflow, or package config to be selected in PR #14
    drop_candidate: true
    drop_after: "after marketing automation config is reconciled with automation_program/workflow"
    runtime_entrypoints:
      - admin config marketing automation settings
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
    notes: Still actively read/written by admin config code.

  domain_event_outbox:
    domain: commerce_events
    lifecycle: event
    write_owner: aicrm_next.commerce.external_push_outbox
    read_owners:
      - aicrm_next.commerce.external_push_admin
    replacement: internal_event or external_effect_job after event/outbox convergence is designed
    drop_candidate: true
    drop_after: "after PR #13 lineage proves commerce outbox is fully represented by internal_event/external_effect"
    runtime_entrypoints:
      - product external push outbox
      - external push admin diagnostics
    migration_source: 0023_product_external_push
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Business event outbox for commerce external push; not an external side-effect executor.

  external_push_delivery:
    domain: commerce_events
    lifecycle: legacy_boundary
    write_owner: aicrm_next.commerce.external_push_admin
    read_owners:
      - aicrm_next.commerce.external_push_admin
      - external_effect compatibility diagnostics
    replacement: external_effect_job, external_effect_attempt
    drop_candidate: true
    drop_after: "after commerce external push delivery history is projected from external_effect_job/attempt"
    runtime_entrypoints:
      - product external push test/retry admin
      - order delivery retry
    migration_source: 0023_product_external_push
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Active legacy delivery ledger; future work should converge retries and status to external_effect.

  outbound_webhook_deliveries:
    domain: outbound_webhook
    lifecycle: queue
    write_owner: outbound webhook worker/runtime
    read_owners:
      - aicrm_next.admin_jobs.repository
    replacement: external_effect_job, external_effect_attempt
    drop_candidate: true
    drop_after: "after webhook deliveries are represented as external_effect jobs"
    runtime_entrypoints:
      - admin jobs webhook deliveries tab
      - webhook retry/update diagnostics
    migration_source: pre-Alembic baseline
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Queue-like webhook delivery ledger; overlaps with external_effect but remains active.

  outbound_event_outbox:
    domain: outbound_webhook
    lifecycle: event
    write_owner: legacy outbound event publisher
    read_owners: []
    replacement: domain_event_outbox or internal_event after event lineage convergence
    drop_candidate: true
    drop_after: "after outbound event producers/readers are audited"
    runtime_entrypoints: []
    migration_source: 0002_perf_indexes_and_trace
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Existing outbox table in schema; no PR #13 runtime owner was confirmed.

  internal_event:
    domain: internal_events
    lifecycle: event
    write_owner: aicrm_next.platform_foundation.internal_events.service
    read_owners:
      - aicrm_next.platform_foundation.internal_events.worker
      - internal event admin/reconciliation APIs
    replacement: none; canonical internal event bus
    drop_candidate: false
    drop_after: ""
    runtime_entrypoints:
      - internal event publish
      - internal event worker
      - internal event admin API
    migration_source: 0043_internal_event_queue
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Canonical internal event ledger. Handlers must enqueue external_effect_job for real external calls.

  internal_event_consumer_run:
    domain: internal_events
    lifecycle: queue
    write_owner: aicrm_next.platform_foundation.internal_events.worker
    read_owners:
      - internal event admin/reconciliation APIs
    replacement: none; canonical internal consumer queue
    drop_candidate: false
    drop_after: ""
    runtime_entrypoints:
      - internal event consumer scheduling
      - internal event worker retry
    migration_source: 0043_internal_event_queue
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Tracks consumer execution state for internal_event.

  internal_event_consumer_attempt:
    domain: internal_events
    lifecycle: audit
    write_owner: aicrm_next.platform_foundation.internal_events.worker
    read_owners:
      - internal event admin/reconciliation APIs
    replacement: none; canonical internal consumer attempt audit
    drop_candidate: false
    drop_after: ""
    runtime_entrypoints:
      - internal event worker attempt logging
    migration_source: 0043_internal_event_queue
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Attempt audit for internal_event_consumer_run.

  external_effect_job:
    domain: external_effects
    lifecycle: queue
    write_owner: aicrm_next.platform_foundation.external_effects.service
    read_owners:
      - aicrm_next.platform_foundation.external_effects.worker
      - push center projection
      - admin external effect APIs
    replacement: none; canonical external side-effect queue
    drop_candidate: false
    drop_after: ""
    runtime_entrypoints:
      - external effect service enqueue
      - external effect worker
      - push center reconciliation
    migration_source: 0039_external_effect_queue
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Canonical queue for real external side effects.

  external_effect_attempt:
    domain: external_effects
    lifecycle: audit
    write_owner: aicrm_next.platform_foundation.external_effects.worker
    read_owners:
      - push center projection
      - admin external effect APIs
    replacement: none; canonical external side-effect attempt audit
    drop_candidate: false
    drop_after: ""
    runtime_entrypoints:
      - external effect worker attempt logging
    migration_source: 0039_external_effect_queue
    guard_tests:
      - tests/test_data_table_lifecycle_guard.py
      - tests/test_event_effect_table_lineage.py
    notes: Attempt audit for external_effect_job execution.
