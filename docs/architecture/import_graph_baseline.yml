    owner: architecture
    reason: Existing modular-monolith reverse imports must be removed incrementally by the remaining R12 slices.
    remove_by: "2026-08-31"
    contexts:
      - admin_auth
      - admin_jobs
      - admin_shell
      - automation_engine
      - channel_entry
      - cloud_orchestrator
      - commerce
      - customer_read_model
      - customer_tags
      - external_push
      - identity_contact
      - integration_gateway
      - media_library
      - message_archive
      - platform_foundation
      - public_product
      - questionnaire
      - send_content
      - service_period
  - id: ai_audience_ops_ops_enrollment_scc
    owner: architecture
    reason: The remaining audience enrollment query dependency will be inverted in the next R12 slice.
    remove_by: "2026-08-31"
    contexts:
      - ai_audience_ops
      - ops_enrollment
