version: 1

source_repository: qianlan333/AI-CRM-ID-refactor
target_repository: qianlan333/AI-CRM

authorization:
  command: PROMOTE <validated_ID_SHA> TO AI-CRM
  creates_github_pr_only: true
  authorizes_server_deploy: false

# Classification precedence is fail-closed: id_only, then mixed review, then
# promotable. A path in either guarded class must never be copied wholesale by
# an automated promotion tool.
promotable_application:
  paths: []
  globs:
    - aicrm_next/**
    - migrations/versions/**
    - deploy/**
    - frontend/**
    - scripts/ci/**
    - scripts/run_execution_runtime.py
    - tests/**
    - docs/architecture/**
    - docs/ci/**
    - package.json

id_only_overlay:
  paths:
    - .github/workflows/deploy.yml
    - .github/workflows/id-validation-queue-operations.yml
    - .github/workflows/refresh-pytest-duration-baseline.yml
    - aicrm_next/platform_foundation/execution_runtime/validation.py
    - aicrm_next/platform_foundation/external_effects/canary_repository.py
    - aicrm_next/platform_foundation/external_effects/test_receiver.py
    - aicrm_next/platform_foundation/external_effects/wecom_canary_policy.py
    - deploy/aicrm-queue-soak-snapshot.service
    - deploy/aicrm-queue-soak-snapshot.timer
    - docs/adr/2026-07-17-id-validation-deployment-ownership.md
    - docs/architecture/id_validation_promotion_manifest.yml
    - migrations/versions/0135_queue_scope_transition_audit.py
    - scripts/ci/check_id_validation_promotion_manifest.py
    - scripts/ops/attest_queue_runtime_validation.py
    - scripts/ops/authorize_wecom_canary_execution.py
    - scripts/ops/configure_wecom_canary.py
    - scripts/ops/manage_queue_runtime_soak.py
    - scripts/ops/plan_wecom_canary.py
    - scripts/ops/run_id_validation_queue_operation.sh
    - scripts/ops/run_queue_runtime_fault_drill.py
    - scripts/ops/run_test_loopback_canary.py
    - scripts/ops/transition_queue_runtime_scope.py
    - tests/test_attest_queue_runtime_validation.py
    - tests/test_authorize_wecom_canary_execution.py
    - tests/test_id_validation_admin_config_lock.py
    - tests/test_id_validation_promotion_manifest.py
    - tests/test_plan_wecom_canary.py
    - tests/test_queue_runtime_fault_drill.py
    - tests/test_queue_runtime_operations_workflow.py
    - tests/test_queue_runtime_validation.py
    - tests/test_run_test_loopback_canary.py
    - tests/test_wecom_canary_configuration.py
    - tests/test_wecom_canary_policy.py
  globs:
    - .github/workflows/*id-validation*
    - docs/adr/*id-validation*
    - scripts/**/*id_validation*
    - scripts/**/*wecom_canary*
    - tests/*id_validation*
    - tests/*wecom_canary*
    - tests/**/*id_validation*
    - tests/**/*wecom_canary*

