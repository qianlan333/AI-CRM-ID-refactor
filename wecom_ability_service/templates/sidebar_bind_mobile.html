<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客户档案绑定</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ea;
      --panel: rgba(255,255,255,0.94);
      --line: rgba(81, 63, 34, 0.12);
      --text: #2f2416;
      --muted: #7b6c57;
      --primary: #91643b;
      --primary-strong: #754d28;
      --soft: #f4e9da;
      --danger: #b24e37;
      --ok: #2f7d57;
      --shadow: 0 18px 50px rgba(76, 53, 28, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Helvetica Neue", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(201, 153, 96, 0.18), transparent 24%),
        linear-gradient(180deg, #f9f6ef 0%, var(--bg) 100%);
    }
    .shell { max-width: 720px; margin: 0 auto; padding: 20px 16px 28px; }
    .hero { margin-bottom: 16px; }
    .hero h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.15; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .customer-title {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(8px);
    }
    .grid { display: grid; gap: 12px; }
    label { display: grid; gap: 8px; font-size: 14px; }
    input {
      width: 100%;
      border: 1px solid rgba(81, 63, 34, 0.18);
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 16px;
      background: #fffdf8;
      color: var(--text);
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      cursor: pointer;
    }
    button[disabled] { opacity: 0.55; cursor: not-allowed; }
    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--ok); }
    .hidden { display: none; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .muted-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 11px 14px;
      text-decoration: none;
      color: var(--primary-strong);
      background: var(--soft);
      font-size: 14px;
      font-weight: 600;
    }
    .tag-quick-card { margin-top: 14px; }
    .automation-card { margin-top: 14px; }
    .automation-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-title {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 700;
    }
    .section-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .tag-quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .tag-quick-btn {
      padding: 12px 10px;
      border-radius: 14px;
      border: 1px solid rgba(81, 63, 34, 0.14);
      background: #fffdf8;
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
    }
    .tag-quick-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      border-color: transparent;
    }
    .automation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .automation-grid--triple {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .automation-item {
      border: 1px solid rgba(81, 63, 34, 0.1);
      border-radius: 14px;
      padding: 12px;
      background: #fffdf8;
    }
    .automation-item span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .automation-item strong {
      display: block;
      font-size: 15px;
      line-height: 1.4;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: var(--soft);
      color: var(--primary-strong);
    }
    .badge.ok {
      background: rgba(47, 125, 87, 0.16);
      color: var(--ok);
    }
    .badge.warn {
      background: rgba(145, 100, 59, 0.14);
      color: var(--primary-strong);
    }
    .badge.danger {
      background: rgba(178, 78, 55, 0.14);
      color: var(--danger);
    }
    .ghost-button {
      border: 1px solid rgba(81, 63, 34, 0.14);
      background: #fffdf8;
      color: var(--text);
    }
    .danger-button {
      background: linear-gradient(135deg, #c26649, #a94934);
      color: #fff;
    }
    .tag-quick-btn[disabled] { opacity: 0.58; cursor: not-allowed; }
    @media (max-width: 560px) {
      .kv { grid-template-columns: 1fr; gap: 6px; }
      .tag-quick-grid { grid-template-columns: 1fr; }
      .automation-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>客户档案绑定</h1>
      <p>识别当前客户是否已绑定手机号，未绑定则补充手机号，已绑定则直接查看绑定信息。</p>
      <div id="customer-title" class="customer-title">客户昵称：识别中</div>
    </section>

    <section id="loading-card" class="card">
      <div class="status">正在识别当前客户…</div>
    </section>

    <section id="unbind-card" class="card hidden">
      <div class="grid">
        <div class="muted-note">该客户暂未绑定手机号</div>
        <label>
          <span>手机号</span>
          <input id="mobile-input" inputmode="numeric" autocomplete="tel" maxlength="20" placeholder="请输入 11 位手机号">
        </label>
        <button id="bind-button" type="button">绑定手机号</button>
        <div id="bind-status" class="status"></div>
      </div>
    </section>

    <section id="bound-card" class="card hidden">
      <div class="grid">
        <div class="muted-note">该客户已完成手机号绑定</div>
        <div id="bound-mobile" class="customer-title"></div>
        <div class="actions">
          <button id="rebind-button" type="button" class="ghost">更换手机号</button>
        </div>
        <div id="rebind-form" class="grid hidden">
          <label>
            <span>新手机号</span>
            <input id="rebind-mobile-input" inputmode="numeric" autocomplete="tel" maxlength="20" placeholder="请输入新的 11 位手机号">
          </label>
          <button id="confirm-rebind-button" type="button">确认更换手机号</button>
        </div>
        <div id="bound-status" class="status success"></div>
      </div>
    </section>

    <section id="lead-pool-class-term-card" class="card tag-quick-card hidden">
      <h2 class="section-title">班期快捷设置</h2>
      <p class="section-note">点击即设置当前客户的班期，并同步对应企微班期标签。</p>
      <div id="lead-pool-class-term-grid" class="tag-quick-grid"></div>
      <div id="lead-pool-class-term-status" class="status"></div>
    </section>

    <section id="marketing-profile-card" class="card automation-card hidden">
      <div class="automation-card-head">
        <div>
          <h2 class="section-title">自动化转化卡片</h2>
          <p class="section-note">这里展示客户当前池子、是否激活、当前跟进类型。问卷只做第一次分流，人工改判永远优先。</p>
        </div>
        <div class="actions">
          <button id="switch-focus-button" type="button">转为重点跟进</button>
          <button id="switch-normal-button" type="button" class="ghost-button">转为普通跟进</button>
          <button id="mark-enrolled-button" type="button" class="danger-button">确认已成交</button>
          <button id="unmark-enrolled-button" type="button" class="ghost-button">撤销成交确认</button>
        </div>
      </div>
      <div class="badge-row">
        <span id="marketing-stage-badge" class="badge warn">待转化</span>
        <span id="marketing-segment-badge" class="badge">暂未分层</span>
      </div>
      <div class="automation-grid automation-grid--triple">
        <div class="automation-item">
          <span>当前池子</span>
          <strong id="marketing-phase-value">待转化</strong>
        </div>
        <div class="automation-item">
          <span>当前跟进类型</span>
          <strong id="marketing-segment-value">暂未分层</strong>
        </div>
        <div class="automation-item">
          <span>问卷初判</span>
          <strong id="marketing-initial-segment-value">未完成初判</strong>
        </div>
        <div class="automation-item">
          <span>当前跟进来源</span>
          <strong id="marketing-followup-source-value">待问卷提交</strong>
        </div>
        <div class="automation-item">
          <span>最近人工改判</span>
          <strong id="marketing-manual-override-value">当前仍按问卷初判执行</strong>
        </div>
        <div class="automation-item">
          <span>命中题数</span>
          <strong id="marketing-hit-count-value">0</strong>
        </div>
        <div class="automation-item">
          <span>是否已激活</span>
          <strong id="marketing-activated-value">否</strong>
        </div>
        <div class="automation-item">
          <span>是否已确认成交</span>
          <strong id="marketing-enrolled-value">否</strong>
        </div>
        <div class="automation-item">
          <span>最近确认时间</span>
          <strong id="marketing-last-conversion-value">-</strong>
        </div>
      </div>
      <div id="marketing-profile-status" class="status"></div>
    </section>

    <div id="debug-wrap" class="hidden"></div>
  </div>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script>
    const state = {
      external_userid: '',
      owner_userid: '',
      bind_by_userid: '',
    };

    const loadingCard = document.getElementById('loading-card');
    const unbindCard = document.getElementById('unbind-card');
    const boundCard = document.getElementById('bound-card');
    const bindStatus = document.getElementById('bind-status');
    const boundStatus = document.getElementById('bound-status');
    const bindButton = document.getElementById('bind-button');
    const mobileInput = document.getElementById('mobile-input');
    const rebindButton = document.getElementById('rebind-button');
    const rebindForm = document.getElementById('rebind-form');
    const rebindMobileInput = document.getElementById('rebind-mobile-input');
    const confirmRebindButton = document.getElementById('confirm-rebind-button');
    const customerTitle = document.getElementById('customer-title');
    const leadPoolClassTermCard = document.getElementById('lead-pool-class-term-card');
    const leadPoolClassTermGrid = document.getElementById('lead-pool-class-term-grid');
    const leadPoolClassTermStatus = document.getElementById('lead-pool-class-term-status');
    const marketingProfileCard = document.getElementById('marketing-profile-card');
    const switchFocusButton = document.getElementById('switch-focus-button');
    const switchNormalButton = document.getElementById('switch-normal-button');
    const markEnrolledButton = document.getElementById('mark-enrolled-button');
    const unmarkEnrolledButton = document.getElementById('unmark-enrolled-button');
    const marketingStageBadge = document.getElementById('marketing-stage-badge');
    const marketingSegmentBadge = document.getElementById('marketing-segment-badge');
    const marketingPhaseValue = document.getElementById('marketing-phase-value');
    const marketingSegmentValue = document.getElementById('marketing-segment-value');
    const marketingInitialSegmentValue = document.getElementById('marketing-initial-segment-value');
    const marketingFollowupSourceValue = document.getElementById('marketing-followup-source-value');
    const marketingManualOverrideValue = document.getElementById('marketing-manual-override-value');
    const marketingHitCountValue = document.getElementById('marketing-hit-count-value');
    const marketingActivatedValue = document.getElementById('marketing-activated-value');
    const marketingEnrolledValue = document.getElementById('marketing-enrolled-value');
    const marketingLastConversionValue = document.getElementById('marketing-last-conversion-value');
    const marketingProfileStatus = document.getElementById('marketing-profile-status');
    const debugWrap = document.getElementById('debug-wrap');
    const debugEnabled = new URLSearchParams(window.location.search).get('debug') === '1' || {{ debug_enabled|tojson }};
    state.currentClassTermNo = null;
    state.classTermOptions = [];
    state.marketingStatus = null;
    debugWrap.classList.toggle('hidden', !debugEnabled);

    function writeDebug(label, payload) {
      if (!debugEnabled) return;
      const line = '[' + new Date().toISOString() + '] ' + label + (payload === undefined ? '' : ' ' + (
        typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2)
      ));
      console.log(line);
    }

    function setStatus(el, text, type) {
      el.textContent = text || '';
      el.className = 'status' + (type ? ' ' + type : '');
    }

    function showCard(name) {
      loadingCard.classList.toggle('hidden', name !== 'loading');
      unbindCard.classList.toggle('hidden', name !== 'unbind');
      boundCard.classList.toggle('hidden', name !== 'bound');
    }

    function getQueryValue(key) {
      return new URLSearchParams(window.location.search).get(key) || '';
    }

    function userMessage(error, fallbackText) {
      return fallbackText;
    }

    function updateCustomerTitle(data) {
      const displayName = String((data || {}).display_name || '').trim() || '当前客户';
      customerTitle.textContent = '客户昵称：' + displayName;
    }

    function renderBound(data) {
      updateCustomerTitle(data);
      document.getElementById('bound-mobile').textContent = '已绑定手机号：' + (data.mobile || '-');
      rebindForm.classList.add('hidden');
      rebindMobileInput.value = '';
      setStatus(boundStatus, '', 'success');
      showCard('bound');
    }

    function applyMarketingBadge(el, text, tone) {
      el.textContent = text || '-';
      el.className = 'badge' + (tone ? ' ' + tone : '');
    }

    function syncMarketingButtons(payload) {
      const currentFollowupType = String((payload || {}).current_followup_type || (payload || {}).segment || '').trim() || 'unknown';
      const stageKey = String((payload || {}).stage_key || '').trim();
      const enrolled = stageKey === 'converted/enrolled';
      const switchable = Boolean((payload || {}).can_switch_followup_segment) && !enrolled;
      switchFocusButton.disabled = !switchable || currentFollowupType === 'focus';
      switchNormalButton.disabled = !switchable || currentFollowupType === 'normal';
      markEnrolledButton.disabled = enrolled;
      unmarkEnrolledButton.disabled = !enrolled;
    }

    function manualOverrideSummary(payload) {
      if (!payload || !payload.manual_override_active) {
        return '当前仍按问卷初判执行';
      }
      const targetLabel = String(payload.manual_override_segment_display || '').trim() || '当前跟进';
      const operator = String(payload.manual_override_operator || '').trim();
      const changedAt = String(payload.manual_override_at || '').trim();
      const prefix = [operator, changedAt].filter(Boolean).join(' ');
      if (prefix) {
        return prefix + ' 转为' + targetLabel;
      }
      const sourceLabel = String(payload.manual_override_source_display || '').trim() || '人工改判';
      return sourceLabel + '：转为' + targetLabel;
    }

    function renderMarketingStatus(marketingStatus) {
      const payload = marketingStatus || {};
      state.marketingStatus = payload;
      const stageKey = String(payload.stage_key || '').trim();
      const stageLabel = String(payload.pool_display || payload.stage_display || '').trim() || '待转化';
      const segment = String(payload.current_followup_type || payload.segment || '').trim() || 'unknown';
      const segmentLabel = String(payload.current_followup_type_display || payload.segment_display || '').trim() || '暂未分层';
      const hitCount = Number(payload.hit_count || 0);
      const activated = Boolean(payload.activated || String(payload.last_activation_at || '').trim());
      const enrolled = stageKey === 'converted/enrolled';
      const eligibilityLabel = String(payload.eligibility_display || '').trim() || (payload.eligible_for_conversion ? '会' : '不会');
      const ineligibleReason = String(payload.ineligible_reason_display || '').trim();
      const switchable = Boolean(payload.can_switch_followup_segment) && !enrolled;
      marketingPhaseValue.textContent = stageLabel;
      marketingSegmentValue.textContent = segmentLabel;
      marketingInitialSegmentValue.textContent = String(payload.questionnaire_segment_display || '').trim() || '未完成初判';
      marketingFollowupSourceValue.textContent = String(payload.followup_segment_source_display || '').trim() || '待问卷提交';
      marketingManualOverrideValue.textContent = manualOverrideSummary(payload);
      marketingHitCountValue.textContent = String(hitCount);
      marketingActivatedValue.textContent = activated ? '是' : '否';
      marketingEnrolledValue.textContent = enrolled ? '是' : '否';
      marketingLastConversionValue.textContent = String(payload.last_conversion_marked_at || '').trim() || '-';
      applyMarketingBadge(marketingStageBadge, stageLabel, enrolled ? 'danger' : (activated ? 'ok' : 'warn'));
      applyMarketingBadge(marketingSegmentBadge, segmentLabel, segment === 'focus' ? 'danger' : (segment === 'normal' ? 'ok' : 'warn'));
      syncMarketingButtons(payload);
      setStatus(
        marketingProfileStatus,
        payload.eligible_for_conversion
          ? ('是否进入自动化：' + eligibilityLabel + (switchable ? '' : '；当前池子暂不支持普通/重点人工改判。'))
          : ('是否进入自动化：' + eligibilityLabel + (ineligibleReason ? '；未进入原因：' + ineligibleReason : '。')),
        enrolled ? 'success' : '',
      );
      marketingProfileCard.classList.remove('hidden');
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        writeDebug('fetchJson fail', { url, status: response.status, payload });
        throw new Error(payload.error || ('请求失败(' + response.status + ')'));
      }
      return payload;
    }

    async function loadStatus() {
      const params = new URLSearchParams({
        external_userid: state.external_userid,
      });
      if (state.owner_userid) {
        params.set('owner_userid', state.owner_userid);
      }
      const result = await fetchJson('/api/sidebar/contact-binding-status?' + params.toString());
      if (result.is_bound) {
        renderBound(result);
        return;
      }
      updateCustomerTitle(result);
      setStatus(bindStatus, '', '');
      showCard('unbind');
    }

    async function loadMarketingStatus() {
      const params = new URLSearchParams({
        external_userid: state.external_userid,
      });
      const result = await fetchJson('/api/sidebar/marketing-status?' + params.toString());
      renderMarketingStatus(result.marketing_status || {});
    }

    async function applyMarketingAction(action) {
      const targetUrl = action === 'mark'
        ? '/api/sidebar/marketing-status/mark-enrolled'
        : '/api/sidebar/marketing-status/unmark-enrolled';
      switchFocusButton.disabled = true;
      switchNormalButton.disabled = true;
      markEnrolledButton.disabled = true;
      unmarkEnrolledButton.disabled = true;
      setStatus(marketingProfileStatus, action === 'mark' ? '正在确认已成交…' : '正在撤销成交确认…', '');
      try {
        const result = await fetchJson(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            external_userid: state.external_userid,
            owner_userid: state.owner_userid,
            operator: state.bind_by_userid || state.owner_userid,
          }),
        });
        renderMarketingStatus(result.marketing_status || {});
      } catch (error) {
        setStatus(
          marketingProfileStatus,
          userMessage(error, action === 'mark' ? '确认成交失败，请稍后重试。' : '撤销成交确认失败，请稍后重试。'),
          'error',
        );
        syncMarketingButtons(state.marketingStatus || {});
      }
    }

    async function applyFollowupSwitch(targetSegment) {
      const targetLabel = targetSegment === 'focus' ? '重点跟进' : '普通跟进';
      switchFocusButton.disabled = true;
      switchNormalButton.disabled = true;
      markEnrolledButton.disabled = true;
      unmarkEnrolledButton.disabled = true;
      setStatus(marketingProfileStatus, '正在转为' + targetLabel + '…', '');
      try {
        const result = await fetchJson('/api/sidebar/marketing-status/set-followup-segment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            external_userid: state.external_userid,
            owner_userid: state.owner_userid,
            operator: state.bind_by_userid || state.owner_userid,
            followup_segment: targetSegment,
          }),
        });
        renderMarketingStatus(result.marketing_status || {});
      } catch (error) {
        setStatus(marketingProfileStatus, userMessage(error, '人工改判失败，请稍后重试。'), 'error');
        syncMarketingButtons(state.marketingStatus || {});
      }
    }

    function renderLeadPoolClassTermButtons() {
      leadPoolClassTermGrid.innerHTML = state.classTermOptions.map((item) => {
        const activeClass = Number(item.class_term_no) === Number(state.currentClassTermNo) ? ' active' : '';
        return '<button type="button" class="tag-quick-btn' + activeClass + '" data-class-term-no="' + item.class_term_no + '">' + item.class_term_label + '</button>';
      }).join('');
      Array.from(leadPoolClassTermGrid.querySelectorAll('.tag-quick-btn')).forEach((button) => {
        button.addEventListener('click', () => applyLeadPoolClassTerm(button.getAttribute('data-class-term-no') || ''));
      });
    }

    async function loadLeadPoolClassTermStatus() {
      const params = new URLSearchParams({
        external_userid: state.external_userid,
      });
      if (state.owner_userid) {
        params.set('owner_userid', state.owner_userid);
      }
      const result = await fetchJson('/api/sidebar/lead-pool/status?' + params.toString());
      state.currentClassTermNo = result.current_class_term_no == null ? null : Number(result.current_class_term_no);
      state.classTermOptions = Array.isArray(result.class_term_options) ? result.class_term_options : [];
      renderLeadPoolClassTermButtons();
      leadPoolClassTermCard.classList.remove('hidden');
      setStatus(
        leadPoolClassTermStatus,
        result.current_class_term_label ? ('当前班期：' + result.current_class_term_label) : '当前未设置班期',
        result.current_class_term_label ? 'success' : '',
      );
    }

    async function applyLeadPoolClassTerm(classTermNo) {
      if (!classTermNo) return;
      Array.from(leadPoolClassTermGrid.querySelectorAll('.tag-quick-btn')).forEach((button) => {
        button.disabled = true;
      });
      setStatus(leadPoolClassTermStatus, '正在设置班期...', '');
      try {
        const result = await fetchJson('/api/sidebar/lead-pool/upsert-class-term', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            external_userid: state.external_userid,
            owner_userid: state.owner_userid,
            class_term_no: Number(classTermNo),
          }),
        });
        state.currentClassTermNo = result.current_class_term_no == null ? null : Number(result.current_class_term_no);
        renderLeadPoolClassTermButtons();
        setStatus(leadPoolClassTermStatus, '当前班期：' + (result.current_class_term_label || '-'), 'success');
      } catch (error) {
        setStatus(leadPoolClassTermStatus, userMessage(error, '班期设置失败，请稍后重试。'), 'error');
      } finally {
        Array.from(leadPoolClassTermGrid.querySelectorAll('.tag-quick-btn')).forEach((button) => {
          button.disabled = false;
        });
      }
    }

    async function resolveContextFromQuery() {
      state.external_userid = getQueryValue('external_userid').trim();
      state.owner_userid = getQueryValue('owner_userid').trim();
      state.bind_by_userid = getQueryValue('bind_by_userid').trim() || state.owner_userid;
      writeDebug('query context', state);
      return Boolean(state.external_userid && state.owner_userid);
    }

    async function initWeComSdk() {
      if (!window.wx) {
        writeDebug('wx missing');
        return false;
      }
      const currentUrl = window.location.href.split('#')[0];
      const configPayload = await fetchJson('/api/sidebar/jssdk-config?url=' + encodeURIComponent(currentUrl));
      writeDebug('jssdk config payload', configPayload);
      return await new Promise((resolve) => {
        let resolved = false;
        const finish = (ok) => {
          if (!resolved) {
            resolved = true;
            resolve(ok);
          }
        };
        window.wx.config({
          beta: true,
          debug: false,
          appId: configPayload.corp_id,
          timestamp: Number(configPayload.config.timestamp),
          nonceStr: configPayload.config.nonceStr,
          signature: configPayload.config.signature,
          jsApiList: ['getContext'],
        });
        window.wx.ready(function() {
          writeDebug('wx.config success', { url: configPayload.config.url });
          if (typeof window.wx.agentConfig !== 'function') {
            writeDebug('wx.agentConfig missing');
            finish(false);
            return;
          }
          window.wx.agentConfig({
            corpid: configPayload.corp_id,
            agentid: String(configPayload.agent_id),
            timestamp: Number(configPayload.agent_config.timestamp),
            nonceStr: configPayload.agent_config.nonceStr,
            signature: configPayload.agent_config.signature,
            jsApiList: ['getContext', 'getCurExternalContact'],
            success: function(res) {
              writeDebug('wx.agentConfig success', res || {});
              finish(true);
            },
            fail: function(err) {
              writeDebug('wx.agentConfig fail', err || {});
              finish(false);
            }
          });
        });
        window.wx.error(function(err) {
          writeDebug('wx.config fail', err || {});
          finish(false);
        });
      });
    }

    async function resolveContextFromWeCom() {
      const sdkReady = await initWeComSdk();
      if (!sdkReady || !window.wx || typeof window.wx.invoke !== 'function') {
        return false;
      }
      window.wx.invoke('getContext', {}, function(res) {
        writeDebug('getContext result', res || {});
      });
      return await new Promise((resolve) => {
        window.wx.invoke('getCurExternalContact', {}, function(res) {
          writeDebug('getCurExternalContact result', res || {});
          const externalUserid = String((res || {}).userId || (res || {}).external_userid || '').trim();
          if (!externalUserid) {
            writeDebug('getCurExternalContact fail', res || {});
            resolve(false);
            return;
          }
          state.external_userid = externalUserid;
          if (!state.owner_userid) {
            state.owner_userid = String((res || {}).owner_userid || '').trim();
          }
          if (!state.bind_by_userid) {
            state.bind_by_userid = String((res || {}).operator_userid || state.owner_userid || '').trim();
          }
          writeDebug('getCurExternalContact success', state);
          resolve(Boolean(state.external_userid));
        });
      });
    }

    async function boot() {
      const hasQueryContext = await resolveContextFromQuery();
      const hasWeComContext = hasQueryContext ? true : await resolveContextFromWeCom();
      if (!hasWeComContext) {
        setStatus(loadingCard.querySelector('.status'), '当前未识别到客户信息，请从企微客户侧边栏重新打开。', 'error');
        return;
      }
      try {
        await loadStatus();
        await loadMarketingStatus();
        await loadLeadPoolClassTermStatus();
      } catch (error) {
        setStatus(loadingCard.querySelector('.status'), userMessage(error, '客户状态读取失败，请稍后重试。'), 'error');
      }
    }

    bindButton.addEventListener('click', async () => {
      bindButton.disabled = true;
      setStatus(bindStatus, '正在绑定手机号…', '');
      try {
        const result = await fetchJson('/api/sidebar/bind-mobile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            external_userid: state.external_userid,
            owner_userid: state.owner_userid,
            bind_by_userid: state.bind_by_userid || state.owner_userid,
            mobile: mobileInput.value,
          }),
        });
        renderBound(result.binding || result);
        await loadMarketingStatus();
        await loadLeadPoolClassTermStatus();
      } catch (error) {
        setStatus(bindStatus, userMessage(error, '绑定失败，请检查手机号后重试。'), 'error');
      } finally {
        bindButton.disabled = false;
      }
    });

    rebindButton.addEventListener('click', () => {
      rebindForm.classList.toggle('hidden');
      setStatus(boundStatus, '', 'success');
    });

    confirmRebindButton.addEventListener('click', async () => {
      confirmRebindButton.disabled = true;
      setStatus(boundStatus, '正在更换手机号…', '');
      try {
        const result = await fetchJson('/api/sidebar/bind-mobile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            external_userid: state.external_userid,
            owner_userid: state.owner_userid,
            bind_by_userid: state.bind_by_userid || state.owner_userid,
            mobile: rebindMobileInput.value,
            force_rebind: true,
          }),
        });
        renderBound(result.binding || result);
        await loadMarketingStatus();
        await loadLeadPoolClassTermStatus();
      } catch (error) {
        setStatus(boundStatus, userMessage(error, '更换手机号失败，请检查后重试。'), 'error');
      } finally {
        confirmRebindButton.disabled = false;
      }
    });

    switchFocusButton.addEventListener('click', async () => {
      await applyFollowupSwitch('focus');
    });

    switchNormalButton.addEventListener('click', async () => {
      await applyFollowupSwitch('normal');
    });

    markEnrolledButton.addEventListener('click', async () => {
      await applyMarketingAction('mark');
    });

    unmarkEnrolledButton.addEventListener('click', async () => {
      await applyMarketingAction('unmark');
    });

    boot();
  </script>
</body>
</html>
