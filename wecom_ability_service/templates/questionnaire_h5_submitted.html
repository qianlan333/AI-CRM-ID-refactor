<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>已经提交</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f0;
      --panel: rgba(255,255,255,0.94);
      --line: rgba(41,73,54,0.12);
      --text: #193325;
      --muted: #607266;
      --primary: #2f6a4c;
      --soft: #edf4ef;
      --shadow: 0 24px 60px rgba(25,51,37,0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      font-family: "PingFang SC", "Helvetica Neue", -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(76, 132, 98, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(47, 106, 76, 0.12), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .card {
      width: min(100%, 460px);
      padding: 40px 28px;
      text-align: center;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    h1 {
      margin: 18px 0 0;
      font-size: clamp(32px, 8vw, 40px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">问卷提交状态</div>
    <h1>已经提交</h1>
    <p>感谢填写</p>
  </main>
</body>
</html>
