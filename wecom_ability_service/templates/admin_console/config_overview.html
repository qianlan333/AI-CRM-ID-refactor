{% extends "admin_console/config_base.html" %}

{% block config_content %}
<section class="admin-card">
  <div class="admin-card-head">
    <div>
      <h2>配置模块</h2>
      <p>配置中心统一承接可视化配置，运行时来源优先走表和 app_settings，不再继续把 constants 当唯一真相。</p>
    </div>
  </div>
  <div class="admin-quick-links">
    {% for item in overview_cards %}
    <a class="admin-quick-link" href="{{ item.href }}">
      <strong>{{ item.label }}</strong>
      <span>{{ item.description }}</span>
      <span class="admin-quick-link-value">{{ item.value }}</span>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
