{% extends "admin_console/base.html" %}

{% block content %}
<section class="admin-card admin-module-banner">
  <nav class="admin-subnav" aria-label="Config Navigation">
    {% for item in config_tabs %}
    <a class="admin-subnav-link{% if item.active %} is-active{% endif %}" href="{{ item.href }}">{{ item.label }}</a>
    {% endfor %}
  </nav>
</section>

{% block config_content %}{% endblock %}
{% endblock %}
