name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI Fast"]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd '/home/ubuntu/极简 crm'
            if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              git stash push --include-untracked -m "deploy-backup-$(date -u +%Y%m%dT%H%M%SZ)"
            fi
            before_sha="$(git rev-parse HEAD)"
            git fetch origin main:refs/remotes/origin/main
            git reset --hard refs/remotes/origin/main
            after_sha="$(git rev-parse HEAD)"
            printf '%s\n' "$after_sha" > .release-sha
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            test -n "${DATABASE_URL:-}"
            source /home/ubuntu/venvs/openclaw/bin/activate
            if [ "$before_sha" = "$after_sha" ] || git diff --quiet "$before_sha" "$after_sha" -- requirements.txt; then
              echo "requirements.txt unchanged; skipping pip install"
            else
              pip install -r requirements.txt
            fi
            python3 scripts/ops/ensure_ai_audience_external_api_env.py /home/ubuntu/.openclaw-wecom-pg.env
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            # 1) AI-CRM Next schema migrations
            sudo systemctl stop openclaw-broadcast-queue-worker.timer || true
            sudo systemctl stop openclaw-broadcast-queue-worker.service || true
            sudo systemctl stop aicrm-wechat-shop-order-sync.timer || true
            sudo systemctl stop aicrm-wechat-shop-order-sync.service || true
            sudo systemctl stop openclaw-internal-event-worker.timer || true
            sudo systemctl stop openclaw-internal-event-worker.service || true
            sudo systemctl stop openclaw-external-effect-worker.timer || true
            sudo systemctl stop openclaw-external-effect-worker.service || true
            sudo systemctl stop openclaw-wechat-pay-order-reconciliation-worker.timer || true
            sudo systemctl stop openclaw-wechat-pay-order-reconciliation-worker.service || true
            sudo systemctl stop openclaw-identity-resolution-worker.timer || true
            sudo systemctl stop openclaw-identity-resolution-worker.service || true
            sudo systemctl stop openclaw-wecom-callback-inbox-worker.timer || true
            sudo systemctl stop openclaw-wecom-callback-inbox-worker.service || true
            sudo systemctl stop openclaw-ai-audience-scheduler.timer || true
            sudo systemctl stop openclaw-ai-audience-scheduler.service || true
            python3 -m alembic upgrade head
            # Production currently uses the openclaw-* compatible 5001 web unit.
            # Stop the canonical alias if it exists so both units cannot bind 5001.
            sudo systemctl stop aicrm-web.service || true
            sudo systemctl stop openclaw-wecom-postgres.service || true
            if sudo fuser -s 5001/tcp; then
              echo "5001 is still occupied before web restart; terminating stale listener"
              sudo ss -ltnp 'sport = :5001' || true
              sudo fuser -k -TERM 5001/tcp || true
              sleep 2
            fi
            if sudo fuser -s 5001/tcp; then
              echo "5001 listener survived TERM; force killing stale listener"
              sudo ss -ltnp 'sport = :5001' || true
              sudo fuser -k -KILL 5001/tcp || true
            fi
            for _ in $(seq 1 10); do
              if ! sudo fuser -s 5001/tcp; then
                break
              fi
              echo "waiting for stale 5001 listener to exit"
              sleep 1
            done
            if sudo fuser -s 5001/tcp; then
              echo "5001 is still occupied after stale listener cleanup"
              sudo ss -ltnp 'sport = :5001' || true
              exit 1
            fi
            sudo systemctl reset-failed openclaw-wecom-postgres.service || true
            if ! sudo systemctl start openclaw-wecom-postgres.service; then
              sudo systemctl status openclaw-wecom-postgres.service --no-pager || true
              sudo journalctl -u openclaw-wecom-postgres.service -n 80 --no-pager || true
              sudo ss -ltnp 'sport = :5001' || true
              exit 1
            fi
            release_ready=0
            for _ in $(seq 1 60); do
              if curl -sSf -D /tmp/aicrm_health_headers.txt http://127.0.0.1:5001/health -o /tmp/aicrm_health.json \
                && grep -i "x-aicrm-release-sha: $after_sha" /tmp/aicrm_health_headers.txt; then
                release_ready=1
                break
              fi
              actual_release_sha="$(awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' /tmp/aicrm_health_headers.txt 2>/dev/null | tr -d '\r' | tail -n 1 || true)"
              echo "waiting for 5001 release sha: expected=$after_sha actual=${actual_release_sha:-missing}"
              sleep 1
            done
            if [ "$release_ready" != "1" ]; then
              sudo systemctl status openclaw-wecom-postgres.service --no-pager || true
              sudo journalctl -u openclaw-wecom-postgres.service -n 80 --no-pager || true
              exit 1
            fi
            cat /tmp/aicrm_health.json
            sudo cp deploy/openclaw-external-push-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-external-push-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-broadcast-queue-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-broadcast-queue-worker.timer /etc/systemd/system/
            sudo cp deploy/aicrm-wechat-shop-order-sync.service /etc/systemd/system/
            sudo cp deploy/aicrm-wechat-shop-order-sync.timer /etc/systemd/system/
            sudo cp deploy/openclaw-internal-event-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-internal-event-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-external-effect-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-external-effect-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-wechat-pay-order-reconciliation-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-wechat-pay-order-reconciliation-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-identity-resolution-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-identity-resolution-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-wecom-callback-ingress.service /etc/systemd/system/
            sudo cp deploy/openclaw-wecom-callback-inbox-worker.service /etc/systemd/system/
            sudo cp deploy/openclaw-wecom-callback-inbox-worker.timer /etc/systemd/system/
            sudo cp deploy/openclaw-ai-audience-scheduler.service /etc/systemd/system/
            sudo cp deploy/openclaw-ai-audience-scheduler.timer /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable openclaw-wecom-callback-ingress.service
            sudo systemctl restart openclaw-wecom-callback-ingress.service
            for _ in $(seq 1 20); do
              if curl -sSf http://127.0.0.1:5002/health; then
                break
              fi
              sleep 0.5
            done
            curl -sSf http://127.0.0.1:5002/health
            sudo systemctl enable openclaw-wecom-callback-inbox-worker.timer
            sudo systemctl restart openclaw-wecom-callback-inbox-worker.timer
            sudo systemctl status openclaw-wecom-callback-ingress.service --no-pager
            sudo systemctl status openclaw-wecom-callback-inbox-worker.timer --no-pager
            python scripts/ops/check_wecom_callback_deploy_smoke.py | tee /tmp/wecom-callback-deploy-smoke.json
            sudo systemctl enable openclaw-external-push-worker.timer
            sudo systemctl restart openclaw-external-push-worker.timer
            sudo systemctl start openclaw-external-push-worker.service
            sudo systemctl status openclaw-external-push-worker.timer --no-pager
            sudo systemctl enable aicrm-wechat-shop-order-sync.timer
            sudo systemctl restart aicrm-wechat-shop-order-sync.timer
            if ! sudo systemctl start aicrm-wechat-shop-order-sync.service; then
              sudo systemctl status aicrm-wechat-shop-order-sync.service --no-pager || true
              sudo journalctl -u aicrm-wechat-shop-order-sync.service -n 80 --no-pager || true
            fi
            sudo systemctl status aicrm-wechat-shop-order-sync.timer --no-pager
            sudo systemctl enable openclaw-ai-audience-scheduler.timer
            sudo systemctl restart openclaw-ai-audience-scheduler.timer
            if ! sudo systemctl start openclaw-ai-audience-scheduler.service; then
              sudo systemctl status openclaw-ai-audience-scheduler.service --no-pager || true
              sudo journalctl -u openclaw-ai-audience-scheduler.service -n 80 --no-pager || true
            fi
            sudo systemctl status openclaw-ai-audience-scheduler.timer --no-pager
            sudo systemctl enable openclaw-broadcast-queue-worker.timer
            sudo systemctl restart openclaw-broadcast-queue-worker.timer
            if ! sudo systemctl start openclaw-broadcast-queue-worker.service; then
              sudo systemctl status openclaw-broadcast-queue-worker.service --no-pager || true
              sudo journalctl -u openclaw-broadcast-queue-worker.service -n 80 --no-pager || true
            fi
            sudo systemctl status openclaw-broadcast-queue-worker.timer --no-pager
            sudo systemctl enable openclaw-internal-event-worker.timer
            sudo systemctl restart openclaw-internal-event-worker.timer
            if ! sudo systemctl start openclaw-internal-event-worker.service; then
              sudo systemctl status openclaw-internal-event-worker.service --no-pager || true
              sudo journalctl -u openclaw-internal-event-worker.service -n 80 --no-pager || true
            fi
            sudo systemctl status openclaw-internal-event-worker.timer --no-pager
            sudo systemctl enable openclaw-external-effect-worker.timer
            sudo systemctl restart openclaw-external-effect-worker.timer
            sudo systemctl status openclaw-external-effect-worker.timer --no-pager
            sudo systemctl enable openclaw-wechat-pay-order-reconciliation-worker.timer
            sudo systemctl restart openclaw-wechat-pay-order-reconciliation-worker.timer
            sudo systemctl status openclaw-wechat-pay-order-reconciliation-worker.timer --no-pager
            sudo systemctl enable openclaw-identity-resolution-worker.timer
            sudo systemctl restart openclaw-identity-resolution-worker.timer
            sudo systemctl status openclaw-identity-resolution-worker.timer --no-pager
