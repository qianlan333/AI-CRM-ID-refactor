name: Deploy ID Validation

on:
  workflow_run:
    workflows: ["CI Fast"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: aicrm-id-validation-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.repository == 'qianlan333/AI-CRM-ID-refactor' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == 'qianlan333/AI-CRM-ID-refactor' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: id-validation
    runs-on: ubuntu-latest
    env:
      EXPECTED_REPOSITORY: qianlan333/AI-CRM-ID-refactor
      EXPECTED_DEPLOY_HOST: 49.232.57.128
      EXPECTED_SSH_HOST_FINGERPRINT: SHA256:NXSJUveGoNy1lDsa+eOKho1h0ythB+pKTyijv8/KfU0
      DEPLOY_TARGET: id-validation
      RUNTIME_TARGET_ENVIRONMENT: production
      PUBLIC_BASE_URL: https://id-dev.youcangogogo.com
      PUBLIC_HEALTH_URL: https://id-dev.youcangogogo.com/health
      ALLOW_MISSING_WECHAT_SHOP_CALLBACK_TOKEN: "0"
    steps:
      - name: Assert immutable ID validation target
        env:
          DEPLOY_HOST: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
        run: |
          set -e
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$DEPLOY_HOST" = "$EXPECTED_DEPLOY_HOST"
          test "$DEPLOY_TARGET" = "id-validation"
          test "$RUNTIME_TARGET_ENVIRONMENT" = "production"
          test "$PUBLIC_BASE_URL" = "https://id-dev.youcangogogo.com"
          test "$PUBLIC_HEALTH_URL" = "https://id-dev.youcangogogo.com/health"

      - name: Checkout verified release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Build verified release bundle
        id: release
        run: |
          set -e
          set -o pipefail
          verified_sha="${{ github.event.workflow_run.head_sha }}"
          if ! printf '%s' "$verified_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "invalid verified workflow sha"
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$verified_sha" ]; then
            echo "runner checkout does not match verified workflow sha"
            exit 1
          fi
          git fetch --no-tags origin main
          if [ "$(git rev-parse FETCH_HEAD)" != "$verified_sha" ]; then
            echo "verified workflow sha is no longer the repository main head"
            exit 1
          fi
          public_base_url="${PUBLIC_BASE_URL%/}"
          public_health_url="$PUBLIC_HEALTH_URL"
          if ! printf '%s' "$public_base_url" | grep -Eq '^https://[^/]+$'; then
            echo "PUBLIC_BASE_URL must be an https origin"
            exit 1
          fi
          if ! printf '%s' "$public_health_url" | grep -Eq '^https://[^/]+/health$'; then
            echo "PUBLIC_HEALTH_URL must be an https /health URL"
            exit 1
          fi
          curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -sSf \
            -D /tmp/aicrm_current_release_headers.txt \
            "$public_health_url" \
            -o /tmp/aicrm_current_release.json
          base_sha="$(awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' \
            /tmp/aicrm_current_release_headers.txt | tr -d '\r' | tail -n 1)"
          if ! printf '%s' "$base_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "target environment does not expose a full current release sha"
            exit 1
          fi
          if [ "$base_sha" = "$verified_sha" ]; then
            echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
            echo "noop=true" >> "$GITHUB_OUTPUT"
            echo "target environment already runs the requested release; successful no-op"
            exit 0
          fi
          # ID validation runs against production data. An orphaned base must be
          # audited explicitly; unlike the disposable test target it may not use
          # a full-bundle recovery that bypasses repository ancestry.
          if ! git cat-file -e "$base_sha^{commit}"; then
            echo "target environment release is not present in repository history"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$base_sha" "$verified_sha"; then
            echo "target environment release is not an ancestor of the requested release"
            exit 1
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "noop=false" >> "$GITHUB_OUTPUT"
          mkdir -p release
          git update-ref refs/deploy/release "$verified_sha"
          git update-ref refs/deploy/base "$base_sha"
          trap 'git update-ref -d refs/deploy/release; git update-ref -d refs/deploy/base' EXIT
          git bundle create release/aicrm-release.bundle refs/deploy/release ^refs/deploy/base
          git bundle verify release/aicrm-release.bundle
          if ! git bundle list-heads release/aicrm-release.bundle \
            | grep -Fx "$verified_sha refs/deploy/release" >/dev/null; then
            echo "release bundle does not advertise the verified workflow sha"
            exit 1
          fi
          (
            cd release
            sha256sum aicrm-release.bundle > aicrm-release.bundle.sha256
          )
          bundle_sha256="$(awk '{print $1}' release/aicrm-release.bundle.sha256)"
          if ! printf '%s' "$bundle_sha256" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "release bundle checksum is invalid"
            exit 1
          fi
          echo "bundle_sha256=$bundle_sha256" >> "$GITHUB_OUTPUT"

      - name: Verify already active ID release
        if: steps.release.outputs.noop == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          script: |
            set -e
            set -o pipefail
            deploy_lock_file="/tmp/aicrm-deploy-${{ env.DEPLOY_TARGET }}.lock"
            exec 9>"$deploy_lock_file"
            if ! flock -n 9; then
              echo "another id-validation deployment holds $deploy_lock_file"
              exit 1
            fi
            cd '/home/ubuntu/极简 crm'
            expected_repository="${{ env.EXPECTED_REPOSITORY }}"
            verified_sha="${{ github.event.workflow_run.head_sha }}"
            remote_origin_url="$(git remote get-url origin)"
            case "$remote_origin_url" in
              "https://github.com/${expected_repository}"|\
              "https://github.com/${expected_repository}.git"|\
              "git@github.com:${expected_repository}"|\
              "git@github.com:${expected_repository}.git")
                ;;
              *)
                echo "target checkout origin is not the ID validation repository"
                exit 1
                ;;
            esac
            test "$(git rev-parse HEAD)" = "$verified_sha"
            test "$(tr -d '\r\n' < .release-sha)" = "$verified_sha"
            if [ -n "$(git status --porcelain=v1 --untracked-files=all)" ]; then
              echo "same-SHA verification refuses a dirty server checkout"
              git status --short --untracked-files=all
              exit 1
            fi
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            test -n "${DATABASE_URL:-}"
            source /home/ubuntu/venvs/openclaw/bin/activate
            python3 scripts/ops/manage_production_runtime_units.py --phase verify --execute
            python3 scripts/ops/check_id_validation_release_readiness.py \
              --public-health-url "${{ env.PUBLIC_HEALTH_URL }}" \
              --expected-sha "$verified_sha" \
              > /tmp/aicrm-id-validation-release-readiness.json
            cat /tmp/aicrm-id-validation-release-readiness.json
            python3 scripts/ops/recover_id_validation_provenance.py \
              --canonical /home/ubuntu/.aicrm-releases/id-validation.json \
              --pending /home/ubuntu/.aicrm-releases/id-validation.pending.json \
              --prepared /home/ubuntu/.aicrm-releases/id-validation.prepared.json \
              --expected-repository "$expected_repository" \
              --expected-release-sha "$verified_sha" \
              --expected-source-ci-run-id "${{ github.event.workflow_run.id }}" \
              --expected-deploy-run-id "${{ github.run_id }}" \
              --current-deploy-run-attempt "${{ github.run_attempt }}" \
              --repository-path '/home/ubuntu/极简 crm' \
              --expected-public-health-url "${{ env.PUBLIC_HEALTH_URL }}" \
              --promote-pending \
              --allow-prepared-recovery \
              --require-canonical-base-chain \
              > /tmp/aicrm-id-validation-provenance-recovery.json
            cat /tmp/aicrm-id-validation-provenance-recovery.json
            install -d -m 0750 /home/ubuntu/.aicrm-releases
            verification_tmp="$(mktemp /home/ubuntu/.aicrm-releases/id-validation-last-verified.XXXXXX)"
            trap 'rm -f -- "$verification_tmp"' EXIT
            RELEASE_REPOSITORY="${{ github.repository }}" \
            RELEASE_SHA="$verified_sha" \
            SOURCE_CI_RUN_ID="${{ github.event.workflow_run.id }}" \
            DEPLOY_RUN_ID="${{ github.run_id }}" \
            DEPLOY_RUN_ATTEMPT="${{ github.run_attempt }}" \
            VERIFIED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              python3 -c 'import json, os, sys; json.dump({"repository": os.environ["RELEASE_REPOSITORY"], "release_sha": os.environ["RELEASE_SHA"], "source_ci_run_id": os.environ["SOURCE_CI_RUN_ID"], "deploy_run_id": os.environ["DEPLOY_RUN_ID"], "deploy_run_attempt": os.environ["DEPLOY_RUN_ATTEMPT"], "environment": "id-validation", "verification_kind": "same_sha_noop", "verified_at": os.environ["VERIFIED_AT"]}, sys.stdout, sort_keys=True); sys.stdout.write("\n")' \
              > "$verification_tmp"
            python3 -m json.tool "$verification_tmp" >/dev/null
            chmod 0640 "$verification_tmp"
            mv -f "$verification_tmp" \
              /home/ubuntu/.aicrm-releases/id-validation-last-verified.json
            trap - EXIT

      - name: Record successful no-op provenance
        if: steps.release.outputs.noop == 'true'
        run: |
          {
            echo "## ID validation deployment"
            echo ""
            echo "- Result: successful no-op (release already active)"
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Release SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "- Source CI run: ${{ github.event.workflow_run.id }}"
            echo "- Deploy run: $GITHUB_RUN_ID/$GITHUB_RUN_ATTEMPT"
            echo "- Environment: id-validation"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Transfer verified release bundle
        if: steps.release.outputs.noop != 'true'
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          source: "release/aicrm-release.bundle,release/aicrm-release.bundle.sha256"
          target: /tmp/aicrm-release-${{ github.event.workflow_run.head_sha }}
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        if: steps.release.outputs.noop != 'true'
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
          SOURCE_CI_RUN_ID: ${{ github.event.workflow_run.id }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
          BASE_SHA: ${{ steps.release.outputs.base_sha }}
          BUNDLE_SHA256: ${{ steps.release.outputs.bundle_sha256 }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          # stop-for-migration may legitimately drain a running timer service
          # for up to 600s before migrations and health verification begin.
          command_timeout: 30m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,RUNTIME_TARGET_ENVIRONMENT,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,ALLOW_MISSING_WECHAT_SHOP_CALLBACK_TOKEN,RELEASE_REPOSITORY,RELEASE_RUN_ID,RELEASE_RUN_ATTEMPT,SOURCE_CI_RUN_ID,VERIFIED_SHA,BASE_SHA,BUNDLE_SHA256
          script_path: scripts/ops/deploy_id_validation_remote.sh
