name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly full regression at 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run architecture gates
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: bash scripts/ci/run_architecture_gates.sh

      - name: Run PostgreSQL P0 regression slice
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          python -m pytest \
            tests/test_order_reconciliation_worker.py \
            tests/test_identity_resolution_backfill_worker.py \
            tests/test_channels_api_production_guard.py \
            tests/test_admin_routes_require_auth.py::test_admin_api_routes_require_session_when_enforced \
            tests/test_admin_routes_require_auth.py::test_admin_pages_redirect_to_login_when_enforced \
            tests/test_admin_routes_require_auth.py::test_public_routes_remain_public_when_admin_auth_is_enforced \
            tests/test_admin_routes_require_auth.py::test_admin_route_auth_checker_passes \
            -q --tb=short
        timeout-minutes: 15

      - name: Run full pytest regression
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AICRM_PYTEST_FIXTURE_DEFAULT: "1"
        run: python -m pytest tests/ -n auto --dist=loadfile -v --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 45

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:frontend

      - name: Verify frontend build is reproducible
        run: git diff --exit-code

      - name: Run frontend tests
        run: npm run test:frontend
