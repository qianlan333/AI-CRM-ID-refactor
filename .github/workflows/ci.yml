name: CI

on:
  push:
  pull_request:

jobs:
  full-test:
    # 跑全量 pytest 在真 PG 上。2026-05 砍 SQLite 后所有测试统一用 PG。
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests (PG-only)
        run: python -m pytest tests/ -v --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 45
