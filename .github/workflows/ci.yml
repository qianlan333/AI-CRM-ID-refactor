name: CI

on:
  push:
  pull_request:

jobs:
  customer-pulse-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Customer Pulse quality gates
        run: python scripts/run_customer_pulse_quality_gates.py

  pg-smoke:
    # 跑核心调度 + token + 频次预算 + 素材库 在真 PG 上的回归测试。
    # 现存 6 个 PG 兼容 bug 都是 SQLite-only 写法引入的（boolean = 1、substr(TIMESTAMPTZ)、
    # WHERE ts <> ''），任何 PR 引入同款写法这个 job 会立刻挂掉。
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PG smoke tests
        run: python -m pytest tests/integration/ -v --tb=short
