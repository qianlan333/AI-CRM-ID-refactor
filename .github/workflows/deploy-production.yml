name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_sha }}
      SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      SSH_USER: ${{ secrets.PROD_SSH_USER }}
      SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      APP_DIR: ${{ vars.PROD_APP_DIR || '/home/ubuntu/极简 crm' }}
      VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/ubuntu/venvs/openclaw' }}
      SERVICE_NAME: ${{ vars.PROD_SYSTEMD_SERVICE || 'openclaw-wecom-postgres.service' }}
      ENV_FILE: ${{ vars.PROD_ENV_FILE || '/home/ubuntu/.openclaw-wecom-pg.env' }}
      HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL || 'http://127.0.0.1:5001/health' }}
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$SSH_HOST" ]; then
            echo "::error::Missing required secret: PROD_SSH_HOST"
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "::error::Missing required secret: PROD_SSH_USER"
            exit 1
          fi
          if [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing required secret: PROD_SSH_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" ]; then
            echo "::error::Missing required secret: PROD_SSH_KNOWN_HOSTS"
            exit 1
          fi

      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Capture deploy revision
        shell: bash
        run: |
          set -euo pipefail
          echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
          EOF
          chmod 644 ~/.ssh/known_hosts

      - name: Sync repository to production
        shell: bash
        run: |
          set -euo pipefail
          remote_app_dir="$(printf '%q' "$APP_DIR")"
          rsync -az --delete \
            --exclude-from=deploy/rsync-excludes.txt \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            --rsync-path="mkdir -p $remote_app_dir && rsync" \
            ./ "${SSH_USER}@${SSH_HOST}:${remote_app_dir}/"

      - name: Run remote deploy
        shell: bash
        run: |
          set -euo pipefail
          quote() { printf '%q' "$1"; }
          remote_cmd="APP_DIR=$(quote "$APP_DIR") \
            VENV_DIR=$(quote "$VENV_DIR") \
            SERVICE_NAME=$(quote "$SERVICE_NAME") \
            ENV_FILE=$(quote "$ENV_FILE") \
            HEALTHCHECK_URL=$(quote "$HEALTHCHECK_URL") \
            DEPLOY_SHA=$(quote "$DEPLOY_SHA") \
            bash $(quote "$APP_DIR/deploy/deploy_production.sh")"
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" "$remote_cmd"
