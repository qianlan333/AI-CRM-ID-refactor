name: ID Validation Queue Operations

on:
  workflow_dispatch:
    inputs:
      operation:
        description: One guarded queue-runtime operation on 49 only
        required: true
        type: choice
        options:
          - diagnose_customer_refresh
          - diagnose_callback_canary
          - diagnose_soak_failure
          - activate_test_loopback
          - verify_owner_state
          - run_test_loopback
          - configure_allowlisted
          - import_canary_media
          - import_canary_channel
          - ingest_canary_callback
          - arm_canary_callback
          - transition_allowlisted
          - run_wecom_canary
          - authorize_execution
          - attest_execution
          - fault_listener
          - fault_worker
          - fault_database
          - rollback_test_loopback
          - soak_start
          - soak_status
          - soak_complete
          - soak_invalidate
      expected_release_sha:
        description: Exact deployed ID-refactor full SHA
        required: true
        type: string
      expected_generation:
        description: Source generation; used only for initial activation
        required: true
        default: "0"
        type: string
      generation:
        description: Active or target runtime generation
        required: true
        default: "1"
        type: string
      policy_version:
        description: Exact currently active policy version
        required: true
        default: queue-v2-test-loopback
        type: string
      target_policy_version:
        description: Optional immutable target policy for scope transition
        required: false
        default: ""
        type: string
      run_id:
        description: Optional safe canary run identifier
        required: false
        default: ""
        type: string
      execution_id:
        description: Required only when attesting an existing execution
        required: false
        default: ""
        type: string
      job_id:
        description: Optional exact job id for a multi-job execution
        required: false
        default: "0"
        type: string
      expected_version:
        description: Required row_version for authorize_execution CAS
        required: false
        default: "0"
        type: string
      evidence_type:
        description: Required only for attestation
        required: false
        default: ""
        type: string
      canary_scenarios:
        description: Comma-separated guarded direct canary scenarios
        required: false
        default: private,group,contact_detail,media,profile
        type: string
      upstream_welcome_delivery_attested:
        description: Operator confirmed production delivered the mirrored one-time welcome
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: aicrm-id-validation-deploy
  cancel-in-progress: false

jobs:
  diagnose_customer_refresh:
    if: >-
      github.repository == 'qianlan333/AI-CRM-ID-refactor' &&
      inputs.operation == 'diagnose_customer_refresh'
    environment: id-validation
    runs-on: ubuntu-latest
    env:
      EXPECTED_REPOSITORY: qianlan333/AI-CRM-ID-refactor
      EXPECTED_DEPLOY_HOST: 49.232.57.128
      EXPECTED_SSH_HOST_FINGERPRINT: SHA256:NXSJUveGoNy1lDsa+eOKho1h0ythB+pKTyijv8/KfU0
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_release_sha }}
      PUBLIC_HEALTH_URL: https://id-dev.youcangogogo.com/health
    steps:
      - name: Read failed customer refresh evidence from 49
        env:
          DEPLOY_HOST: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 5m
          envs: EXPECTED_REPOSITORY,EXPECTED_DEPLOY_HOST,EXPECTED_RELEASE_SHA,PUBLIC_HEALTH_URL,DEPLOY_HOST
          script: |
            set -e
            set -o pipefail
            test "$DEPLOY_HOST" = "$EXPECTED_DEPLOY_HOST"
            test "$EXPECTED_REPOSITORY" = "qianlan333/AI-CRM-ID-refactor"
            printf '%s' "$EXPECTED_RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'
            cd '/home/ubuntu/极简 crm'
            test "$(git rev-parse HEAD)" = "$EXPECTED_RELEASE_SHA"
            test "$(tr -d '\r\n' < .release-sha)" = "$EXPECTED_RELEASE_SHA"
            test -z "$(git status --porcelain=v1 --untracked-files=all)"
            actual_public_sha="$(
              curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -fsS \
                -D - -o /dev/null "$PUBLIC_HEALTH_URL" |
                awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' |
                tr -d '\r'
            )"
            test "$actual_public_sha" = "$EXPECTED_RELEASE_SHA"
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            source /home/ubuntu/venvs/openclaw/bin/activate
            python3 - <<'PY'
            import hashlib
            import json
            import re

            from sqlalchemy import text

            from aicrm_next.shared.db_session import get_session_factory
            from aicrm_next.shared.sensitive_data import redact_sensitive_text


            def safe_error(value):
                raw = str(value or "")
                first_line = redact_sensitive_text(raw).splitlines()[0] if raw else ""
                first_line = re.sub(r"'[^']{4,}'", "'[redacted-value]'", first_line)
                return {
                    "summary": first_line[:500],
                    "sha256": hashlib.sha256(raw.encode("utf-8")).hexdigest() if raw else "",
                }


            def safe_rows(rows):
                payload = []
                for raw in rows:
                    row = dict(raw)
                    for key in ("last_error_message", "error_message"):
                        if key in row:
                            row[key] = safe_error(row.get(key))
                    payload.append(row)
                return payload


            with get_session_factory()() as session:
                session.execute(text("SET TRANSACTION READ ONLY"))
                intent = session.execute(
                    text(
                        """
                        SELECT singleton_id, dirty_generation, completed_generation,
                               signal_generation, running_generation, status,
                               attempt_count, max_attempts, last_error_code,
                               last_error_message, owner_consumer_run_id,
                               row_version, available_at, updated_at
                        FROM customer_read_model_refresh_intent
                        WHERE singleton_id = 1
                        """
                    )
                ).mappings().all()
                runs = session.execute(
                    text(
                        """
                        WITH refresh_events AS (
                            SELECT id, event_id, idempotency_key
                            FROM internal_event
                            WHERE event_type = 'customer_read_model.refresh.requested'
                            ORDER BY id DESC
                            LIMIT 10
                        )
                        SELECT event.idempotency_key, run.id, run.consumer_name,
                               run.status, run.attempt_count, run.max_attempts,
                               run.last_error_code, run.last_error_message,
                               run.policy_version, run.worker_generation,
                               run.hold_reason, run.available_at,
                               run.next_retry_at, run.updated_at
                        FROM refresh_events event
                        JOIN internal_event_consumer_run run
                          ON run.event_id = event.event_id
                        ORDER BY event.id DESC, run.id
                        """
                    )
                ).mappings().all()
                attempts = session.execute(
                    text(
                        """
                        WITH refresh_events AS (
                            SELECT id, event_id, idempotency_key
                            FROM internal_event
                            WHERE event_type = 'customer_read_model.refresh.requested'
                            ORDER BY id DESC
                            LIMIT 10
                        )
                        SELECT attempt.consumer_run_id, attempt.attempt_id,
                               attempt.status, attempt.error_code,
                               attempt.error_message, attempt.started_at,
                               attempt.completed_at
                        FROM internal_event_consumer_attempt attempt
                        JOIN internal_event_consumer_run run
                          ON run.id = attempt.consumer_run_id
                        JOIN refresh_events event
                          ON event.event_id = run.event_id
                        ORDER BY event.id DESC, attempt.id
                        """
                    )
                ).mappings().all()
                outbox = session.execute(
                    text(
                        """
                        SELECT id, status, attempt_count, max_attempts,
                               last_error_code, last_error_message,
                               policy_version, worker_generation, hold_reason,
                               available_at, next_retry_at, updated_at
                        FROM internal_event_outbox
                        WHERE event_type = 'customer_read_model.refresh.requested'
                        ORDER BY id DESC
                        LIMIT 10
                        """
                    )
                ).mappings().all()
            print(json.dumps({
                "intent": safe_rows(intent),
                "consumer_runs": safe_rows(runs),
                "consumer_attempts": safe_rows(attempts),
                "outbox": safe_rows(outbox),
            }, ensure_ascii=False, default=str, sort_keys=True))
            PY
  diagnose_callback_canary:
    if: >-
      github.repository == 'qianlan333/AI-CRM-ID-refactor' &&
      inputs.operation == 'diagnose_callback_canary'
    environment: id-validation
    runs-on: ubuntu-latest
    env:
      EXPECTED_REPOSITORY: qianlan333/AI-CRM-ID-refactor
      EXPECTED_DEPLOY_HOST: 49.232.57.128
      EXPECTED_SSH_HOST_FINGERPRINT: SHA256:NXSJUveGoNy1lDsa+eOKho1h0ythB+pKTyijv8/KfU0
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_release_sha }}
      EXPECTED_POLICY_VERSION: ${{ inputs.policy_version }}
      PUBLIC_HEALTH_URL: https://id-dev.youcangogogo.com/health
    steps:
      - name: Read redacted callback canary evidence from 49
        env:
          DEPLOY_HOST: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 5m
          envs: EXPECTED_REPOSITORY,EXPECTED_DEPLOY_HOST,EXPECTED_RELEASE_SHA,EXPECTED_POLICY_VERSION,PUBLIC_HEALTH_URL,DEPLOY_HOST
          script: |
            set -e
            set -o pipefail
            test "$DEPLOY_HOST" = "$EXPECTED_DEPLOY_HOST"
            test "$EXPECTED_REPOSITORY" = "qianlan333/AI-CRM-ID-refactor"
            printf '%s' "$EXPECTED_RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'
            printf '%s' "$EXPECTED_POLICY_VERSION" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$'
            cd '/home/ubuntu/极简 crm'
            test "$(git rev-parse HEAD)" = "$EXPECTED_RELEASE_SHA"
            test "$(tr -d '\r\n' < .release-sha)" = "$EXPECTED_RELEASE_SHA"
            test -z "$(git status --porcelain=v1 --untracked-files=all)"
            actual_public_sha="$(
              curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -fsS \
                -D - -o /dev/null "$PUBLIC_HEALTH_URL" |
                awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' |
                tr -d '\r'
            )"
            test "$actual_public_sha" = "$EXPECTED_RELEASE_SHA"
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            source /home/ubuntu/venvs/openclaw/bin/activate
            python3 - <<'PY'
            import json
            import os

            from sqlalchemy import bindparam, text

            from aicrm_next.shared.db_session import get_session_factory


            policy_version = os.environ["EXPECTED_POLICY_VERSION"]
            with get_session_factory()() as session:
                session.execute(text("SET TRANSACTION READ ONLY"))
                control = session.execute(
                    text(
                        """
                        SELECT active_generation, claim_enabled, rollout_mode,
                               policy_version, external_claim_scope, updated_at
                        FROM queue_runtime_control
                        WHERE singleton = TRUE
                        """
                    )
                ).mappings().one()
                inbox_rows = session.execute(
                    text(
                        """
                        SELECT id, status, duplicate_count, attempt_count,
                               worker_generation, policy_version, execution_id,
                               last_error_code, received_at, started_at, finished_at,
                               processing_summary_json->'external_effect_job_ids' AS job_ids
                        FROM webhook_inbox
                        WHERE provider = 'wecom'
                          AND policy_version = :policy_version
                          AND received_at >= CURRENT_TIMESTAMP - INTERVAL '7 days'
                          AND jsonb_typeof(
                              processing_summary_json->'external_effect_job_ids'
                          ) = 'array'
                        ORDER BY id DESC
                        LIMIT 10
                        """
                    ),
                    {"policy_version": policy_version},
                ).mappings().all()
                selected = next(
                    (
                        dict(row)
                        for row in inbox_rows
                        if len(list(row.get("job_ids") or [])) == 3
                    ),
                    None,
                )
                if selected is None:
                    raise SystemExit("no exact three-job callback found for the requested policy")
                job_ids = [int(value) for value in list(selected.pop("job_ids") or [])]
                jobs = session.execute(
                    text(
                        """
                        SELECT id, effect_type, status, lane, execution_id,
                               parent_execution_id, attempt_count, max_attempts,
                               worker_generation, policy_version, row_version,
                               last_error_code, dispatch_started_at,
                               provider_call_started_at IS NOT NULL AS provider_boundary_started,
                               side_effect_executed, provider_result_received,
                               reconciliation_required,
                               COALESCE(payload_json->>'execution_scope', '') AS execution_scope,
                               jsonb_typeof(payload_summary_json->'canary_authorization') = 'object'
                                   AS canary_authorization_present,
                               created_at, updated_at, completed_at
                        FROM external_effect_job
                        WHERE id IN :job_ids
                        ORDER BY id
                        """
                    ).bindparams(bindparam("job_ids", expanding=True)),
                    {"job_ids": job_ids},
                ).mappings().all()
                attempts = session.execute(
                    text(
                        """
                        SELECT id, job_id, status, adapter_mode, worker_generation,
                               error_code,
                               provider_call_started_at IS NOT NULL AS provider_boundary_started,
                               LOWER(COALESCE(response_summary_json->>'real_external_call_executed', 'false'))
                                   IN ('true', '1', 'yes') AS real_external_call_executed,
                               LOWER(COALESCE(response_summary_json->>'provider_result_received', 'false'))
                                   IN ('true', '1', 'yes') AS provider_result_received,
                               started_at, completed_at
                        FROM external_effect_attempt
                        WHERE job_id IN :job_ids
                        ORDER BY job_id, id
                        """
                    ).bindparams(bindparam("job_ids", expanding=True)),
                    {"job_ids": job_ids},
                ).mappings().all()
            if {int(row["id"]) for row in jobs} != set(job_ids):
                raise SystemExit("callback job set is incomplete")
            payload = {
                "target_values_redacted": True,
                "read_only": True,
                "control": dict(control),
                "webhook_inbox": selected,
                "external_effect_jobs": [dict(row) for row in jobs],
                "external_effect_attempts": [dict(row) for row in attempts],
                "provider_boundary_count": sum(bool(row["provider_boundary_started"]) for row in jobs),
                "side_effect_executed_count": sum(bool(row["side_effect_executed"]) for row in jobs),
                "attempt_real_external_call_count": sum(
                    bool(row["real_external_call_executed"]) for row in attempts
                ),
            }
            print(json.dumps(payload, ensure_ascii=False, default=str, sort_keys=True))
            PY
  diagnose_soak_failure:
    if: >-
      github.repository == 'qianlan333/AI-CRM-ID-refactor' &&
      inputs.operation == 'diagnose_soak_failure'
    environment: id-validation
    runs-on: ubuntu-latest
    env:
      EXPECTED_REPOSITORY: qianlan333/AI-CRM-ID-refactor
      EXPECTED_DEPLOY_HOST: 49.232.57.128
      EXPECTED_SSH_HOST_FINGERPRINT: SHA256:NXSJUveGoNy1lDsa+eOKho1h0ythB+pKTyijv8/KfU0
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_release_sha }}
      EXPECTED_POLICY_VERSION: ${{ inputs.policy_version }}
      PUBLIC_HEALTH_URL: https://id-dev.youcangogogo.com/health
    steps:
      - name: Read redacted failed soak evidence from 49
        env:
          DEPLOY_HOST: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 5m
          envs: EXPECTED_REPOSITORY,EXPECTED_DEPLOY_HOST,EXPECTED_RELEASE_SHA,EXPECTED_POLICY_VERSION,PUBLIC_HEALTH_URL,DEPLOY_HOST
          script: |
            set -e
            set -o pipefail
            test "$DEPLOY_HOST" = "$EXPECTED_DEPLOY_HOST"
            test "$EXPECTED_REPOSITORY" = "qianlan333/AI-CRM-ID-refactor"
            printf '%s' "$EXPECTED_RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'
            printf '%s' "$EXPECTED_POLICY_VERSION" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$'
            cd '/home/ubuntu/极简 crm'
            test "$(git rev-parse HEAD)" = "$EXPECTED_RELEASE_SHA"
            test "$(tr -d '\r\n' < .release-sha)" = "$EXPECTED_RELEASE_SHA"
            test -z "$(git status --porcelain=v1 --untracked-files=all)"
            actual_public_sha="$(
              curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -fsS \
                -D - -o /dev/null "$PUBLIC_HEALTH_URL" |
                awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' |
                tr -d '\r'
            )"
            test "$actual_public_sha" = "$EXPECTED_RELEASE_SHA"
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            source /home/ubuntu/venvs/openclaw/bin/activate
            python3 - <<'PY'
            import hashlib
            import json
            import os
            import re

            from sqlalchemy import text

            from aicrm_next.shared.db_session import get_session_factory
            from aicrm_next.shared.sensitive_data import redact_sensitive_text


            METRIC_KEYS = (
                "queue_dlq_count",
                "webhook_dlq_count",
                "internal_event_dlq_count",
                "internal_event_outbox_dlq_count",
                "external_effect_dlq_count",
                "broadcast_dlq_count",
                "queue_unknown_count",
                "queue_eligible_count",
                "queue_in_flight_count",
            )


            def selected_metrics(value):
                source = dict(value or {})
                return {key: int(source.get(key) or 0) for key in METRIC_KEYS}


            def safe_error(value):
                raw = str(value or "")
                first_line = redact_sensitive_text(raw).splitlines()[0] if raw else ""
                first_line = re.sub(r"'[^']{4,}'", "'[redacted-value]'", first_line)
                return {
                    "summary": first_line[:500],
                    "sha256": hashlib.sha256(raw.encode("utf-8")).hexdigest() if raw else "",
                }


            expected_policy_version = os.environ["EXPECTED_POLICY_VERSION"]
            with get_session_factory()() as session:
                session.execute(text("SET TRANSACTION READ ONLY"))
                soak = session.execute(
                    text(
                        """
                        SELECT soak_id, release_sha, active_generation, policy_version,
                               status, started_at, required_until, completed_at,
                               invalidated_at, invalidated_reason,
                               baseline_json, latest_snapshot_json
                        FROM queue_runtime_soak_run
                        ORDER BY started_at DESC
                        LIMIT 1
                        """
                    )
                ).mappings().one()
                if str(soak["policy_version"]) != expected_policy_version:
                    raise SystemExit("latest soak policy does not match the requested policy")
                snapshots = session.execute(
                    text(
                        """
                        SELECT captured_at, release_sha, ok, violations_json, metrics_json
                        FROM queue_runtime_soak_snapshot
                        WHERE soak_id = :soak_id
                        ORDER BY captured_at
                        """
                    ),
                    {"soak_id": soak["soak_id"]},
                ).mappings().all()
                terminal_rows = session.execute(
                    text(
                        """
                        SELECT * FROM (
                            SELECT 'external_effect' AS queue_kind, id, effect_type AS work_type,
                                   status, attempt_count, max_attempts, last_error_code,
                                   last_error_message, policy_version, worker_generation,
                                   provider_call_started_at IS NOT NULL AS provider_boundary_started,
                                   side_effect_executed,
                                   COALESCE(completed_at, updated_at) AS terminal_at
                            FROM external_effect_job
                            WHERE status IN ('failed_terminal', 'blocked')
                            UNION ALL
                            SELECT 'internal_event', id, consumer_name, status,
                                   attempt_count, max_attempts, last_error_code,
                                   last_error_message, policy_version, worker_generation,
                                   FALSE, FALSE, COALESCE(finished_at, updated_at)
                            FROM internal_event_consumer_run
                            WHERE status IN ('failed_terminal', 'blocked')
                            UNION ALL
                            SELECT 'internal_event_outbox', id, event_type, status,
                                   attempt_count, max_attempts, last_error_code,
                                   last_error_message, policy_version, worker_generation,
                                   FALSE, FALSE, updated_at
                            FROM internal_event_outbox
                            WHERE status = 'failed_terminal'
                            UNION ALL
                            SELECT 'webhook_inbox', id, provider || ':' || event_family, status,
                                   attempt_count, max_attempts, last_error_code,
                                   last_error_message, policy_version, worker_generation,
                                   FALSE, FALSE, COALESCE(finished_at, updated_at)
                            FROM webhook_inbox
                            WHERE status IN ('failed_terminal', 'dead_letter')
                            UNION ALL
                            SELECT 'broadcast', id, source_type, status,
                                   attempt_count, 0, '', last_error, '', 0,
                                   dispatch_started_at IS NOT NULL,
                                   side_effect_executed,
                                   COALESCE(completed_at, updated_at)
                            FROM broadcast_jobs
                            WHERE COALESCE(NULLIF(execution_owner, ''), 'legacy_frozen') = 'legacy_frozen'
                              AND status IN ('failed', 'failed_terminal', 'blocked')
                        ) terminal
                        WHERE terminal_at >= :started_at
                          AND terminal_at <= COALESCE(:completed_at, CURRENT_TIMESTAMP)
                        ORDER BY terminal_at, queue_kind, id
                        LIMIT 100
                        """
                    ),
                    {
                        "started_at": soak["started_at"],
                        "completed_at": soak["completed_at"],
                    },
                ).mappings().all()

            soak_payload = dict(soak)
            baseline = selected_metrics(soak_payload.pop("baseline_json"))
            latest = selected_metrics(soak_payload.pop("latest_snapshot_json"))
            deltas = {key: latest[key] - baseline[key] for key in METRIC_KEYS}
            safe_terminal_rows = []
            for raw in terminal_rows:
                row = dict(raw)
                row["last_error_message"] = safe_error(row.get("last_error_message"))
                safe_terminal_rows.append(row)
            payload = {
                "read_only": True,
                "target_values_redacted": True,
                "soak": soak_payload,
                "baseline_metrics": baseline,
                "latest_metrics": latest,
                "metric_deltas": deltas,
                "snapshots": [
                    {
                        "captured_at": row["captured_at"],
                        "release_sha": row["release_sha"],
                        "ok": bool(row["ok"]),
                        "violations": list(row["violations_json"] or []),
                        "metrics": selected_metrics(row["metrics_json"]),
                    }
                    for row in snapshots
                ],
                "terminal_rows_during_soak": safe_terminal_rows,
            }
            print(json.dumps(payload, ensure_ascii=False, default=str, sort_keys=True))
            PY
  operate:
    if: >-
      github.repository == 'qianlan333/AI-CRM-ID-refactor' &&
      inputs.operation != 'diagnose_customer_refresh' &&
      inputs.operation != 'diagnose_callback_canary' &&
      inputs.operation != 'diagnose_soak_failure'
    environment: id-validation
    runs-on: ubuntu-latest
    env:
      EXPECTED_REPOSITORY: qianlan333/AI-CRM-ID-refactor
      EXPECTED_DEPLOY_HOST: 49.232.57.128
      EXPECTED_SSH_HOST_FINGERPRINT: SHA256:NXSJUveGoNy1lDsa+eOKho1h0ythB+pKTyijv8/KfU0
      DEPLOY_TARGET: id-validation
      PUBLIC_BASE_URL: https://id-dev.youcangogogo.com
      PUBLIC_HEALTH_URL: https://id-dev.youcangogogo.com/health
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_release_sha }}
      QUEUE_OPERATION: ${{ inputs.operation }}
      QUEUE_EXPECTED_GENERATION: ${{ inputs.expected_generation }}
      QUEUE_GENERATION: ${{ inputs.generation }}
      QUEUE_POLICY_VERSION: ${{ inputs.policy_version }}
      QUEUE_TARGET_POLICY_VERSION: ${{ inputs.target_policy_version }}
      QUEUE_RUN_ID: ${{ inputs.run_id }}
      QUEUE_EXECUTION_ID: ${{ inputs.execution_id }}
      QUEUE_JOB_ID: ${{ inputs.job_id }}
      QUEUE_EXPECTED_VERSION: ${{ inputs.expected_version }}
      QUEUE_EVIDENCE_TYPE: ${{ inputs.evidence_type }}
      QUEUE_CANARY_SCENARIOS: ${{ inputs.canary_scenarios }}
      QUEUE_UPSTREAM_WELCOME_DELIVERY_ATTESTED: ${{ inputs.upstream_welcome_delivery_attested }}
      OPERATOR_ACTOR: ${{ github.actor }}
      OPERATION_RUN_ID: ${{ github.run_id }}
      OPERATION_RUN_ATTEMPT: ${{ github.run_attempt }}
    steps:
      - name: Assert immutable ID-validation operation target
        env:
          DEPLOY_HOST: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
        run: |
          set -e
          set -o pipefail
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$DEPLOY_HOST" = "$EXPECTED_DEPLOY_HOST"
          test "$DEPLOY_TARGET" = "id-validation"
          test "$PUBLIC_BASE_URL" = "https://id-dev.youcangogogo.com"
          test "$PUBLIC_HEALTH_URL" = "https://id-dev.youcangogogo.com/health"
          printf '%s' "$EXPECTED_RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$QUEUE_EXPECTED_GENERATION" | grep -Eq '^[0-9]+$'
          printf '%s' "$QUEUE_GENERATION" | grep -Eq '^[1-9][0-9]*$'
          printf '%s' "$QUEUE_POLICY_VERSION" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$'

      - name: Checkout exact deployed release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)
        with:
          ref: ${{ inputs.expected_release_sha }}
          fetch-depth: 0

      - name: Verify release is a main ancestor and the public ID release
        run: |
          set -e
          set -o pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_RELEASE_SHA"
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$EXPECTED_RELEASE_SHA" FETCH_HEAD; then
            echo "deployed ID release is not in current main history"
            exit 1
          fi
          rm -f /tmp/aicrm-id-operation.headers
          curl --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -fsS \
            -D /tmp/aicrm-id-operation.headers \
            -o /dev/null \
            "$PUBLIC_HEALTH_URL"
          python3 - /tmp/aicrm-id-operation.headers "$EXPECTED_RELEASE_SHA" <<'PY'
          import sys
          from pathlib import Path

          headers = Path(sys.argv[1]).read_text(encoding="iso-8859-1")
          values = []
          for line in headers.replace("\r\n", "\n").splitlines():
              name, separator, value = line.partition(":")
              if separator and name.lower() == "x-aicrm-release-sha":
                  values.append(value.strip())
          if values != [sys.argv[2]]:
              raise SystemExit("public ID health release SHA mismatch")
          PY

      - name: Execute guarded non-spec queue operation on 49
        if: inputs.operation != 'configure_allowlisted' && inputs.operation != 'import_canary_media' && inputs.operation != 'run_wecom_canary' && inputs.operation != 'import_canary_channel' && inputs.operation != 'ingest_canary_callback' && inputs.operation != 'arm_canary_callback'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,EXPECTED_RELEASE_SHA,QUEUE_OPERATION,QUEUE_EXPECTED_GENERATION,QUEUE_GENERATION,QUEUE_POLICY_VERSION,QUEUE_TARGET_POLICY_VERSION,QUEUE_RUN_ID,QUEUE_EXECUTION_ID,QUEUE_JOB_ID,QUEUE_EXPECTED_VERSION,QUEUE_EVIDENCE_TYPE,QUEUE_CANARY_SCENARIOS,QUEUE_UPSTREAM_WELCOME_DELIVERY_ATTESTED,OPERATOR_ACTOR,OPERATION_RUN_ID,OPERATION_RUN_ATTEMPT
          script_path: scripts/ops/run_id_validation_queue_operation.sh

      - name: Execute guarded canary-spec queue operation on 49
        if: inputs.operation == 'configure_allowlisted' || inputs.operation == 'import_canary_media' || inputs.operation == 'run_wecom_canary'
        env:
          WECOM_CANARY_SPEC_B64: ${{ secrets.ID_VALIDATION_WECOM_CANARY_SPEC_B64 }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,EXPECTED_RELEASE_SHA,QUEUE_OPERATION,QUEUE_EXPECTED_GENERATION,QUEUE_GENERATION,QUEUE_POLICY_VERSION,QUEUE_TARGET_POLICY_VERSION,QUEUE_RUN_ID,QUEUE_EXECUTION_ID,QUEUE_JOB_ID,QUEUE_EXPECTED_VERSION,QUEUE_EVIDENCE_TYPE,QUEUE_CANARY_SCENARIOS,OPERATOR_ACTOR,OPERATION_RUN_ID,OPERATION_RUN_ATTEMPT,WECOM_CANARY_SPEC_B64
          script_path: scripts/ops/run_id_validation_queue_operation.sh

      - name: Import guarded production canary channel asset on 49
        if: inputs.operation == 'import_canary_channel'
        env:
          WECOM_CANARY_SPEC_B64: ${{ secrets.ID_VALIDATION_WECOM_CANARY_SPEC_B64 }}
          WECOM_CHANNEL_ASSET_B64: ${{ secrets.ID_VALIDATION_WECOM_CHANNEL_ASSET_B64 }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,EXPECTED_RELEASE_SHA,QUEUE_OPERATION,QUEUE_EXPECTED_GENERATION,QUEUE_GENERATION,QUEUE_POLICY_VERSION,QUEUE_TARGET_POLICY_VERSION,QUEUE_RUN_ID,QUEUE_EXECUTION_ID,QUEUE_JOB_ID,QUEUE_EXPECTED_VERSION,QUEUE_EVIDENCE_TYPE,QUEUE_CANARY_SCENARIOS,OPERATOR_ACTOR,OPERATION_RUN_ID,OPERATION_RUN_ATTEMPT,WECOM_CANARY_SPEC_B64,WECOM_CHANNEL_ASSET_B64
          script_path: scripts/ops/run_id_validation_queue_operation.sh

      - name: Ingest guarded production canary callback transcript on 49
        if: inputs.operation == 'ingest_canary_callback'
        env:
          WECOM_CANARY_SPEC_B64: ${{ secrets.ID_VALIDATION_WECOM_CANARY_SPEC_B64 }}
          WECOM_CHANNEL_ASSET_B64: ${{ secrets.ID_VALIDATION_WECOM_CHANNEL_ASSET_B64 }}
          WECOM_CALLBACK_EVENT_B64: ${{ secrets.ID_VALIDATION_WECOM_CALLBACK_EVENT_B64 }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,EXPECTED_RELEASE_SHA,QUEUE_OPERATION,QUEUE_EXPECTED_GENERATION,QUEUE_GENERATION,QUEUE_POLICY_VERSION,QUEUE_TARGET_POLICY_VERSION,QUEUE_RUN_ID,QUEUE_EXECUTION_ID,QUEUE_JOB_ID,QUEUE_EXPECTED_VERSION,QUEUE_EVIDENCE_TYPE,QUEUE_CANARY_SCENARIOS,OPERATOR_ACTOR,OPERATION_RUN_ID,OPERATION_RUN_ATTEMPT,WECOM_CANARY_SPEC_B64,WECOM_CHANNEL_ASSET_B64,WECOM_CALLBACK_EVENT_B64
          script_path: scripts/ops/run_id_validation_queue_operation.sh

      - name: Arm guarded real-time callback canary on 49
        if: inputs.operation == 'arm_canary_callback'
        env:
          WECOM_CANARY_SPEC_B64: ${{ secrets.ID_VALIDATION_WECOM_CANARY_SPEC_B64 }}
          WECOM_CHANNEL_ASSET_B64: ${{ secrets.ID_VALIDATION_WECOM_CHANNEL_ASSET_B64 }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.ID_VALIDATION_DEPLOY_HOST }}
          username: ${{ secrets.ID_VALIDATION_DEPLOY_USER }}
          key: ${{ secrets.ID_VALIDATION_DEPLOY_SSH_KEY }}
          fingerprint: ${{ env.EXPECTED_SSH_HOST_FINGERPRINT }}
          command_timeout: 25m
          envs: EXPECTED_REPOSITORY,DEPLOY_TARGET,PUBLIC_BASE_URL,PUBLIC_HEALTH_URL,EXPECTED_RELEASE_SHA,QUEUE_OPERATION,QUEUE_EXPECTED_GENERATION,QUEUE_GENERATION,QUEUE_POLICY_VERSION,QUEUE_TARGET_POLICY_VERSION,QUEUE_RUN_ID,QUEUE_EXECUTION_ID,QUEUE_JOB_ID,QUEUE_EXPECTED_VERSION,QUEUE_EVIDENCE_TYPE,QUEUE_CANARY_SCENARIOS,OPERATOR_ACTOR,OPERATION_RUN_ID,OPERATION_RUN_ATTEMPT,WECOM_CANARY_SPEC_B64,WECOM_CHANNEL_ASSET_B64
          script_path: scripts/ops/run_id_validation_queue_operation.sh

      - name: Record operation provenance
        run: |
          {
            echo "## ID-validation queue operation"
            echo ""
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Release SHA: $EXPECTED_RELEASE_SHA"
            echo "- Operation: $QUEUE_OPERATION"
            echo "- Generation: $QUEUE_GENERATION"
            echo "- GitHub actor: $OPERATOR_ACTOR"
            echo "- Target: id-validation / 49.232.57.128"
          } >> "$GITHUB_STEP_SUMMARY"
